        interest_fee:
          tool: lib_tools.tools_kompato.add_values
          params:
            value: self.raw_call_assignment.accrued_interest
            add_value: self.raw_call_assignment.kompato_accrued_interest
        late_fee:
          tool: lib_tools.tools_kompato.add_values
          params:
            value: self.raw_call_assignment.fees_balance
            add_value: self.raw_call_assignment.kompato_fees_balance
        ssml_interest_fee:
          tool: lib_tools.tools_kompato.convert_ssml
          params:
            value: self.dict_variable.interest_fee
        ssml_late_fee:
          tool: lib_tools.tools_kompato.convert_ssml
          params:
            value: self.dict_variable.late_fee
        monthly_max_installments:
          tool: lib_tools.tools_kompato.divide_value
          params:
            total_amount: self.raw_call_assignment.current_balance
            divide_amt: self.raw_call_assignment.payment_max_duration_in_months
            mode: max
            base_compare_amt: self.raw_call_assignment.client_min_payment_amount_per_month
        first_offer_monthly_backup:
          tool: lib_tools.tools_kompato.divide_value
          params:
            total_amount: self.raw_call_assignment.current_balance
            divide_amt: 6
            mode: max
            base_compare_amt: self.raw_call_assignment.client_min_payment_amount_per_month
        first_offer_monthly_amount:
          tool: lib_tools.tools_kompato.pick_value_from_conditions
          params:
            conditions:
              - condition: regular_monthly_pay > monthly_max_installments
                value: regular_monthly_pay
              - condition: else
                value: first_offer_monthly_backup
            local_vars:
              regular_monthly_pay:
                value: self.raw_call_assignment.regular_monthly_pay
                type: float
              monthly_max_installments:
                value: self.dict_variable.monthly_max_installments
                type: float
              first_offer_monthly_backup:
