    2llmcalls:
      type_llm_reflection: gpt-4o-2024-11-20-openai
      type_llm_response: gpt-4o-2024-11-20-openai
      len_msg_reflection:
      len_msg_response:
      type_output_reflection: custom1
      reflection_template: template_default

      pre_reflection_variable:
      reflection_variable:
        callback_consent:
          description:
            agree: _user agree to a human agent call back
            revoke: _user disagree to be call back or they want to call back by themselves (e.g. "No", "Nu-uh", "I Refuse", "No Way", "Nah", "I will call back myself", ...)
            unknown: _user did not catch what you just said or _user said something not relavent
