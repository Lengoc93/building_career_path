        "'{{dict_variable.exc_comms}}' == 'call' and '{{dict_variable.exc_comms_contact}}' != 'unknown' and '{{dict_variable.contact_confirmed}}' == 'yes'":
          next_state: end_call
          filler: #Do you have any concerns?
          repeat_filler:

        # The customer wants to stop being contacted via call, email, sms, and has confirmed the address/phone number to cease communication with but explicitly refuses it
        "'{{dict_variable.exc_comms}}' in ('call', 'email', 'sms') and '{{dict_variable.exc_comms_contact}}' != 'unknown' and '{{dict_variable.contact_confirmed}}' == 'no'":
          next_state: exc_cease_comms
          filler: #Can you provide your new contact again that we will stop contact you via?
          repeat_filler:

        else: # '{{dict_variable.exc_comms}}' == 'unknown'
          next_state: exc_cease_comms
          filler: #To resolve this matter quickly and accurately, it's essential that we verify the payment details. Could you please share the reasons why you believe this debt does not belong to you?
          repeat_filler:

      repeat_continuously:
        max_repeat: 10
        state_exceed_max_repeat: end_call
        filler_exceed_max_repeat: #I understand. |partial # We will stop all forms of communication with your account as per your request via contact number {{dict_variable.ssml_phone}} or email {{raw_call_assignment.email}}. Do you have any other concerns?
        repeat_filler:
      max_turn_back:

