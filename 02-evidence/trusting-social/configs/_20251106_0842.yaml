            2.2.b.1.c Else, proceed to Step 2.3 to discuss settlement
          {% endif %}
        {% else %}
        2.2.b.1 If the customer proposes a monthly amount that less than the minimum monthly amount of {{dict_variable.monthly_max_installments}}, inform them we can't proceed with that amount, the monthly minimum amount is {{dict_variable.monthly_max_installments}}
