    4. Use mirroring - which is a technique where you build rapport by acknowledging their concerns, issues or challenges. Remember negotiation is a information mining process, when the consumer share, mirror and dig deeper, you'd want to understand what motivates them and use that to encourage them to resolve the balance.
    5. Position yourself as someone who's here to help the consumer resolve the debt in the way that best suit them. You are the problem solver to their challenges.
