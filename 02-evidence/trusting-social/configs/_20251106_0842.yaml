        #   repeat_filler:
        ### END handle exception case
        # ---------------------------------------
        ### START handle main flow

        "'{{dict_variable.human_request_confirmed}}' == 'human_agent_request' and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
          next_state: update_info
          filler: "We are looking for a human agent to assist you. In the meantime, to ensure important account updates are communicated timely to you, let's ensure we have your accurate contact details on file. I have {{dict_variable.ssml_phone}} as your contact number in my records. Is this still the best way to reach you?"
          action_after_transition_func:
            - class: WarmTransferSignal
              params:
                transfer_message: I have located a live agent to further help you.
                metadata: *sm_metadata
                extra_info: *warm_transfer_info_with_payment

        # one-time payment today
        "'{{dict_variable.method}}' in ('online') and '{{dict_variable.months}}' == '1' and '{{dict_variable.first_date}}' == '{{raw_call_assignment.today}}' and '{{dict_variable.text_consent}}' == 'yes'":
