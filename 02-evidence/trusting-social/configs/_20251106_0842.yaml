          2.3.1.e.2 If the amount is significantly lower, offer the consumer to pay this amount for a few months, and when they could afford more we can resume the settlement conversation, but advise that we cannot be certain the settlement terms will be the same at that point in time. If consumer agrees to pay this amount for a few month, move to Step 3.2, if not ask the consumer if they want to speak to a supervisor.
