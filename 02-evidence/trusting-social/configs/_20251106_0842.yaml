        2.3.1.d If the consumer accepts the amount reduced with specific {{dict_variable.ssml_settlement_2_percentage}} percent in the range of 30 % <= x < 60 % and ask for paying in installments or monthly, empathetically refuses installments and let them know that {{dict_variable.ssml_total_amount_settlement_2_user}} MUST be paid before {{dict_variable.ssml_settlement_deadline}} to be consider eligible then repeat Step 2.3.1.c
