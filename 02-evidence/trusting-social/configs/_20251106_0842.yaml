        2.3.c.1 If the consumer accepts the amount reduced and pay before {{dict_variable.ssml_settlement_deadline}} in full, move to Step 3.1
        2.3.c.2 If the consumer requests the specific percent lower than 30 % or refuses to pay {{dict_variable.ssml_total_amount_settlement_2_user}} before {{dict_variable.ssml_settlement_deadline}}, or suggest to pay next month, on or after {{dict_variable.ssml_settlement_deadline}}, proceed to Step 2.6 and let them know that you do not have the authority to approve other options but you will get a live agent to join the call now to discuss lower settlement options
