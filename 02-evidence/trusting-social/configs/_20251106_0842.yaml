  exc_dispute_paid:
    type: 2llmcalls
    2llmcalls:
      ## dynamic filler customized for each state
      dynamic_filler:
        model_name: gpt-4o #Qwen3-4B-df_en_v3b
        nturns: 6
        fillers:
        prompt_template: prompt_filler_v2 #prompt_filler_v3    ## a key in `prompt_templates_dynamic_filler`
        quick_fillers:
      type_llm_reflection: gpt-4o-2024-11-20-openai
      type_llm_response: gpt-4o-2024-11-20-openai
      len_msg_reflection:
      len_msg_response:
      type_output_reflection: custom1
      reflection_template: template_exception
      variable_change_exception: { "exc": "null" }

      pre_reflection_variable:
        init_call_date:
          tool: lib_tools.tools_kompato.init_outbound_call_date
        init_consumer_info:
          tool: lib_tools.tools_kompato.init_outbound_consumer_info
      reflection_variable:
        - variables:
            payment_status:
              description:
                "yes": if _user explicitly or implicitly confirm that the whole amount or part of the debt/balance has been PAID by themselve or by someone else (e.g. "I paid the full amount via bank transfer six months ago. Can you confirm this on your end?", "I settled this debt last year with a check. Why is it still showing as unpaid?", "I made a payment directly to the creditor last year. This should be updated in your records.", "I have already paid off this debt through your online portal. Can you verify the payment?", "I cleared this balance with a credit card payment last 2 years. Please check and confirm it has been received")
                "no": if _user explicitly or implicitly reject that the debt has been paid (e.g. "no, I haven't paid it yet", "no, I haven't made any payment", "no, I haven't settled this debt yet")
                "unknown": if it is not clear whether the _user has already paid the debt or part of it
              example: unknown
            debt_check:
              description:
                "yes": if the user confirms the debt they are disputing
                "no": if the user indicates they have paid a different account
                "unknown": if the user's response is unclear
              example: unknown
            detail:
              description: return specific information of the debt that _user stated they were disputing. Default value is 'unknown'
              example: "debt balance is $1000 bought from VNG company"
            payment_method:
              description: return specific method (e.g credit card, ACH payments, etc) that _user stated to make the payment. Default value is 'unknown'
              example: credit card
            payment_recipient:
              description: The subjects to whom _user made the payment to (e.g. original creditor, a previous collection agency, or directly). Default value is 'unknown'
              example: original creditor
            payment_date:
              description: The date in the form of YYYY-MM-DD that the user states to make the payment (do math if necessary, Today is {{raw_call_assignment.today}}). Default value is 'unknown'
              example: "2024-12-01"
            resolved:
              description:
                "yes": if the _user explicitly or implicitly regards the 'already-paid' dispute as adequately explained, defused or resolved successfully. They may still be unhappy or disgruntle but appear willing to move on to resolve the account  - for example they ask to pay or settle the account.
                "no": if the _user is still furious, unhappy or feel incomplete about the 'already-paid' dispute, and is not ready to resolve the account.
                "unknown": if it is not clear whether the 'already-paid' dispute is adequately addressed or not
              example: unknown

        - variables:
            exc:
              description:
                # complaint: if _user complain about historical calls, system issues, procedure issues, policy issues, response time or process of receiving requested documents.; and in the latest turns of the conversation has not confirmed that the complaint is now resolved or they have chosen to ignore it for now.
                # dispute: if _user just said they want to dispute the debt but not mention clear reasons such as debt amount, or they already paid, or they are a victim of identity theft.; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                # dispute_balance: if _user has dispute about the balance of the debt, the charges (for example 'We agreed to a $500 discount but the portal is still showing the original amount', 'The creditor promised me I would not need to pay late fees', 'This balance is too high because…', 'I was charged for this account, but I never received the item', 'I refunded this charge, but it still showed up on my account'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                # dispute_paid: if _user has dispute that they already paid the debt (for example 'I paid the full amount via bank transfer six months ago. Can you confirm this on your end?', 'I settled this debt last year with a check. Why is it still showing as unpaid?', 'I made a payment directly to the creditor last year. This should be updated in your records.', 'I have already paid off this debt through your online portal. Can you verify the payment?', 'I cleared this balance with a credit card payment last 2 years. Please check and confirm it has been received'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                # dispute_theft: if _user explicitly informs us that they are a victim of identity theft (e.g. "I received a notification about a debt in my name that I never incurred.", "I found out someone used my identity to open an account.", "This debt is not mine; I suspect my identity has been stolen.", "I noticed unfamiliar charges under my name that I never authorized.", "I believe my personal information was used fraudulently to create this debt.").; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                # bankruptcy: if caller tells that they are in bankruptcy
                # cease_comms: if caller requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                # attorney: if the caller or consumer lets you know that they are being represented by an attorney or lawyer (e.g. "I have an attorney" or "Speak to my lawyer" or "My lawyer told me not to talk to you. Please contact them instead")
                human_agent_request: if _user specifically requests speaking to a live agent, human, or representative; and in the latest turns of the conversation has not agreed to continue the conversation
                "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
              example: "null"

          len_msg_reflection: 2
          reflection_template: template_default

      processing_variable:

      transition_conditions:
        "'{{dict_variable.exc}}' == 'human_agent_request'":
          next_state: exc_human_agent_request
          filler:
          repeat_filler:

        ###### FLOW: ask confirm debt (yes to prcoeed) -> ask method -> ask whom -> ask date
        "'{{dict_variable.payment_status}}' == 'no' or '{{dict_variable.resolved}}' == 'yes'":
          next_state: BACK|EXC
          filler:
          repeat_filler:

        "'{{dict_variable.debt_check}}' == 'no' and '{{dict_variable.detail}}' != 'unknown' and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
          next_state: update_info
          filler: "We are looking for a human agent to assist you. In the meantime, to ensure important account updates are communicated timely to you, let's ensure we have your accurate contact details on file. I have {{dict_variable.ssml_phone}} as your contact number in my records. Is this still the best way to reach you?"
          action_after_transition_func:
            - class: WarmTransferSignal
              params:
                transfer_message: I have located a live agent to further help with the dispute claim.
                metadata: *sm_metadata
                extra_info: *base_warm_transfer_info

        # HANDLE confirm debt
        "'{{dict_variable.debt_check}}' == 'unknown'":
          next_state: exc_dispute_paid #ask to confirm
          filler: #Your debt is associated with a Consumer Loan with current outstanding balance is {{dict_variable.ssml_total_balance}}, which includes a principal of {{dict_variable.ssml_principal_balance}}, interest of {{dict_variable.ssml_accrued_interest}}, and fees totaling {{dict_variable.ssml_fees_balance}}. This debt originates from {{raw_call_assignment.original_creditor_name}}, with the original date of default being {{dict_variable.ssm_debt_original_date_of_default}}. Could you please confirm this?
          repeat_filler:

        "'{{dict_variable.debt_check}}' == 'no' and '{{dict_variable.detail}}' == 'unknown'":
          next_state: exc_dispute_paid #ask debt detail
          filler: #Could you please provide the account details of the debt you are disputing?
          repeat_filler:

        "'{{dict_variable.debt_check}}' == 'no' and '{{dict_variable.detail}}' != 'unknown' and '{{dict_variable.is_working_hours }}' == 'no'":
          next_state: post_exc #ask human cb
          filler: I've noted this down and will escalate to a live agent to assist you. |partial #Alright we'll note down that you are disputing this debt. We'll raise this dispute to a supervisor. Can we ask for your consent to be reached by a supervisor to assist you in settling your concern?
          repeat_filler:

        # ASK method - who - date
        "'{{dict_variable.debt_check}}' == 'yes' and '{{dict_variable.payment_method}}' == 'unknown'":
          next_state: exc_dispute_paid #ask method
          filler: #Could you please let me know how you made the payment? Was it through a credit card, bank transfer, or another method?
          repeat_filler:

        "'{{dict_variable.debt_check}}' == 'yes' and '{{dict_variable.payment_method}}' != 'unknown' and '{{dict_variable.payment_recipient}}' == 'unknown' and '{{dict_variable.payment_date}}' == 'unknown'":
          next_state: exc_dispute_paid #ask who
          filler: #Could you please let me know to whom you made the payment? Was it to the original creditor, a previous collection agency, or to us directly?
          repeat_filler:

        "'{{dict_variable.debt_check}}' == 'yes' and '{{dict_variable.payment_method}}' != 'unknown' and '{{dict_variable.payment_recipient}}' != 'unknown' and '{{dict_variable.payment_date}}' == 'unknown'":
          next_state: exc_dispute_paid #ask date
          filler: #Could you please let me know when you made the payment? An approximate date would be helpful.
          repeat_filler:

        "'{{dict_variable.resolved}}'!='yes'":
          next_state: exc_dispute_paid #continue
          filler:
          repeat_filler:

        # else: #dispute_paid_method = dispute_paid_who = dispute_paid_date != 'unknown'
        #   next_state: post_exc
        #   filler: I see. To ensure you receive the best service, I will note down your concern and esclate this matter to a supervisor. |partial #Alright we'll note down that you are disputing this debt. We'll raise this dispute to a supervisor. Can we ask for your consent to be reached by a supervisor to assist you in settling your concern?
        #   repeat_filler:
        else: #resolved
          next_state: BACK|EXC #negotiation_from_script
          filler:
          repeat_filler:

      repeat_continuously:
        max_repeat: 13
        state_exceed_max_repeat: end_call
        filler_exceed_max_repeat: I'm sorry, it seems I'm unable to assist you. |partial # let me note this down and escalate to my supervisor. |partial #Thank you for your time today. If you have any more concerns, feel free to reach out anytime through our hotline at {{dict_variable.ssml_company_hotline}}. Have a great day!<ENDCALL>
        repeat_filler:
      max_turn_back:

