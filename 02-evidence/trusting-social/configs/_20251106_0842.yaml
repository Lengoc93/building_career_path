      1.1.b The consumer's willingness to pay is unclear or has questions about the term, you may:
        1.1.b.1 Explain to them that their account with {{raw_call_assignment.original_creditor_name}} has an outstanding balance of {{dict_variable.ssml_total_balance}} and it would be great if they continue their monthly payment of {{dict_variable.ssml_monthly_amount_offer_1_variation_1}}.
