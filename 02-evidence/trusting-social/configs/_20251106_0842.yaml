  negotiation_from_script:
    type: 2llmcalls
    2llmcalls:
      response_template:
        if exp_nego == 'variation_1': negotiation_from_script_variation_1
        elif exp_nego == 'variation_2': negotiation_from_script_variation_2
        elif exp_nego == 'variation_3': negotiation_from_script_variation_3
        elif exp_nego == 'variation_4': negotiation_from_script_variation_4
        elif exp_nego == 'variation_5': negotiation_from_script_variation_5
        else: negotiation_from_script_base
      ## dynamic filler customized for each state
      dynamic_filler:
        model_name: gpt-4o #Qwen3-4B-df_en_v3b
        nturns: 6
        fillers:
        prompt_template: prompt_filler_v2 #prompt_filler_v3    ## a key in `prompt_templates_dynamic_filler`
        quick_fillers:
      type_llm_reflection: gpt-4o-2024-11-20-openai
      type_llm_response: gpt-4o-2024-11-20-openai
      len_msg_reflection:
      len_msg_response:
      type_output_reflection: custom1
      reflection_template: template_default
      variable_change_exception: { "exc": "null", "no_notice": "no" }

      pre_reflection_variable:
        init_call_date:
          tool: lib_tools.tools_kompato.init_outbound_call_date
        init_consumer_info:
          tool: lib_tools.tools_kompato.init_outbound_consumer_info

      reflection_variable:
        - variables:
            promise: #ptp:
              description:
                "yes": The user has clearly expressed an intent to make a payment, or has agreed to a specific payment plan or resolution proposed by the agent. This includes initial conditional offers that are subsequently resolved into a firm commitment, or implied agreement by discussing the logistics of making a proposed payment.
                "no": The user has explicitly stated an inability or unwillingness to make any payment towards the debt, or has definitively rejected a specific payment request or proposed plan. This includes clear statements of severe financial hardship that prevent payment.
                "unknown": The user's intent regarding making a payment or agreeing to a payment plan is genuinely ambiguous, conditional and unresolved, or otherwise unclear. This category also applies when the conversation does not concern the user's direct financial obligation (e.g., user is not the debtor), or when no explicit promise or refusal has been made by the user regarding payment.
              example: "no"
            amount: #payment_amount:
              description: the total amount of payment in dollars that user clearly stated to pay in NUMBER and unit of currency (do math if necessary, Total debt outstanding balance is {{dict_variable.ssml_total_balance}}). If customer reject to pay or don't answer the amount then return 'unknown'. If they agree to a payment plan, without specifying the total amount or discussing settlement, assume that their total amount of payment is {{dict_variable.ssml_total_balance}} dollars. Note that if the consumer changes their mind multiple time, choose the the last agreed one, if the consumer refuses to pay or no longer commit to the amount in the latest turns of the conversation, ensure to unset this to 'unknown'.
              example: "2000 dollars"
            first_date: #first_payment_date:
              description: |
                the specific calendar date (YYYY-MM-DD) when the user expresses a clear intention or agreement to make their **first** payment, whether it's an initial payment or the first of installments. This date must reflect the user's stated intent. It can be an absolute date (e.g., "December 15th") or a relative term (e.g., "next Monday," "the 30th," "January 4th"). All relative dates must be calculated as the *next upcoming calendar occurrence* from Today ({{raw_call_assignment.today}}, which is {{dict_variable.day_of_week}}). This includes correctly resolving year rollovers (e.g., 'January 4th' stated in December should resolve to January of the *next* calendar year). If the user agrees to pay immediately and explicitly states 'today' or 'right now' or 'now' without specifying a future date, resolve this to Today's date ({{raw_call_assignment.today}}). If the consumer changes their mind multiple times, or if a stated date is unviable (e.g., due to business closures), return the *most recent confirmed and viable* payment date. Return 'unknown' if: (1) the user explicitly refuses to pay, (2) the user denies payment details needed to process a payment, (3) the user makes no commitment to a specific calendar date (e.g., vague "sometime next week"), or any stated date is explicitly unconfirmed, ambiguous, or invalidated during the conversation. This variable is ONLY for the first PTP date; do NOT extract other entity types; focus strictly on the initial payment commitment.
              example: "2024-09-17"
            months: #installment_cnt:
              description: the NUMBER of months over which the user clearly stated they want to make installments. If it is an one-off payment, return "1". If the user refuses to pay or does not provide an answer then return 'unknown'
              example: "3"
            settlement_2_percentage: #payment_amount:
              description: the percentage of settlement in NUMBER that user CLEARLY stated to pay, if customer reject to pay or don't answer the amount percentage then return 'unknown'. Note that if the consumer changes their mind multiple time, choose the the last agreed one, if the consumer refuses to pay or no longer commit to the amount in the latest turns of the conversation, ensure to unset this to return 'unknown'.
              example: "40"
            # payment_plan:
            #   description: The payment plan that the user agrees to follow, detailing the installment amounts and frequency (e.g.,daily, weekly, bi-weekly, monthly, one-off). If the user does not agree to a plan or is uncertain, return 'unknown'. Note that if the consumer changes their mind multiple time, choose the the last agreed one, if the consumer refutes or no longer want to have a payment plan in the latest turns of the conversation, ensure to unset this to 'unknown'.
            #   example: "monthly of 200 dollars for 3 months"
            review: #review_date:
              description: |
                A future date or time agreed upon with the user to rediscuss their payment situation, in YYYY-MM-DD format (Today is {{raw_call_assignment.today}}, a {{dict_variable.day_of_week}}). This is not a payment date. **Follow this logic hierarchy strictly**: (1) For calculable relative timeframes (e.g., "in six months," "next week," "two months from now," **"next month"**), calculate the exact date from today's date, preserving the day of the month. Example: If today is 2025-09-03 and user says "next month," use 2025-10-03. (2) If a time for a same-day callback is agreed upon (e.g., "call me back after 4 PM"), use today's date. (3) If **only a bare month name** is given, without a relative modifier like 'next' (e.g., user says just "August"), default to the 1st day of that month's next occurrence. Example: If it's 2025-07-24 and user says "August," use 2025-08-01. This rule does not apply to "next month." If no specific review date/time is set, return 'unknown'.
              example: "2024-09-17"

        - variables:
            negotiate:
              overview: Reflects the user's current willingness and ability to engage in discussions or actions aimed at resolving their existing payment or debt situation with the agent in the ongoing conversation.
              description:
                "yes": The user indicates a clear willingness to engage in a discussion or action to resolve the payment. This includes explicitly agreeing to make a payment (full or partial), actively exploring alternative payment options, dates, or methods, or asking for adjustments to their payment plan. The user is seeking or accepting a path to resolution.
                "no": The user explicitly states an unwillingness to make a payment or discuss payment options at this time, or directly rejects any presented payment arrangement without exploring alternatives. This also includes clear expressions of current financial inability to pay or engage in a payment plan, without showing an inclination to explore viable resolution options within the ongoing conversation.
                "unknown": The user's stance on negotiating a payment is genuinely unclear or conditional. This includes situations where the user disputes the debt, needs to verify information externally before proceeding, or is solely seeking information about the process without committing to or being directly prompted for a payment plan. The user is not explicitly refusing but also not actively engaging in negotiation for a resolution due to external factors or lack of a clear negotiation prompt.
              example: "unknown"
            confirmed: #payment_confirmed:
              description:
                "yes": After the agent summarizes the entire payment arrangement (including amount, type, schedule, start date, and frequency) in a single, direct confirmation question, the user explicitly confirms or agrees.
                "no": After the agent summarizes the full payment arrangement in a direct confirmation question, the user explicitly does not confirm or disagrees.
                "unknown": The agent has not yet summarized the full payment arrangement in a direct confirmation question, or it is unclear if the user has agreed or disagreed.
              example: "unknown"
            kit: #kit_status:
              description:
                "yes": user agrees to keep-in-touch plan
                "no": user declines or has another payment plan (e.g. full payment, settlement, installment)
                "unknown": unclear if user agrees to any plan
              example: "no"
            monthly: #monthly_payment:
              description: the installment amount in monthly in dollars that user agreed to pay in NUMBER and unit of currency, if customer reject to pay or don't answer the amount then return 'unknown'
              example: 100 dollars
            consolidation:
              description: return "yes" if Consumer claims they are with a program for debt/credit settlement, consolidation, relief, management or financial solutions. Else, return "no"
              example: "no"
            consolidation_confirmed:
              description: return "yes" if the consumer confirms after the agent asks for confirmation that the Consumer is with a program for debt/credit settlement, consolidation, relief, management or financial solutions. Else, return "no"
              example: "no"
            consolidation_program:
              description: return the details of the company or program that is consolidating debt for the consumer. Else, return "unknown"
              example: "unknown"

        - variables:
            exc:
              description:
                complaint: if _user complain about historical calls, system issues, procedure issues, policy issues, response time or process of receiving requested documents.; and in the latest turns of the conversation has not confirmed that the complaint is now resolved or they have chosen to ignore it for now.
                dispute: if _user just said they want to dispute the debt but not mention clear reasons such as debt amount, or they already paid, or they are a victim of identity theft.; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                dispute_balance: if _user has dispute about the balance of the debt, the charges (for example 'We agreed to a $500 discount but the portal is still showing the original amount', 'The creditor promised me I would not need to pay late fees', 'This balance is too high because…', 'I was charged for this account, but I never received the item', 'I refunded this charge, but it still showed up on my account'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                dispute_paid: if _user has dispute that they already paid the debt (for example 'I paid the full amount via bank transfer six months ago. Can you confirm this on your end?', 'I settled this debt last year with a check. Why is it still showing as unpaid?', 'I made a payment directly to the creditor last year. This should be updated in your records.', 'I have already paid off this debt through your online portal. Can you verify the payment?', 'I cleared this balance with a credit card payment last 2 years. Please check and confirm it has been received'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                dispute_theft: if _user explicitly informs us that they are a victim of identity theft (e.g. "I received a notification about a debt in my name that I never incurred.", "I found out someone used my identity to open an account.", "This debt is not mine; I suspect my identity has been stolen.", "I noticed unfamiliar charges under my name that I never authorized.", "I believe my personal information was used fraudulently to create this debt.").; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                dispute_txn_fraud: if _user explicitly informs us that they are a victim of transaction fraud, where someone has unauthorized access to their account information and makes purchases without their consent. Examples include statements like "I noticed purchases on my account that I did not authorize.", "My account was charged for items I did not buy.", "I received a notification about a transaction I never made.", "There are unfamiliar transactions on my statement that I did not initiate.", "Someone used my account information to make unauthorized purchases."; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                bankruptcy: if caller tells that they are in bankruptcy
                cease_comms: if caller requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                attorney: if the caller or consumer lets you know that they are being represented by an attorney or lawyer (e.g. "I have an attorney" or "Speak to my lawyer" or "My lawyer told me not to talk to you. Please contact them instead")
                callback: if the _user want to a callback from a human agent and in the latest turns of the conversation has confirmed that they confirmed that they want a human agent call back
                # question_without_answer: if the _user asks a question that requires information that is not available in the conversation context, and in the latest turns of the conversation has not explicitly abandoned the question.
                human_agent_request: if _user specifically requests speaking to a live agent, human, or representative; and in the latest turns of the conversation has not agreed to continue the conversation
                "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
              example: "null"
            info_confirm: #contact_update:
              description:
                "yes": if the user has been asked to confirm or update their contact details to ensure they are timely informed about updates and changes to their account after a thorough discussion of potential payment plans and financial circumstances. Such as, "Could you please confirm your contact information?", "I'd like to make sure we have the correct contact information for you."
                "no": if the user has not been asked to confirm their contact details
              example: "no"
            no_notice:
              description: return "yes" ONLY when both conditions are satisfied, i.e. (1) when after the agent has explicitly double check if the consumer has received a letter or email from {{raw_call_assignment.company_name}} and (2) the consumer confirmed that they have not received any. Else, return "no"
              example: "no"
            transfer:
              description: return "yes" ONLY when the agent lets the consumer know that the agent does not have the authority to approve lower settlement options but the agent will get a live agent to join the call now to discuss lower settlement options. Else, return "no"
              example: "no"
            payment_method:
              description:
                ach: _user ultimately chooses to pay by bank transfer or ACH payments or _user persistent in choosing bank transfer or ACH payments.
                credit_card: _user ultimately chooses to pay by credit card or _user persistent in choosing credit card.
                debit_card: _user ultimately chooses to pay by debit card or _user persistent in choosing debit card.
                mailing: _user ultimately chooses to pay by mailing money order or check or _user persistent in choosing mailing money order or check.
                unknown: it is unclear what payment method _user would like to choose or the _user has not selected or confirmed or mentioned a payment method yet.
                other: _user wants to pay by other payment method
              example: unknown
          len_msg_reflection: 4
          reflection_template: template_default
        - variables:
            struggling_situation:
              description:
                "yes": if the user describes experiencing financial hardship (such as loss of job, medical emergency, disability, or similar circumstances)
                "no": if the user is not struggling with their financial situation or they have not mentioned any financial hardship.
              example: "no"
      processing_variable:
        parsed_amount:
          tool: lib_tools.tools_kompato.parse_value
          params:
            value: self.dict_variable.amount
        monthly_amt_compared: #return below_min, above_min, equal_min
          tool: lib_tools.tools_kompato.amount_compare_to_list
          params:
            numbers_list:
