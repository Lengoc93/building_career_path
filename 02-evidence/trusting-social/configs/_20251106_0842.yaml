            number: self.dict_variable.monthly
        filler_ptp_amt:
          tool: lib_tools.tools_kompato.outbound_get_filler_ptp_amt #return full, below_min, above_min, unknown
        filler_ptp_date:
          tool: lib_tools.tools_kompato.outbound_get_filler_ptp_date # return today, not today, unknown
        filler_monthly_amt:
          tool: lib_tools.tools_kompato.outbound_get_filler_monthly_amt #return below_min, equal_above_min
        within_window:
          tool: lib_tools.tools_kompato.outbound_compare_window #return yes, before, after, invalid, unknown
          params:
            smagent: self
            max_post_day: 35
        invalid_payment_date_cnt:
          tool: lib_tools.tools_kompato.count_patterns
          params:
            current_count: self.dict_variable.invalid_payment_date_cnt
