action_code:
  - code: NLM
    description: Voicemail, not leave message - Voicemail encountered and there was no meaningful conversation with customer. The agent may provide their name and company information but DOES NOT mention the customer's name.
    condition: '{{ "pre_opening" in list_current_state }} and {{ "check_rpc" not in list_current_state }}'
  - code: LM
    description: Voicemail encountered , left message - Voicemail was encountered and the agent mentions the customer's name, or contained appropriate identification information e.g. "May I please speak to [Customer Name]".
    condition: '{{ "pre_opening" in list_current_state }} and {{ "check_rpc" in list_current_state }} and {{ dict_variable.voice_mail == "yes" }}'
  - code: HUP
    description: Hang Up - Call was disconnected immediately after customer picked up, with no information exchange. The customer may have answered but remained silent or hung up before any meaningful conversation could take place. This represents a failed contact attempt where no account or personal data was verified.
    condition: '{{ list_current_state[-1] == "check_rpc" }} and {{ dict_variable.rpc | default("unknown") == "unknown" }} and {{ dict_variable.exc | default("null") == "null" }}'
  - code: IDF
    description: ID Verification Failed - Customer fails ID verification or refuses to verify their identity through standard verification protocols. This may occur when the customer cannot provide correct information for DOB, SSN, or zip code verification, or when they refuse to participate in the verification process entirely.
    condition: '{{ "check_rpc" in list_current_state and "mini_miranda" not in list_current_state and dict_variable.voice_mail == "no" and ( (not dict_variable.is_dob_matched or dict_variable.is_dob_matched != "matched_unique") and (not dict_variable.is_ssn_matched or dict_variable.is_ssn_matched != "matched_unique") and (not dict_variable.is_zipcode_matched or dict_variable.is_zipcode_matched != "matched_unique") ) }}'
  - code: HUA
    description: Hang Up During Authentication - The customer confirmed their identity but disconnected during the formal ID verification process. The call ended while agent was attempting to verify personal information, such as date of birth, social security number, or zip code. This represents an incomplete verification attempt where the initial name confirmation was successful, but full verification was not completed.
    condition: '{{ dict_variable.rpc == "cus" }} and {{ list_current_state[-1] in ["verify_dob", "verify_ssn", "verify_zip_code"] }}'
  - code: NVR
    description: Name Verification Refused - Customer explicitly declined to confirm their full name, resulting in call termination. This may occur when the customer is suspicious of the call, concerned about privacy, or unwilling to engage with a collection effort. Without name confirmation, the conversation cannot legally proceed to account details.
    condition: '{{ list_current_state[-1] == "check_rpc" }} and {{ dict_variable.rpc == "unknown" and dict_variable.voice_mail == "no"}}'
  - code: IDV
    description: |
      ID Verification Successful - Customer successfully passed all required identity verification checks to confirm they are the intended recipient.
      The sucessful verification process must include 2 steps of confirmation: custmomer name and at least one of the following personal identifiers: date of birth, SSN, or address details.
    condition: '{{ "mini_miranda" in list_current_state }}'
  - code: TSR
    description: Transfer to Representative - Customer explicitly requested to speak with a human representative rather than continuing with the automated system. This request was acknowledged and confirmed, requiring the call to be routed to an available human agent. This transfer is tracked for quality assurance and staffing optimization purposes.
    condition: '{{ "exc_human_agent_request" in list_current_state }} and {{ dict_variable.human_request_confirmed == "human_request" }}'
  - code: INC
    description: Consumer Incapacitated - Third party reports that the account holder is physically or mentally incapacitated and unable to handle their financial affairs. This status requires documentation and special handling procedures including potential contact with legal guardians or power of attorney representatives. The account may require special disposition based on the nature and permanence of the incapacitation.
    condition: '{{ "exc_deceased" in list_current_state }} and {{ dict_variable.deceased_confirmed == "deceased" }} and {{ dict_variable.rpc == "not" }}'
  - code: LGB
    description: Language Barrier - Communication could not proceed effectively due to language differences between the caller and the customer. The customer indicated inability to understand or communicate in the language being used, making meaningful conversation impossible. This may require transfer to a bilingual agent or use of translation services for future contact attempts.
    condition: '{{ "exc_language" in list_current_state }} and {{ dict_variable.proceed_conversation == "no" }}'
  - code: RTP
    description: Refusal to Pay - Customer explicitly declined to make any payment on the account, ONLY after the creditor made MULTIPLE attempts to negotiate a resolution. Throughout the conversation, the creditor provided multiple payment plan or settlement options, all of which the customer rejected. The customer acknowledged the debt and consistently confirmed their unwillingness or inability to pay despite repeated efforts to find a solution. This outcome must be well-documented to ensure compliance and to inform future contact strategies. If the customer passes all verification checks but declines to make payment on the first attempt, the call should still be classified as "ID Verification Failed" instead of "Refusal to Pay."
    condition: '{{ "negotiation_from_script" in list_current_state }} and {{ dict_variable.promise == "no" }} and {{ dict_variable.negotiate == "no" }}'
  - code: RCR
    description: Recording Consent Refused - Customer explicitly declined consent for the call to be recorded, requiring call termination. Recording consent is often required for compliance, quality assurance, and legal protection purposes in collection calls. Without this consent, company policy typically prevents proceeding with account discussion. If the customer does not agree to be recorded, prioritize the call classification accordingly.
    condition: '{{ "exc_revoke_recording" in list_current_state }} and {{ dict_variable.record_consent in ["revoke", "concluded"] }}'
  - code: NCV
    description: Not Convenient - Customer indicated that the current time is inappropriate or inconvenient for this discussion. The customer confirmed they are the correct person but stated they are unable to engage in a financial conversation at this moment due to timing, location, or other circumstantial factors. This requires scheduling an alternative contact time.
    condition: '{{ "exc_inconvenient_time" in list_current_state }} and {{ dict_variable.busy_confirmed == "busy" }}'
  - code: CAB
    description: Callback Requested - Customer acknowledged the call but requested to be contacted at a specific future time that is more convenient for them. A specific callback date and time was established and confirmed with the customer for follow-up.
    condition: '({{ "exc_inconvenient_time" in list_current_state }} and {{ dict_variable.busy_confirmed == "busy" }} and {{ dict_variable.callback_time != "unknown" }} and {{ dict_variable.confirmed_contact == "confirmed" }}) or {{ "exc_cb" in list_current_state }}'
  - code: WCR
    description: Written Communication Only Requested - Customer has specifically requested that all future communications be conducted in writing only, with no phone calls. This preference was explicitly confirmed and must be honored according to consumer protection regulations. Future contact attempts must be limited to postal mail or other written communication methods as permitted by law.
    condition: '{{ "exc_cease_comms" in list_current_state }} and {{ dict_variable.exc_comms == "cease_all" }} and {{ dict_variable.exc_comms_confirmed == "confirmed" }}'
  - code: CDS
    description: Cease and Desist - Customer has formally requested the complete cessation of all communication attempts regarding this account. This legal request was acknowledged and confirmed, requiring immediate flagging in the system to prevent any further contact. Violation of cease and desist requests can result in legal penalties under consumer protection laws.
    condition: '{{ "exc_cease_comms" in list_current_state }} and {{ dict_variable.exc_comms_confirmed == "confirmed" }}'
  - code: CPR
    description: Complaint Received - Customer expressed dissatisfaction and formally registered a complaint about the account, collection practices, or other aspects of their experience. The nature of the complaint was documented but not fully resolved during the call. This requires escalation to appropriate departments for investigation and resolution according to consumer protection protocols.
    condition: '{{ "exc_complaint" in list_current_state }} and {{ dict_variable.complaint_confirmed == "complaint" }} and {{ dict_variable.complaint_addressed != "addressed" }}'
  - code: HCH
    description: |
      Hardship Concern - Customer has indicated financial difficulty, inability to pay, or circumstances preventing payment. This includes but is not limited to: unemployment, reduced income, medical expenses, family emergencies, divorce, disability, business closure, or any other legitimate financial constraints that impact their ability to meet payment obligations. Collection activities should be adjusted to explore hardship options and payment arrangements appropriate to the customer's situation.
    condition: ""
  - code: PPA
    description: Payment Plan Agreed - Customer has agreed to a structured payment plan with specific terms for resolving the debt. The arrangement includes defined payment amounts, frequencies, and duration as mutually agreed upon during the negotiation. This plan has been formally accepted and the customer has been transferred to complete payment details. There is a special case to detect, if the customer is unable to respond at the time and requests to be contacted later, the same classification should apply.
    condition: '{{ "payment_method_warm_transfer" in list_current_state }}'
  - code: PPIF
    description: Promise to Pay in Full - Customer has agreed to pay the entire outstanding balance in a single payment. They have confirmed the full amount due and committed to a specific payment date, but have not yet completed the actual payment transaction. Follow-up will be required to ensure the promised payment is received as scheduled.
    condition: '{{ "negotiation_from_script" in list_current_state }} and {{ dict_variable.promise == "yes" }} and {{ dict_variable.confirmed == "yes" }} and {{ dict_variable.filler_ptp_amt == "full" }}'
  - code: PSIF
    description: Promise to Settle in Full - Customer has accepted a discounted settlement offer that will resolve the account for less than the full balance. The settlement terms include a specific payment amount and timeline as agreed during negotiation, representing a mutually beneficial resolution. This agreement requires documentation and follow-up to ensure payment is received according to settlement terms.
    condition: >
      {{ "negotiation_from_script" in list_current_state }} and
      {{ dict_variable.promise == "yes" }} and
      {{ dict_variable.confirmed == "yes" }} and
      {{ dict_variable.amount == dict_variable.amount_settle_1 }} and
      {{ dict_variable.filler_ptp_amt != "full" }}
  - code: WRN
    description: Wrong Number - The person who answered the call indicated that they are not the intended recipient and have no connection to the account holder. It appears that the number is incorrectly linked to the account and should be removed from active contact attempts. Immediate updating of the contact information in the system is necessary to prevent further misdirected calls. If the conversation includes inappropriate language and the caller has not successfully passed all required identity verification checks to confirm they are the intended recipient, classify the call with the code "Wrong Number."
    condition: '{{ "check_rpc" in list_current_state }} and {{ dict_variable.rpc in ["wrong_number"]}}'
  - code: TPC
    description: Third-Party Contact - A person other than the account holder provided new or updated contact information for reaching the intended recipient. While not authorized to discuss account details, this third party offered alternative ways to reach the actual account holder or suggested that they could pass along the message to the account holder. This new contact information must be verified before being used for future communication attempts. If the caller is not the intended recipient, classify the call accordingly.
    condition: '{{ dict_variable.rpc in ["attorney", "not", "unknown"] }} and {{ dict_variable.exc_contact != "unknown" and dict_variable.voice_mail == "no" }}'
  - code: FRA
    description: Fraud Reported - Customer claims the account was created fraudulently or through identity theft without their knowledge or consent. The customer has denied responsibility for the debt based on fraudulent activity and requested investigation. This allegation requires immediate escalation for fraud investigation and potential reporting to credit bureaus and authorities.
    condition: '{{ "exc_dispute_theft" in list_current_state }} and {{ dict_variable.dispute_theft_confirmed == "confirmed" }}'
  - code: DNC
    description: Do Not Call - Customer has explicitly requested to be removed from all phone contact lists and to cease calling this specific phone number. This request must be honored immediately to comply with consumer protection regulations and company policies. The number should be flagged in the system to prevent future outbound calls. This differs from a complete cease and desist as it only applies to phone contact at this specific number, not all forms of communication. Proper documentation of this request is essential for compliance tracking.
  - code: DIS
    description: Debt Disputed - Customer has raised concerns regarding the accuracy, validity, or legitimacy of the debt. This includes disputes over the debt's ownership, amount, or previous payments not reflected in the current balance. Additionally, the customer may have identified errors in account information or requested formal validation documentation. This requires immediate account notation, suspension of collection activities, and investigation or validation in accordance with applicable regulations.
    condition: '{{ "exc_dispute" in list_current_state }} and {{ dict_variable.dispute_type != "no_dispute" }} and {{ dict_variable.dispute_type != "unknown" }} and {{ dict_variable.dispute_addressed == "not_addressed" }}'
  - code: CSM
    description: SCRA Coverage Reported - Customer verified active military service status which invokes special protections under the Servicemembers Civil Relief Act. The customer provided details about their military service including branch, status, and anticipated service period. SCRA protections include interest rate caps, foreclosure prevention, and other specific accommodations that must be immediately applied to the account.
    condition: '{{ "exc_military_service" in list_current_state }} and {{ dict_variable.active_service == "active" }} and {{ dict_variable.service_end_date != "unknown" or dict_variable.asked_service_end_date == "yes" }}'
  - code: PRS
    description: In Prison - Customer or third party confirmed that the account holder is currently incarcerated in a correctional facility. Details about the incarceration including facility location and expected release date may have been provided. This status requires special handling procedures and may affect collection strategies due to the customer's limited financial capabilities while imprisoned.
    condition: '{{ "exc_prison" in list_current_state }} and {{ dict_variable.prison_confirmed == "prison" }}'
  - code: LGH
    description: Legal Guardian Handling - A legally authorized guardian is managing the account holder's affairs due to the account holder's incapacity or death. The guardian provided verifiable information about their legal relationship to the account holder and their authority to discuss the account. Communication about the account must now be directed exclusively to this authorized representative.
    condition: '{{ "exc_deceased" in list_current_state }} and {{ dict_variable.deceased_confirmed == "deceased" }} and {{ dict_variable.exc_name != "unknown" }} and {{ dict_variable.exc_contact != "unknown" }}'
  - code: ATY
    description: Attorney Representation - Customer stated they have retained legal counsel to represent them regarding this debt, requiring all future communications be directed to their attorney. Select this call code if the caller or consumer lets you know that they are being represented by an attorney or lawyer (e.g. "I have an attorney" or "Speak to my lawyer" or "My lawyer told me not to talk to you. Please contact them instead")
    condition: '{{ "exc_attorney" in list_current_state }} and {{ dict_variable.exc_attorney_confirmed == "confirmed" }}'
  - code: BKP
    description: Bankruptcy - Customer reported current bankruptcy proceedings or intent to file bankruptcy that would include this account. The customer provided specific details about their bankruptcy filing including case number, chapter, and filing date. This legal status triggers immediate cessation of collection activities according to automatic stay provisions and requires verification with bankruptcy court records.
    condition: '{{ "exc_bankruptcy" in list_current_state }} and {{ dict_variable.filing != "unknown" }}'
  - code: DSA
    description: Debt Settlement Agreement - Customer stated they are working with a third-party debt settlement or consolidation program. The customer indicated that a professional debt management company is handling their debts, including this account. This requires special handling procedures including potential direct communication with the debt settlement company. Select this call code if Consumer claims they are with a program for debt/credit settlement, consolidation, relief, management or financial solutions
    condition: '{{ "negotiation_from_script" in list_current_state }} and {{ dict_variable.consolidation == "yes" }}'

# Special group call codes that apply codition mapping to detect
# lower order is higher priority
postprocess_callcodes:
  - code: HUA
    description: Fallback logic for IDV call code
    condition: '{{ call_code == "IDV" }} and {{ "mini_miranda" not in list_current_state }}'
  - code: IDV
    description: Fallback logic for IDF, NVR, HUA
    condition: '{{ call_code in ["IDF", "NVR", "HUA"] }} and {{ "mini_miranda" in list_current_state }}'
  - code: PTSR
    description: Customer does not pass RPC and call transfer successfully triggered - transferred
    condition: '{{ call_code == "TSR" }} and {{ "mini_miranda" not in list_current_state }}'
  - code: PNCV
    description: pre-RPC, not convenient
    condition: '{{ call_code == "NCV" }} and {{ "mini_miranda" not in list_current_state }}'
  - code: PCAB
    description: pre-RPC, call back
    condition: '{{ call_code == "CAB" }} and {{ "mini_miranda" not in list_current_state }}'
  - code: PAY
    description: Payment plan setup successfully, intent to pay
    condition: '{{ call_code in ["PPA", "PSIF"] }} and {{ "payment_method_warm_transfer" in list_current_state }}'
  - code: WFR
    description: Wait for representative
    condition: "{{ dict_variable.rpc == 'cus' }} and '{{ dict_variable.warm_transfer_sent }}' == 'yes' and '{{ dict_variable.transfer_result }}' != 'connected' "
  - code: PWFR
    description: pre-RPC wait for representative
    condition: "{{ dict_variable.rpc not in ['wrong_number', 'not'] }} and '{{call_code}}' != 'WRN' and '{{ dict_variable.warm_transfer_sent }}' == 'yes' and '{{ dict_variable.transfer_result }}' != 'connected' and {{ 'mini_miranda' not in list_current_state }} "
  - code: FTP
    description: Fail to pay via DTMF, but not transfer to Human agent or
    condition: >-
      (
        ('{{dict_variable.payment_init}}' == 'True' and '{{dict_variable.payment_result}}' != 'success') or
        ('{{dict_variable.payment_init}}' != 'True' and '{{dict_variable.first_payment_amount}}' not in ['', 'unknown'])
      ) and
      '{{ dict_variable.transfer_result }}' != 'connected'

prompt_detect_call_code: |
  You are a Collection Agent specialized in classifying conversations into the one to three most relevant call codes.
  Given abstracted conversation history, reflection variable values with their descriptions and List of call codes with their descriptions, your task to analyze and classify the conversation into the one to three most relevant call codes.

  # Instruction
  - Thoroughly analyze the conversation history, dictionary variable values, state variable descriptions, and call code descriptions.
  - Carefully review the conversation to select the one to three call codes that best fit the context and details of the exchange.
  - When reasoning, you may reference reflection variable values and descriptions if they help justify your choices, but focus primarily on the conversation context and call code descriptions.
  - Your justification should combine insights from the conversation, call code descriptions, and other inputs as relevant.

  #  Notes:
  - Consider all possible angles and variable values, not just the most direct or frequent call code.
  - Make sure the reasoning is clear, specific, and references the data provided.

  # Output Format
  - Return your reasoning in <reasoning> </reasoning> tags
  - Return list potential call code wrapped in <call_code_list> </call_code_list> tags.

  # Input Information

  ## Conversation History
  ```
  {conversation_history}
  ```
  ## List of Call Codes and Their Descriptions
  {call_code_descriptions}

  ## Reflection Variable Descriptions
  ```json
  {reflection_variable_descriptions}
  ```

  ## Reflection Variable Values
  {reflection_variable_values}

  # Example Output
  <reasoning>
  Your concise reasoning for the classification.
  </reasoning>
  <call_code_list>
  ["CALL_CODE_1", "CALL_CODE_2", "CALL_CODE_3"]
  </call_code_list>

prompt_detect_dispute: |
  # Objective
  You are a reviewer agent in the finance and banking sector.
  You will receive a transcript of a phone call related to debt collection and recovery, located in the section PHONE_CALL_TRANSCRIPT.
  The transcript records the conversation of 2 roles: the debt collector (assistant) and the customer (user).

  Your task is to analyze this transcript, detect if any dispute being addressed in the transcript, classify and generate a concise dispute_reason summarizing the customer's specific claim.

  # DISPUTE_CATEGORIES
  - `dispute_balance`: if _user has dispute about the balance of the debt, the charges (for example 'We agreed to a $500 discount but the portal is still showing the original amount', 'The creditor promised me I would not need to pay late fees', 'This balance is too high because…', 'I was charged for this account, but I never received the item', 'I refunded this charge, but it still showed up on my account'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
  - `dispute_paid`: if _user has dispute that they already paid the debt (for example 'I paid the full amount via bank transfer six months ago. Can you confirm this on your end?', 'I settled this debt last year with a check. Why is it still showing as unpaid?', 'I made a payment directly to the creditor last year. This should be updated in your records.', 'I have already paid off this debt through your online portal. Can you verify the payment?', 'I cleared this balance with a credit card payment last 2 years. Please check and confirm it has been received'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
  - `dispute_theft`: if _user explicitly informs us that they are a victim of identity theft (e.g. "I received a notification about a debt in my name that I never incurred.", "I found out someone used my identity to open an account.", "This debt is not mine; I suspect my identity has been stolen.", "I noticed unfamiliar charges under my name that I never authorized.", "I believe my personal information was used fraudulently to create this debt.").; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
  - `dispute_txn_fraud`: if _user explicitly informs us that they are a victim of transaction fraud, where someone has unauthorized access to their account information and makes purchases without their consent. Examples include statements like "I noticed purchases on my account that I did not authorize.", "My account was charged for items I did not buy.", "I received a notification about a transaction I never made.", "There are unfamiliar transactions on my statement that I did not initiate.", "Someone used my account information to make unauthorized purchases."; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.

  # PHONE_CALL_TRANSCRIPT
  ```
  {conversation_transcript}
  ```

  # Instructions
  1. Read the transcript carefully.
  2. Classify the dispute into one of DISPUTE_CATEGORIES
  3. Detect the dispute reason that user implied or explicitly stated in the conversation. The reason is a short, neutral summary (1-2 sentences) that captures the core of the customer's claim and must clearly explain why the customer believes the debt is incorrect.

prompt_detect_payment_plan: |
  ## Context
  You are provided with a conversation between a consumer and bank agent, located in the section Conversation transcript.
  Your goal is to output a Python dictionary containing all payment plan details discussed in the transcript, using the provided current balance and (if available) settlement amount.

  ## FIELD DEFINITIONS

  - **1st_amount:**
      The amount of the first payment in USD, which amount the user agrees to pay initial, if the user does not agree to pay and/or does not mention an amount, return 'unknown'
      Example: "100.0"

  - **1st_date:**
      The clearly stated date (YYYY-MM-DD) for the first payment. If the first payment date is not mentioned, return 'unknown'. Do not guess, infer, or fabricate the date. First payment date should be in calling date or in the future.
      Example: "2025-03-25"

  - **2nd_amount:**
      The amount of the second payment in USD after the first payment, if the user does not agree to pay and/or does not mention an amount, .
      If installments, return the amount of the first installment. In case of full payment, return 0.0
      Example: "0.0"

  - **2nd_date:**
      The clearly stated date (YYYY-MM-DD) for the second payment after the first payment. If there is no second payment (e.g., only a single, one-off payment is scheduled), return 'unknown'. Second payment date should be in the future.
      Example: "2025-03-25"

  - **n_installments:**
      The number of installments in the payment plan
      Example: 12

  - **payment_plan_total:**
      This represents the total payment amount, which should be equal to or less than the {total_charge_amount} and must accurately reflect the user's agreed total amount. Make sure the total of all payment amounts does not surpass the {total_charge_amount} and matches the user's agreed terms.
      (do math if necessary, Total debt outstanding balance is {total_charge_amount})
  ---

  ## INSTRUCTIONS
  - If the customer does not clearly promise a payment date but agree to pay before a certain date, return that date for first date paying
  - If the customer does not clearly state a payment date and no date was agreed upon, always return 'unknown' for first_payment_date, regardless of payment plan offered.
  - If the customer specifies a recurring payment day (e.g., "the twenty"), calculate the first occurrence of that day that is AFTER the call date (not on or before **only if a specific day was agreed upon.**.
      - If the specified day of the month is **greater than** the call date's day, use that day in the current month.
      - If the specified day of the month is **less than or equal** to the call date's day, use that day in the **next month**.
      - The first payment date must **never** be before the call date.
  - If the information is unclear or ambiguous, output None.
  - Do not include explanations.
  - **Override any mentioned delay: Ensure the first payment date is within 30 days of the calling date.**
  - If the user mentions both a potential delay and a specific day of the month and that date is before the calling date, always choose the specific date in NEXT MONTH (the next specific day after the calling date).
  - If the user requests recurring monthly payments on a specific day of the month and the start date is ambiguous, always use the next occurrence of that day after the calling date.
  - If the first payment date is before the calling date, use the same day in the next month **only if a specific day was agreed upon.**
  ---

  ### Provided total charge amount
  {total_charge_amount}

  ### Calling date
  {call_date}

  ### Conversation transcript
  {conversation_transcript}

prompt_detect_callback_info: |
  # Objective
  You are a date and time parsing assistant. Your task is to:
  1. Convert natural language expressions of time into a structured date and time format
  2. Detect if the customer specifically requested a human callback

  # Input Information
  - Full conversation transcript:
  ```
  {{conversation_transcript}}
  ```
  {% if time_callback_raw %}
  - Raw callback time expression: {{time_callback_raw}}
  {% endif %}
  - Current call date (reference date): {call_date} which is {{ssml_call_date}}
  - Current day of the week: {{day_of_week}}

  # Instructions
  1. Interpret the raw callback time expression relative to the original call date.
  2. Identify if the callback should be:
      - Later the same day (e.g., "later today", "this afternoon", "in a few hours")
      - Next day (e.g., "tomorrow", "tomorrow morning")
      - A specific future date (e.g., "next Monday", "on the 15th")
      - At a specific time (e.g., "9 AM", "at 3 PM", "afternoon")
      - If user mentioned "Anytime" and have not provided specific day and time --> extract call back date as tommorrow 9AM

  3. Return a call back day in format (YYYY-MM-DD) if not available, return "unknown". Wrap the day in <day> </day> tags.
  4. Return a call back time in format (HH:MM) if not available, return "unknown". Wrap the time in <time> </time> tags.
  5. Analyze if the customer specifically requested a human callback. Look for phrases like:
      - "I want to speak to a real person"
      - "Can a human call me back"
      - "I need to talk to an actual person"
      - "No bots/robots/AI"
      Return "true" if human callback requested, "false" if not, "unknown" if not clear. Wrap in <human_callback> </human_callback> tags.
  6. Put all results in <output> </output> tags.

  # Response Format
  <output>
  <day>2024-01-20</day>
  <time>14:30</time>
  <human_callback>unknown</human_callback>
  </output>

extracted_info:
  # Classifies if the call was just an attempt or resulted in actual communication
  contact_classification:
    sm_variable: "{% if check_rpc in list_current_state %}Communication{% else %}Attempt{% endif %}"
    dtype: string

  consent:
    # Raw text of the requested callback time/schedule
    time_to_call_back_raw:
      sm_variable: '{{dict_variable.callback_time | default(dict_variable.exc_cb_schedule | default(dict_variable.review)| default("unknown")) }}'
      dtype: string

    # Flag indicating if any form of Do Not Call was requested
    do_not_call:
      sm_variable: >-
        {% if "mini_miranda" in list_current_state %}
          {{
            call_code in ["DNC", "CDS"] or
            dict_variable.exc_cb_consent == "never" or
            dict_variable.exc_cb == "no" or
            dict_variable.human_call == "revoke" or
            (dict_variable.exc_comms_confirmed == "confirmed" and dict_variable.exc_comms in ["call", "cease_all"])
          }}
        {% else %}unknown
        {% endif %}
      dtype: bool

    # user requested human to call back specifically
    human_to_call_back:
      sm_variable: >-
        {% if dict_variable.human_request_confirmed | default('unknown') == 'human_request' %}True
        {% elif dict_variable.human_request_confirmed == 'not_human_request' %}False
        {% else %}unknown
        {% endif %}
      dtype: bool

    # Flag indicating if user consented specifically to callback within the default period (often 7 days)
    consent_to_contact_within_7_days:
      sm_variable: >
        {% if dict_variable.exc_cb_consent | default('unknown') in ['yes', 'sooner'] %}True
        {% elif dict_variable.exc_cb_consent == 'never' %}False
        {% else %}unknown
        {% endif %}
      dtype: bool

  consents:
    - category: debt_via_human_call
      medium: ai_voice_call
      entity: phone_number
      availability: {}
      status:
        sm_variable: >-
          {% if "mini_miranda" in list_current_state %}
            {% if (
              call_code in ["DNC", "CDS"] or
              dict_variable.exc_cb_consent == "never" or
              dict_variable.exc_cb == "no" or
              dict_variable.human_call == "revoke" or
              (dict_variable.exc_comms_confirmed == "confirmed" and dict_variable.exc_comms in ["call", "cease_all"])
            ) %}False
            {% elif dict_variable.cb_consent == "agree" %}True
            {% endif %}
          {% else %}unknown
          {% endif %}
        dtype: bool

    - category: debt_via_ai_call
      medium: ai_voice_call
      entity: phone_number
      availability: {}
      status:
        sm_variable: >-
          {% if "mini_miranda" in list_current_state %}
            {% if (
              call_code in ["DNC", "CDS"] or
              dict_variable.exc_cb_consent == "never" or
              dict_variable.exc_cb == "no" or
              dict_variable.human_call == "revoke" or
              (dict_variable.exc_comms_confirmed == "confirmed" and dict_variable.exc_comms in ["call", "cease_all"])
            ) %}False
            {% elif dict_variable.cb_consent == "agree" %}True
            {% endif %}
          {% else %}unknown
          {% endif %}
        dtype: bool

    - category: debt_via_sms
      medium: ai_voice_call
      entity: phone_number
      availability: {}
      status:
        sm_variable: >
          {% if dict_variable.text_consent == "no" %}False
          {% elif dict_variable.text_consent == "yes" %}True
          {% else %}unknown
          {% endif %}
        dtype: bool

  # Bankruptcy information
  bankruptcy_info:
    status:
      sm_variable: >
        {% if dict_variable.filing == "filed" %}filed
        {% elif dict_variable.filing != "unknown" %}not_filed
        {% else %}unknown
        {% endif %}
      dtype: string
    case_number:
      sm_variable: "{{dict_variable.exc_bankruptcy_case}}"
      dtype: string

  # Attorney information
  attorney_info:
    attorney_name:
      sm_variable: "{{dict_variable.exc_attorney_name}}"
      dtype: string
    attorney_phone:
      sm_variable: "{{dict_variable.exc_attorney_phone}}"
      dtype: string
    attorney_contact:
      sm_variable: "{{dict_variable.exc_attorney_contact}}"
      dtype: string

  id_verify:
    dob_raw:
      sm_variable: "{{dict_variable.mob}}-{{dict_variable.dob}}"
      dtype: string
    ssn:
      sm_variable: "{{dict_variable.ssn}}"
      dtype: string
    zip_code:
      sm_variable: "{{dict_variable.zip_code}}"
      dtype: string
    rpc:
      sm_variable: >-
        {% if "mini_miranda" in list_current_state %}True
        {% else %}False
        {% endif %}
      dtype: bool

  payment_plan_v0:
    partial_payment_amount:
      sm_variable: "{{dict_variable.monthly}}"
      dtype: number
    revisit_date:
      sm_variable: "{{dict_variable.review}}"
      dtype: string
    emi_amount:
      sm_variable: "{{dict_variable.monthly}}"
      dtype: number
    emi_frequency:
      sm_variable: "{{dict_variable.months}}"
      dtype: string
    start_date:
      sm_variable: "{{dict_variable.first_date}}"
      dtype: string
    number_of_payments:
      sm_variable: "{{dict_variable.months}}"
      dtype: number
    revisit_after_raw:
      sm_variable: "{{dict_variable.review}}"
      dtype: string
    payment_plan_total:
      sm_variable: "{{dict_variable.amount}}"
      dtype: number
    payment_type:
      sm_variable: "{{dict_variable.method}}"
      dtype: string

  payment_plan:
    sm_variable: "{{dict_variable.payment_plan}}"
    dtype: dict

  payment:
    sm_variable: "{{dict_variable.processed_payment_result}}"
    dtype: dict

llm_config:
  model: gpt-4o-2024-11-20
  use_llm_hub: true

compliance_agent_configs:
  usecase_id: compliance_qa
  model_configs:
    model: gemini-2.5-flash
    temperature: 0.0
    max_tokens: 15000
    use_llm_hub: true

  # tt_20251023_1800
  prompt_configs:
    expected_input: |
      You are provided with the entire conversation between the collector and the debtor. Each line has the following format: `[role]: [line]`, where:
      - `role` indicates whom is speaking, and can take only two values, 'user' for the debtor/customer/consumer, and 'assistant' for the bank agent/collector.
      - `line` is the message spoken by the debtor or the bank agent (depending on the role).

    expected_output: |
      Return the output in list of mutiple dict, where each item is the answer to one question. Each item MUST contain these keys:
      - `code`: The question code (e.g., "PAR_C0_Q1"), as provided in the questionaire
      - `reasoning`: Return `No issue` if the assistant satisfied the question. If the assistant made a mistake and failed the task, explain why in details. If the condition for the behavior never occurred, make a note of that.
      - `evidence`: Return the excerpt of the turn (or turns) in the conversation where the assistant satisfied or failed the question. If there is no exact excerpt, provide a summary or insights found from the conversation. If no evidence is present in the conversation, return `No evidence found`. Make it short.
      - `evidence_cat`:
        - `strong`: if the evidence is shown clearly in the conversation via exact keyword or direct quote
        - `weak`: if it is partially present or can be implied in the conversation, or uncertainty
        - `not_found`: if no evidence is found in the transcript
      - `answer`: Provide an answer to a question by responding with only "yes", "no", or "na", followed by the possible answers to that question itself. Do not give any explanation here.
        - `yes: The required behavior was fully observed.
        - `no`: The required behavior was contradicted.
        - `na`: The requirement of the question did not become relevant during the call, meaning the agent was not expected to perform that action based on the call's events.


      **IMPORTANT**: You MUST return as many items in your output as the number of questions provided in the questionnaire.

      The output must be in this JSON format, for example:

      [
        {{
          "code": "S1_PAR_04_1",
          "reasoning": "The assistant asked to speak with the intended customer using the name on record.",
          "evidence": "At the beginning of the call, the assistant asked 'Am I speaking with Jennifer Galloway?'",
          "evidence_cat": "strong",
          "answer": "yes"
        }},
        {{
          "code": "S1_PAR_02_2",
          "reasoning": "The customer has a third-party handling their debt.",
          "evidence": "When the assistant informed the customer about their debt, the customer said 'Someone has been taking care of it for me' then hang up without clarifying if the third-party was an attorney or a debt settlement company.",
          "evidence_cat": "weak",
          "answer": "yes",
        }},
        {{
          "code": "SVI_L&R_01_2",
          "reasoning": "The customer said `Sorry, maybe not.`, which is not explicitly denied.",
          "evidence": "assistant: Thank you for confirming. To protect your privacy, could you please provide your day and month of birth?\nuser: Sorry, maybe not.",
          "evidence_cat": "week",
          "answer": "no",
        }},
        {{
          "code": "VM_TT_03",
          "reasoning": "No voicemail detected in this conversation.",
          "evidence": "The customer confirmed their identity, and the assistant proceeded with processing the debt flow.",
          "evidence_cat": "not_found",
          "answer": "na",
        }},
        ...
      ]

    template: |
      ## Context

      In this call, a bank agent (also referred to as "assistant" or "collector") and a customer (also referred to as "user" or "debtor") engage in a conversation for the purpose of debt collection.

      ## Objectives

      You are a Quality Assessment expert in AI compliance guardrails. Your task is to check if the input conversation complies with federal rules, which are expressed as a list of Yes-No questions. Each question in the list has a code name (e.g., 'S1_PAR_04'), and a description in the form of a closed-ended question.
      You must consider these questions in separately.

      ## In-context-information

      ** Required Disclosure **
        - Identity verification & agency disclosure ("Kompato").
        - The call-recording disclosure is: "on a recorded line" OR "Any information obtained will be used for that purpose".
        - The mini-Miranda disclosure is: "I must advise that this is an attempt to collect a debt by a debt collector. Any information obtained will be used for that purpose."
        - The consent to call back is: "Could I call you back if we're disconnected?".

      The **debt-details** mentioned by AI contains:
        - Debt balance or amount owed (e.g. "$4500", "you owe")
        - Payment amount or plan (e.g. "monthly payment of $50", "we can settle for 60%")
        - Account status (e.g. "your account is past due", "delinquent")
        - Due date or payoff timeline (e.g. "payment is due on the 15th")
        - Settlement offer or discount (e.g. "we can settle for $2,698")
        - Confirmation that consumer has a debt (e.g. "you have an outstanding account")
        - Prior payment history (e.g. "you missed 3 payments", "your last payment was in June")
        Considered as NOT the debt details:
        - mentioning the creditor’s name only (e.g. "calling from MoneySpot")
        - asking general permission to discuss account
        - consumer-initiated mentions of money, unless AI confirms or repeats it
        - call's purpose
        - mini-Miranda disclosure

      The **sensitive information** of the debtor (user):
        - full PAN (primary account number)/ CVV/ bank/ routing/ full SSN / last 4 SSN

      ## Expected Input Format

      {expected_input}

      ## Expected Output Format

      {expected_output}

      ## Questions

      {questionaire}

      ## Input

      The conversation to be assessed for compliance is the following:
      ```
      {conversation}
      ```

  # Atomic compliance questions
  questions:
    PAR_C0_Q1:
      card_id: PAR
      case_id: PAR_C0
      context: During call
      description: |
        Did AI mention any debt details in this call?
      possible_answers: yes | no
      evidence_source: conversation_history
      requirement_level: Soft
      applicability: Normal
      target_answer: optional
      product_description: Were this call including any debt details?
      reversed_evidence: yes
    PAR_C1_Q1:
      card_id: PAR
      case_id: PAR_C1
      context: Pre-call
      description: "{'start': '08:00', 'end': '21:00'}"
      possible_answers: yes | no | na
      evidence_source: event_timestamp
      requirement_level: Hard
      applicability: Gating
      target_answer: 'Yes'
      product_description: Is this call happening within time window 8.am -> 9.pm local time?
      applicable_direction: outbound
    PAR_C2_Q1:
      card_id: PAR
      case_id: PAR_C2
      context: Pre-call
      description: "{'can_call': True, 'can_ai_call': True}"  # yes/no/nan
      possible_answers: yes | no | na
      evidence_source: raw_call_assignment
      requirement_level: Hard
      applicability: Gating
      target_answer: 'Yes'
      product_description: Field 'can_call' and field 'can_ai_call' is TRUE?
      applicable_direction: outbound
    PAR_C2_Q2:
      card_id: PAR
      case_id: PAR_C2
      context: During call
      description: |
        Did the consumer state they are represented by an attorney OR working with a debt settlement company?
        If the representation/third-party involvement was never mentioned, return 'na'.
      possible_answers: yes | na
      evidence_source: conversation_history
      requirement_level: Soft
      applicability: Normal
      target_answer: optional
      product_description: Did the consumer state they are represented by an attorney OR working with a debt settlement company?"
    PAR_C2_Q3:
      card_id: PAR
      case_id: PAR_C2
      context: During call
      description: "['attorney_name']"
      possible_answers: yes | no | na
      evidence_source: extracted_info
      requirement_level: Hard
      applicability: Gating_If(PAR_C2_Q2)
      target_answer: 'Yes'
      product_description: Was the account/system updated to mark attorney/DSC representation and cease direct contact?
    PAR_C3_Q1:
      card_id: PAR
      case_id: PAR_C3
      context: During call
      description: |
        Did the consumer explicitly mention the number is a workplace number OR ask not to be called at work?
        If the consumer never mentioned workplace status or work-related contact restrictions, return 'na'.
      possible_answers: yes | na
      evidence_source: conversation_history
      requirement_level: Hard
      applicability: Normal
      target_answer: optional
      product_description: Did the consumer explicitly mention the number is a workplace number OR ask not to be called at work?
    PAR_C3_Q3:
      card_id: PAR
      case_id: PAR_C3
      context: During call
      description: |
        Did the speaker (user) appear to be a voicemail automated answering machine? Common phrases may include `This is a message for...`, `Please leave a message after the tone.`, `I'm not available right now.`, `At the beep...`, `You've reached the voicemail of...`, `Please call me back at...`, `I'll get back to you soon.`, `Sorry I missed your call.`, `[Name] is currently not available`, `Press [number] for [department/option]`, `Enter the extension`, `May be recorded and used by a third party`, `Hi, if you record your name and reason for calling, I'll see if this person is available` or other similar phrases.
          - yes: If the the speaker (user) appear to be a voicemail
          - na: otherwise
      possible_answers: yes | na
      evidence_source: conversation_history
      requirement_level: Bonus
      applicability: Normal
      target_answer: optional
      product_description: Was voicemail detected?
    PAR_C3_Q4:
      card_id: PAR
      case_id: PAR_C3
      context: For outbound call only
      description: |
        If no voicemail was detected, return 'na'.

        Else, voicemail was detected, did agent/AI hang up without leaving a message OR use approved template, such as:  "Hi, this is [agent name], a virtual agent calling from [company]. Please contact me or any of our live agents at [hotline]. Live agents are available from 9am to 5pm Eastern Monday to Friday, and virtual agents are available 24 hours a day for your convenience."
      possible_answers: yes | no | na
      evidence_source: conversation_history
      requirement_level: Soft
      applicability: Gating_If(PAR_C3_Q3)
      target_answer: 'Yes'
      product_description: If voicemail was detected, did agent/AI hang up without leaving a message OR use approved template?
    PAR_C4_Q1:
      card_id: PAR
      case_id: PAR_C4
      context: During call
      description: |
        Requirement: If the collector (assistant) did not mention any debt details, OR the call never reached identity (immediate hang‑up, VM, wrong number upfront, third party, transfer before verification), return 'na'.

        Else, were the required identity (name) questions asked?
          - 'yes': if the collector mentioned debt details, AND inquired about the identity (name)?
          - 'no': if the collector mentioned debt details, AND did not inquire about the identity (name)?
      possible_answers: yes | no | na
      evidence_source: conversation_history
      requirement_level: Hard
      applicability: Gating_If(PAR_C0_Q1)
      target_answer: 'Yes'
      product_description: Were the required identity (name) questions asked?
    PAR_C4_Q2:
      card_id: PAR
      case_id: PAR_C4
      context: Before discussing account details
      description: |
        Requirement: If the collector (assistant) did not mention any debt details OR not inquire about identity (name), return 'na'.

        Else, were the required identity (name) questions confirmed by consumer?
        - yes: if the user explicitly confirm it
        - no: otherwise
      possible_answers: yes | no | na
      evidence_source: conversation_history
      requirement_level: Hard
      applicability: Gating_If(PAR_C0_Q1)
      target_answer: 'Yes'
      product_description: Were the required identity (name) questions confirmed by consumer?
    PAR_C4_Q3:
      card_id: PAR
      case_id: PAR_C4
      context: Before discussing account details
      description: |
        Requirement: If the collector (assistant) did not mention any debt details OR the call never reached identity (immediate hang‑up, VM, wrong number upfront, third party, transfer before verification), return 'na'.

        Else, were the required identity (DOB) questions asked?
      possible_answers: yes | no | na
      evidence_source: conversation_history
      requirement_level: Hard
      applicability: Gating_If(PAR_C0_Q1)
      target_answer: 'Yes'
      product_description: Were the required identity (DOB) questions asked?
    PAR_C4_Q4:
      card_id: PAR
      case_id: PAR_C4
      context: Before discussing account details
      description: |
        Requirement: If the collector (assistant) did not mention any debt details OR not inquire about DOB, return 'na'.

        Else, when the collector (assistant) asked for the date of birth on file or in their records, did the debtor (user) immediately provide confirmation or a response?
          - yes: if the user immediately provides or confirms it.
          - no: if the user disputes it, or does not confirm.
      possible_answers: yes | no | na
      evidence_source: conversation_history
      requirement_level: Hard
      applicability: Gating_If(PAR_C0_Q1)
      target_answer: 'Yes'
      product_description: Were the required identity (DOB) questions confirmed by consumer?
    PAR_C4_Q5:
      card_id: PAR
      case_id: PAR_C4
      context: During call
      description: |
        Requirement: If the consumer (user) did not request cease contact, OR did not indicate wrong party, return 'na'.

        Did the consumer (user) directly request to stop calling, or did they explicitly say that it was a wrong number (by only saying exactly phrases as `wrong number`, `not me`, `I am not [debtor]`, or `incorrect person`)?
      possible_answers: yes | na
      evidence_source: conversation_history
      requirement_level: Bonus
      applicability: Normal
      target_answer: optional
      product_description: Did consumer request for 'stop calling'?
    PAR_C4_Q6:
      card_id: PAR
      case_id: PAR_C4
      context: During call
      description: "{'do_not_call': True}"  # yes/no/na
      possible_answers: yes | no | na
      evidence_source: extracted_info
      requirement_level: Soft
      applicability: Gating_If(PAR_C4_Q5)
      target_answer: 'Yes'
      product_description: Was a cease/opt-out flag (or any) logged after call end?

    DC_C1_Q2:
      card_id: DC
      case_id: DC_C1
      context: During call
      description: |
        Requirement: Return 'na' if:
          - the collector (assistant) did not mention any debt details,
          - OR, the call never reached identity (immediate hang‑up, VM, wrong number upfront, third party, transfer before verification).

        Else, were all debt details disclosed after RPC completion (if applicable)?
      possible_answers: yes | no | na
      evidence_source: conversation_history
      requirement_level: Hard
      applicability: Gating
      target_answer: 'Yes'
      product_description: Weren't any debt details spoken before RPC completion?
      evidence_category: WEAK
    DC_C2_Q1:
      card_id: DC
      case_id: DC_C2
      context: During call
      description: |
        The RPC (Right Party Contact) involves 2 steps:
            1. Verify full name
            2. Verify DOB

        Requirement: Return 'na' if:
            - the collector (assistant) did not mention any debt details,
            - OR, no RPC attempt occurred (meaning the assistant did not attempt to verify the consumer's full name or date of birth)
            - OR, the RPC success.

        Else, if the collector mentioned the any debt details, did the RPC process fail, remain incomplete, or did the speaker identify themselves as a third party (not the intent debtor)?
            - 'yes': the RPC failed, or the speaker identify themselves as a third party
      possible_answers: yes | na #  modify
      evidence_source: conversation_history
      requirement_level: Bonus
      applicability: Normal
      target_answer: optional
      product_description: Did RPC fail OR did the speaker identify as a third party (not the debtor)?
    DC_C2_Q2:
      card_id: DC
      case_id: DC_C2
      context: During call
      description: |
        If the collector (assistant) did not mention any debt details OR no RPC attempt occurred OR no failed/not completed RPC/third‑party identification occurred (RPC success), return 'na'.

        Else, from the moment the user explicitly denied being the debtor/right party contact (RPC), did the assistant cease all further discussion or disclosure of the debt details?
          - 'yes': if the assistant did not mention any debt details in further discussion,
          - 'no': otherwise
      possible_answers: yes | no | na
      evidence_source: conversation_history
      requirement_level: Hard
      applicability: Gating_If(DC_C2_Q1)
      target_answer: 'Yes'
      product_description: Weren't debt details revealed after the failed RPC/third-party identification?
      evidence_category: WEAK
    DC_C3_Q1:
      card_id: DC
      case_id: DC_C3
      context: During call
      description: |
        If the collector (assistant) did not mention any debt details OR the call never reached mini‑Miranda, return 'na'.

        Else, did the collector delivered the mini-Miranda before mentioning any debt details?
      possible_answers: yes | no | na
      evidence_source: conversation_history
      requirement_level: Hard
      applicability: Gating
      target_answer: 'Yes'
      product_description: Weren't any debt details mentioned prior to mini-Miranda?
      evidence_category: WEAK
    DC_C4_Q1:
      card_id: DC
      case_id: DC_C4
      context: During call
      description: |
        If the collector (assistant) did not mentioned any debt details, return 'na'.

        After RPC success, was a mini-Miranda disclosure detected?
          - If the call never reached mini‑Miranda state or RPC was unsuccessful, return 'na'.
          - If the call mentioned debt details without mini-Miranda statement, return 'no'.
      possible_answers: yes | no | na
      evidence_source: conversation_history
      requirement_level: Hard
      applicability: Gating_If(PAR_C0_Q1)
      target_answer: 'Yes'
      product_description: Was a mini-Miranda disclosure detected?
    DC_C4_Q2:
      card_id: DC
      case_id: DC_C4
      context: After RPC
      description: |
        Did the disclosure include all required elements (collector, attempt to collect, use of info)?
        If no mini-Miranda process OR RPC did not completed, return 'na'.
      possible_answers: yes | no | na
      evidence_source: conversation_history
      requirement_level: Hard
      applicability: Normal_If(DC_C4_Q1)
      target_answer: 'Yes'
      product_description: Did the disclosure include all required elements (collector ID, attempt to collect, use of info)?
    DC_C4_Q3:
      card_id: DC
      case_id: DC_C4
      context: After RPC
      description: |
        If the conversation did not mention mini-miranda OR debt details, return 'na'.

        Was the mini-Miranda delivered **before** the first debt-detail mention?
        If the conversation mentioned only upto mini-miranda (without any debt details discussion), return 'yes'.
      possible_answers: yes | no | na
      evidence_source: conversation_history
      requirement_level: Hard
      applicability: Normal_If(DC_C4_Q1)
      target_answer: 'Yes'
      product_description: Was the mini-Miranda delivered **before** the first debt-detail mention? (hard timing rule)
    DC_C4_Q4:
      card_id: DC
      case_id: DC_C4
      context: During call
      description: |
        Was the mini-Miranda delivered **after** RPC completion?
        If no mini-Miranda process, return 'na'.
      possible_answers: yes | no | na
      evidence_source: conversation_history
      requirement_level: Soft
      applicability: Normal_If(DC_C4_Q1)
      target_answer: 'Yes'
      product_description: Was the mini-Miranda delivered **after** RPC completion? (soft policy preference)
    DC_C4_Q5:
      card_id: DC
      case_id: DC_C4
      context: During call
      description: |
        Was a call-recording disclosure delivered?
        If the collector (assistant) did not ask for or mention call-recording, return 'na'.
      possible_answers: yes | na
      evidence_source: conversation_history
      requirement_level: Hard
      applicability: Normal
      target_answer: optional
      product_description: Was a call-recording disclosure delivered?
    DC_C4_Q6:
      card_id: DC
      case_id: DC_C4
      context: During call
      description: |
        Did the consumer agree/ not refuse the consent about call-recording?
          - If the collector (assistant) did not ask for or mention call-recording, return 'na'.
          - If the collector denied it, return 'no'.
      possible_answers: yes | no | na
      evidence_source: conversation_history
      requirement_level: Soft
      applicability: Normal_If(DC_C4_Q5)
      target_answer: optional
      product_description: Did the consumer deny consent to be recorded?
    DC_C5_Q1:
      card_id: DC
      case_id: DC_C5
      context: After disclosures, before negotiation
      description: |
        Did the agent/AI ask for permission to call back if disconnected?
        If the collector (assistant) did not ask for consent to call back if disconnected, return 'na'.
      possible_answers: yes | na
      evidence_source: conversation_history
      requirement_level: Soft
      applicability: Normal
      target_answer: optional
      product_description: Did the agent/AI ask for permission to call back if disconnected?
    DC_C5_Q2:
      card_id: DC
      case_id: DC_C5
      context: After RPC
      description: |
        If the agent/AI (collector) asked for permission to call back if disconnected, did the consumer (user) confirm it?
        - If the agent/AI (collector) does not ask for permission to call back if disconnected, return 'na'.
        - If the agent/AI (collector) asked for permission to call back if disconnected and they confirmed it, return 'yes', else return 'no'.
      possible_answers: yes | no | na
      evidence_source: conversation_history
      requirement_level: Soft
      applicability: Normal
      target_answer: optional
      product_description: Did the consumer deny callback consent to OR NOT CONFIRM?
    DC_C6_Q1:
      card_id: DC
      case_id: DC_C6
      context: After voicemail detection
      description: |
        If a voicemail message was left (even just partial message), did it contain the following **required information** without including any additional or unnecessary details?
        **required information**
            - The name of the business or organization making the call (MUST not mention/imply the call is related to debt collection)
            - AND, a hotline number
        **optional information (these can be included but are not required):**
            - OR, a request that you reply, including the names of the individuals you can contact
            - OR, a salutation
            - OR, the date and time of the message
            - OR, suggeste dates and times for you to reply
            - OR, if you may speak to any of the company’s representatives, designating it as a `limited-content message`.

        If no voicemail message was left, return 'na'.
      possible_answers: yes | no | na
      evidence_source: conversation_history
      requirement_level: Soft
      applicability: Normal
      target_answer: optional
      product_description: If a voicemail was left, did it include required information
        and not include any other information?

    PCE_C1_Q1:
      card_id: PCE
      case_id: PCE_C1
      context: During call
      description: Did the agent/AI NOT utter any unlawful or misleading threats (e.g., jail, police, immediate lawsuit without basis)?
      possible_answers: yes | no
      evidence_source: conversation_history
      requirement_level: Hard
      applicability: Gating
      target_answer: 'Yes'
      product_description: Did the agent/AI NOT utter any unlawful or misleading threats (e.g., jail, police, immediate lawsuit without basis)?
      reversed_evidence: yes
    PCE_C1_Q2:
      card_id: PCE
      case_id: PCE_C1
      context: During call
      description: Did the agent/AI NOT imply coercive consequences not permitted (credit blacklisting, immigration threats, etc.)?
      possible_answers: yes | no
      evidence_source: conversation_history
      requirement_level: Hard
      applicability: Gating
      target_answer: 'Yes'
      product_description: Did the agent/AI NOT imply coercive consequences not permitted (credit blacklisting, immigration threats, etc.)?
      reversed_evidence: yes
    PCE_C2_Q1:
      card_id: PCE
      case_id: PCE_C2
      context: During call
      description: |
        Did the agent/AI make factual claims about debt amount/status/consequences?
          What's considered as **debt amount**:
