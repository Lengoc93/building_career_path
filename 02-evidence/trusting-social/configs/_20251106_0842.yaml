        "'{{dict_variable.dispute_fraud_confirmed}}' == 'refuted'":
          next_state: BACK|EXC #ask debt detail
          filler: #Could you please provide the account details of the debt you are disputing?
          repeat_filler:

        "'{{dict_variable.dispute_fraud_confirmed}}' == 'unknown'":
          next_state: exc_dispute_txn_fraud #ask to confirm
          filler: #Your debt is associated with a Consumer Loan with current outstanding balance is {{dict_variable.ssml_total_balance}}, which includes a principal of {{dict_variable.ssml_principal_balance}}, interest of {{dict_variable.ssml_accrued_interest}}, and fees totaling {{dict_variable.ssml_fees_balance}}. This debt originates from {{raw_call_assignment.original_creditor_name}}, with the original date of default being {{dict_variable.ssm_debt_original_date_of_default}}. Could you please confirm this?
          repeat_filler:

        "'{{dict_variable.dispute_fraud_confirmed}}' == 'confirmed' and '{{dict_variable.dispute_fraud_filing}}' == 'no' and '{{dict_variable.dispute_fraud_case}}' == 'unknown' and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
          next_state: update_info
          filler: "We are looking for a human agent to assist you. In the meantime, to ensure important account updates are communicated timely to you, let's ensure we have your accurate contact details on file. I have {{dict_variable.ssml_phone}} as your contact number in my records. Is this still the best way to reach you?"
          action_after_transition_func:
            - class: WarmTransferSignal
              params:
                transfer_message: I have located a live agent to further help with the dispute claim.
                metadata: *sm_metadata
                extra_info: *base_warm_transfer_info
        # ASK reason - filing - case
        # "'{{dict_variable.dispute_fraud_confirmed}}' == 'confirmed' and '{{dict_variable.dispute_fraud_reason}}' == 'unknown' ":
        #   next_state: exc_dispute_txn_fraud #ask reason
        #   filler: I see. |partial #To resolve this matter quickly and accurately, it's essential that we verify the payment details. Could you please share the reasons why you believe this debt does not belong to you?
        #   repeat_filler:

        "'{{dict_variable.dispute_fraud_confirmed}}' == 'confirmed' and '{{dict_variable.dispute_fraud_filing}}' == 'unknown' and '{{dict_variable.dispute_fraud_case}}' == 'unknown'":
          next_state: exc_dispute_txn_fraud #ask filing
          filler:
          repeat_filler:

        "'{{dict_variable.dispute_fraud_confirmed}}' == 'confirmed' and '{{dict_variable.dispute_fraud_filing}}' == 'no' and '{{dict_variable.dispute_fraud_case}}' == 'unknown' and '{{dict_variable.is_working_hours }}' == 'no'":
          next_state: post_exc #encourage filing and ask human call back
          filler: #We encourage you to file a report and send the documentation to us either via our mailing address at {{dict_variable.ssml_company_mailing_address}} or through our email at {{raw_call_assignment.company_email_address}}. We'll raise this dispute to a supervisor. |partial. #To address your concerns more thoroughly and provide better support, would you like to be contacted by a supervisor within the next 7 days?
          repeat_filler:

        "'{{dict_variable.dispute_fraud_confirmed}}' == 'confirmed' and '{{dict_variable.dispute_fraud_filing}}' == 'yes' and '{{dict_variable.dispute_fraud_case}}' == 'unknown'":
          next_state: exc_dispute_txn_fraud #ask case
          filler: #Have you filed a report regarding this unauthorized transaction?
          repeat_filler:
        else: # got all info
          next_state: post_exc
          filler: #Thank you for your information. Please send the documentation to us either via our mailing address at {{dict_variable.ssml_company_mailing_address}} or through our email at {{raw_call_assignment.company_email_address}}. We'll raise this dispute to a supervisor. To address your concerns more thoroughly and provide better support, would you like to be contacted by a supervisor within the next 7 days?
          repeat_filler:

      repeat_continuously:
        max_repeat: 12
        state_exceed_max_repeat: end_call
        filler_exceed_max_repeat: #Thank you for your time today. |partial # If you have any more concerns, feel free to reach out anytime through our hotline at {{dict_variable.ssml_company_hotline}}. Have a great day!<ENDCALL>
        repeat_filler:
      max_turn_back:

  exc_bankruptcy:
    type: 2llmcalls
    2llmcalls:
      ## dynamic filler customized for each state
      dynamic_filler:
        model_name: gpt-4o #Qwen3-4B-df_en_v3b
        nturns: 6
        fillers:
        prompt_template: prompt_filler_v2 #prompt_filler_v3    ## a key in `prompt_templates_dynamic_filler`
        quick_fillers:
      type_llm_reflection: gpt-4o-2024-11-20-openai
      type_llm_response: gpt-4o-2024-11-20-openai
      len_msg_reflection:
      len_msg_response:
      type_output_reflection: custom1
      reflection_template: template_exception
      variable_change_exception: { "exc": "null" }

      pre_reflection_variable:
        init_call_date:
          tool: lib_tools.tools_kompato.init_outbound_call_date
        init_consumer_info:
          tool: lib_tools.tools_kompato.init_outbound_consumer_info
      reflection_variable:
        - variables:
            exc_bankruptcy_filing:
              description:
                "yes": if _user explicitly stated that they have filed for bankruptcy
                "no": if _user does not want to or has plan to file for bankruptcy
                "unknown": if the response is unclear
              example: "yes"
            exc_bankruptcy_case:
              description: return specific case number that _user has filed a bankruptcy. If _user hasn't answered return 'unknown'.
              example: "123456"
            exc_bankruptcy_attorney:
              description: return name of _user's attorney. If _user hasn't answered return 'unknown'.
              example: Lady Gaga
        - variables:
            exc:
              description:
                # complaint: if _user complain about historical calls, system issues, procedure issues, policy issues, response time or process of receiving requested documents.; and in the latest turns of the conversation has not confirmed that the complaint is now resolved or they have chosen to ignore it for now.
                # dispute: if _user just said they want to dispute the debt but not mention clear reasons such as debt amount, or they already paid, or they are a victim of identity theft.; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                # dispute_balance: if _user has dispute about the balance of the debt, the charges (for example 'We agreed to a $500 discount but the portal is still showing the original amount', 'The creditor promised me I would not need to pay late fees', 'This balance is too high because…', 'I was charged for this account, but I never received the item', 'I refunded this charge, but it still showed up on my account'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                # dispute_paid: if _user has dispute that they already paid the debt (for example 'I paid the full amount via bank transfer six months ago. Can you confirm this on your end?', 'I settled this debt last year with a check. Why is it still showing as unpaid?', 'I made a payment directly to the creditor last year. This should be updated in your records.', 'I have already paid off this debt through your online portal. Can you verify the payment?', 'I cleared this balance with a credit card payment last 2 years. Please check and confirm it has been received'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                # dispute_theft: if _user explicitly informs us that they are a victim of identity theft (e.g. "I received a notification about a debt in my name that I never incurred.", "I found out someone used my identity to open an account.", "This debt is not mine; I suspect my identity has been stolen.", "I noticed unfamiliar charges under my name that I never authorized.", "I believe my personal information was used fraudulently to create this debt.").; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                # bankruptcy: if caller tells that they are in bankruptcy
                # cease_comms: if caller requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                # attorney: if the caller or consumer lets you know that they are being represented by an attorney or lawyer (e.g. "I have an attorney" or "Speak to my lawyer" or "My lawyer told me not to talk to you. Please contact them instead")
                human_agent_request: if _user specifically requests speaking to a live agent, human, or representative; and in the latest turns of the conversation has not agreed to continue the conversation
                "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
              example: "null"

          len_msg_reflection: 2
          reflection_template: template_default

      processing_variable:
        cnt_unknown:
          tool: lib_tools.tools_kompato.count_unknown_threshold

      transition_conditions:
        "'{{dict_variable.exc}}' == 'human_agent_request'":
          next_state: exc_human_agent_request
          filler:
          repeat_filler:

        "'{{dict_variable.exc_bankruptcy_filing}}' == 'yes' and '{{dict_variable.exc_bankruptcy_case}}' != 'unknown' and '{{dict_variable.exc_bankruptcy_attorney}}' != 'unknown' and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
          next_state: update_info
          filler: "We are looking for a human agent to assist you. In the meantime, to ensure important account updates are communicated timely to you, let's ensure we have your accurate contact details on file. I have {{dict_variable.ssml_phone}} as your contact number in my records. Is this still the best way to reach you?"
          action_after_transition_func:
            - class: WarmTransferSignal
              params:
                transfer_message: I have located a live agent to further help you.
                metadata: *sm_metadata
                extra_info: *base_warm_transfer_info

        ###### FLOW: ask filing -> ask case -> ask attorney
        # UNKNOWN filing -> ask filing
        "'{{dict_variable.exc_bankruptcy_filing}}' == 'unknown' and {{dict_variable.cnt_unknown}}<2":
          next_state: exc_bankruptcy
          filler: #Have you done with filing bankruptcy?
          repeat_filler:

        "'{{dict_variable.exc_bankruptcy_filing}}' == 'unknown' and {{dict_variable.cnt_unknown}}>=2":
          next_state: post_exc
          filler: #Sorry it seems I'm unable to assist regarding your bankruptcy filing. |partial #Sorry we currently can not verify whether you have completed bankruptcy filing. You should complete the bankcruptcy filing first so that collection activities will be ceased. Once the filing is complete, please reach out to us again so we can assist you further. If you have any more concerns, feel free to reach out anytime through our hotline at {{dict_variable.ssml_company_hotline}}. Have a great day!<ENDCALL>
          repeat_filler:

        ### DONE filing -> ask case
        "'{{dict_variable.exc_bankruptcy_filing}}' == 'yes' and '{{dict_variable.exc_bankruptcy_case}}' == 'unknown' and {{dict_variable.cnt_unknown}}<3":
          next_state: exc_bankruptcy
          filler: #May you tell me the case number?
          repeat_filler:

        "'{{dict_variable.exc_bankruptcy_filing}}' == 'yes' and '{{dict_variable.exc_bankruptcy_case}}' == 'unknown' and {{dict_variable.cnt_unknown}}>=3":
          next_state: post_exc
          filler: #Sorry it seems I'm unable to assist regarding your bankruptcy filing. |partial #I'm sorry, but we currently don't have your case number so that we can not assist you further. Please ensure the process is finalized so that we can cease any collection activities. If you have any more concerns, feel free to reach out anytime through our hotline at {{dict_variable.ssml_company_hotline}}. Have a great day!<ENDCALL>
          repeat_filler:

        # DONE filing & case -> ask attorney
        "'{{dict_variable.exc_bankruptcy_filing}}' == 'yes' and '{{dict_variable.exc_bankruptcy_case}}' != 'unknown' and '{{dict_variable.exc_bankruptcy_attorney}}' == 'unknown' and {{dict_variable.cnt_unknown}}<3":
          next_state: exc_bankruptcy #not exceed threshold
          filler: #May I know the name of your attorney?
          repeat_filler:

        "'{{dict_variable.exc_bankruptcy_filing}}' == 'yes' and '{{dict_variable.exc_bankruptcy_case}}' != 'unknown' and '{{dict_variable.exc_bankruptcy_attorney}}' == 'unknown' and {{dict_variable.cnt_unknown}}>=3":
          next_state: post_exc # exceed threshold
          filler: Sorry it seems I'm unable to assist regarding your bankruptcy filing. |partial #I'm sorry, but we currently don't have your attorney contact so that we can not assist you further. Please ensure the process is finalized so that we can cease any collection activities. If you have any more concerns, feel free to reach out anytime through our hotline at {{dict_variable.ssml_company_hotline}}. Have a great day!<ENDCALL>
          repeat_filler:

        # DONE filing & case & attorney
        "'{{dict_variable.exc_bankruptcy_filing}}' == 'yes' and '{{dict_variable.exc_bankruptcy_case}}' != 'unknown' and '{{dict_variable.exc_bankruptcy_attorney}}' != 'unknown' and '{{dict_variable.is_working_hours }}' == 'no'":
          next_state: post_exc # ask human callback
          filler: #I'll request a supervisor to assist with your account. |partial #May we have your permission for a supervisor to contact you and help resolve your issue?
          repeat_filler:

        else: # NO filing: exc_bankruptcy_filing == 'no'
          next_state: post_exc
          filler: I'll request a supervisor to assist with your account. |partial #We currently have no proof of your completed bankruptcy filing. Please finalize it soon to halt any collection activities. We will escalate this dispute to a supervisor. May we have your permission for a supervisor to contact you and help resolve your issue?
          repeat_filler:

      repeat_continuously:
        max_repeat: 10
        state_exceed_max_repeat: post_exc
        filler_exceed_max_repeat: #Thank you for your time today. |partial #If you have any more concerns, feel free to reach out anytime through our hotline at {{dict_variable.ssml_company_hotline}}. Have a great day!<ENDCALL>
        repeat_filler:
      max_turn_back:

