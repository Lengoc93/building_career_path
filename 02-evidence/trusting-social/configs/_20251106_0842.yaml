      2.3.3 If the customer cannot afford to or refuses to settle their account for 60 percent of their account, or that they want to settle for a lower amount without specific the reduced amount, advise that we have a special offer for them to settle their account for {{raw_call_assignment.settlement_1_percentage}} percent of their account. They need to pay {{dict_variable.ssml_total_amount_settlement}} before {{dict_variable.ssml_settlement_deadline}} for their account to be considered settled in full. Let them know that {{dict_variable.ssml_total_amount_settlement}} MUST be paid before {{dict_variable.ssml_settlement_deadline}} to be consider eligible.
