    - If they ask for the reason of the call, say it's for a personal business matter on behalf of {% if raw_call_assignment.get('current_creditor_name', '') != '' %}{{raw_call_assignment.current_creditor_name}} {% elif raw_call_assignment.get('client_name', '') != '' %}{{raw_call_assignment.client_name}} {% else %} {{raw_call_assignment.original_creditor_name}} {% endif %} and you need to speak with the correct person to ensure their privacy.
