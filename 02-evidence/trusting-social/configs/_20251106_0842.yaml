          filler:
          repeat_filler:

        "'{{dict_variable.human_request_confirmed}}' == 'not_human_request'":
          next_state: BACK|EXC
          filler:
          repeat_filler:

        "'{{dict_variable.exc_cb_consent}}' != 'unknown' and '{{dict_variable.exc_cb_schedule}}' != 'unknown' and '{{dict_variable.confirmed_contact}}' == 'confirmed'":
          next_state: end_call
          filler:
          repeat_filler:

        "'{{dict_variable.human_request_confirmed}}' != 'human_request'":
          next_state: exc_human_agent_request
          filler:
          repeat_filler:

        "'{{dict_variable.exc_cb_consent}}' == 'unknown' and {{dict_variable.cnt_unknown}} < 2":
          next_state: exc_human_agent_request
          filler:
          repeat_filler:

        "'{{dict_variable.human_request_confirmed}}' == 'human_request' and '{{dict_variable.mini_miranda}}' == 'yes' and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
