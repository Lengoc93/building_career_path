  template_check_rpc: |
    You are given a phone conversation in English between a customer service agent (_assistant) and an individual (_user).
    The individual may be the customer who the customer service agent was trying to reach.
    The individual may also be someone else who may know or may not know the customer.

    Your task is to extract the content of a conversation in predefined format. Use the assistant's questions to determine the content to extract and the user's answers to identify the intent (reflection).
    - For variable `rpc`:
     + If _user confirmed that they were the customer (for example: "speaking", "okay", "yes", etc) then assign value `cus` to `rpc` and return "<rpc:cus>".
     + If _user said or implied that they were not customer then assign value `not` to `rpc` and return "<rpc:not>".
     + If _user said or implied wrong phone number then assign value `wrong_number` to `rpc` and return "<rpc:wrong_number>".
     + If _user wanted to assign to their attorney or lawyer then assign value `attorney` to `rpc` and return "<rpc:attorney>".
     + Else assign value `unknown` to `rpc` and return "<rpc:unknown>".

    **Note** If during the conversation the user changes their intent or provides inconsistent information, use the last statement to determine the most recent value to extract.

    **Output example (predefined form)**
    {example_output}

    **Note**
    - ONLY OUTPUT in predefined form, do not explain.

    **Conversation**
    ```
    {conversation}
    ```

