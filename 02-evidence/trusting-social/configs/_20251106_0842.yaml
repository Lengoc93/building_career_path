        "'{{dict_variable.human_request_confirmed}}' == 'human_request' and '{{dict_variable.mini_miranda}}' != 'yes' and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
          next_state: exc_cb
          filler: #"Thank you for your patience. We are looking for a human agent to assist you. Please hold for just a moment while I connect your call. Thank you!"
          action_after_transition_func:
            - class: WarmTransferSignal
              params:
                transfer_message: I have located a live agent to further help you.
                metadata: *sm_metadata
                extra_info: *base_warm_transfer_info

        "'{{dict_variable.exc_cb_consent}}' == 'unknown' and {{dict_variable.cnt_unknown}} == 2":
          next_state: end_call
          filler:
          repeat_filler:
        "'{{dict_variable.exc_cb_consent}}' == 'no' and '{{dict_variable.exc_cb_schedule}}' == 'unknown' and {{dict_variable.cnt_unknown}} < 2":
          next_state: exc_human_agent_request
          filler:
          repeat_filler:
        "'{{dict_variable.exc_cb_consent}}' == 'no' and '{{dict_variable.exc_cb_schedule}}' == 'unknown' and {{dict_variable.cnt_unknown}} == 2":
          next_state: end_call
          filler:
          repeat_filler:

        "'{{dict_variable.exc_cb_consent}}' == 'never'":
          next_state: end_call
          filler:
          repeat_filler:

        "'{{dict_variable.confirmed_contact}}' == 'unknown'":
          next_state: exc_human_agent_request
          filler:
          repeat_filler:
        else: # exc_cb_consent = 'yes'
          next_state: end_call
          filler:
          repeat_filler:
      repeat_continuously:
        max_repeat: 10
        state_exceed_max_repeat: end_call
        filler_exceed_max_repeat: Sorry it seems no live agent is currently available. |partial #Sorry we couldn't resolve your issue. Thank you for your time today. If you have any more concerns, feel free to reach out anytime through our hotline at {{dict_variable.ssml_company_hotline}}. Have a great day!<ENDCALL>
        repeat_filler:
      max_turn_back:

  exc_revoke_recording:
    type: 2llmcalls
    2llmcalls:
      ## dynamic filler customized for each state
      dynamic_filler:
        model_name: gpt-4o #Qwen3-4B-df_en_v3b
        nturns: 6
        fillers:
        prompt_template: prompt_filler_v2 #prompt_filler_v3    ## a key in `prompt_templates_dynamic_filler`
        quick_fillers:
      type_llm_reflection: gpt-4o-2024-11-20-openai
      type_llm_response: gpt-4o-2024-11-20-openai
      len_msg_reflection:
      len_msg_response:
      type_output_reflection: custom1
      reflection_template: template_default
      variable_change_exception: { "exc": "null" }

      pre_reflection_variable:
        init_call_date:
          tool: lib_tools.tools_kompato.init_outbound_call_date
        init_consumer_info:
          tool: lib_tools.tools_kompato.init_outbound_consumer_info
      reflection_variable:
        - variables:
            record_consent:
              description:
                revoke: if _user disagree or question about for being recorded (e.g. why you need recording?, i prefer not recording, ...); and in the latest turns of the conversation has not confirmed that they are now accepting recording; then assign `revoke` to `record_consent`
                agree: if, in the latest turns of the conversation, the _user agree for being recorded then assign `agree` to `record_consent`.
                concluded: if , in the latest turns of the conversation, the _user has agreed to be called back by a live agent, or receive other form of communication. While they still don't consent, there is a resolution for the next communication.
                unknown: |
                  if _user did not mention about recording consent then assign `unknown` to `record_consent`

                  Example:
                    _assistant: Hello, this is {{raw_call_assignment.agent_name}} with Kompato on a recorded line, How can I help you?
                    _user: I don't want to be recorded and I am calling because I received a letter from you
                    _assistant: I acknowledge your concern, however, without your consent for being recorded, I can not help you proceed the call. Can you change mind?
                    _user: Okay, fine

                  output: <record_consent:agree>
              example: unknown
            callback_time:
              description: only return specific time or date for callback if provided by _user when _user disagrees to being called back within the next 7 days. Else return 'unknown'
              example: "tomorrow at 3 PM"
        - variables:
            exc:
              description:
                # complaint: if _user complain about historical calls, system issues, procedure issues, policy issues, response time or process of receiving requested documents.; and in the latest turns of the conversation has not confirmed that the complaint is now resolved or they have chosen to ignore it for now.
                # dispute: if _user just said they want to dispute the debt but not mention clear reasons such as debt amount, or they already paid, or they are a victim of identity theft.; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                # dispute_balance: if _user has dispute about the balance of the debt, the charges (for example 'We agreed to a $500 discount but the portal is still showing the original amount', 'The creditor promised me I would not need to pay late fees', 'This balance is too high because…', 'I was charged for this account, but I never received the item', 'I refunded this charge, but it still showed up on my account'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                # dispute_paid: if _user has dispute that they already paid the debt (for example 'I paid the full amount via bank transfer six months ago. Can you confirm this on your end?', 'I settled this debt last year with a check. Why is it still showing as unpaid?', 'I made a payment directly to the creditor last year. This should be updated in your records.', 'I have already paid off this debt through your online portal. Can you verify the payment?', 'I cleared this balance with a credit card payment last 2 years. Please check and confirm it has been received'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                # dispute_theft: if _user explicitly informs us that they are a victim of identity theft (e.g. "I received a notification about a debt in my name that I never incurred.", "I found out someone used my identity to open an account.", "This debt is not mine; I suspect my identity has been stolen.", "I noticed unfamiliar charges under my name that I never authorized.", "I believe my personal information was used fraudulently to create this debt.").; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                # bankruptcy: if caller tells that they are in bankruptcy
                # cease_comms: if caller requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                # attorney: if the caller or consumer lets you know that they are being represented by an attorney or lawyer (e.g. "I have an attorney" or "Speak to my lawyer" or "My lawyer told me not to talk to you. Please contact them instead")
                human_agent_request: if _user specifically requests speaking to a live agent, human, or representative; and in the latest turns of the conversation has not agreed to continue the conversation
                "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
              example: "null"

          len_msg_reflection: 2
          reflection_template: template_default
      processing_variable:

      transition_conditions:
        "'{{dict_variable.exc}}' == 'human_agent_request'":
          next_state: exc_human_agent_request
          filler:
          repeat_filler:

        "'{{dict_variable.record_consent}}' == 'agree'":
          next_state: BACK|EXC
          filler:
          repeat_filler:

        "'{{dict_variable.record_consent}}' == 'revoke'":
          next_state: exc_revoke_recording
          filler: #If you're not comfortable continuing, I can note your preferences for future communications. How would you like to proceed?
          repeat_filler:

        "'{{dict_variable.record_consent}}' == 'concluded'":
          next_state: update_info
          filler: #If you're not comfortable continuing, I can note your preferences for future communications. How would you like to proceed?
          repeat_filler:

        ### unknown
        else:
          next_state: exc_revoke_recording
          filler: # Sorry, I didn't get that. How can I help you today?
          repeat_filler:

      repeat_continuously:
        max_repeat: 6
        state_exceed_max_repeat: end_call
        filler_exceed_max_repeat:
        repeat_filler: 1
      max_turn_back:

  exc_revoke_ai_recording:
    type: 2llmcalls
    2llmcalls:
      ## dynamic filler customized for each state
      dynamic_filler:
        model_name: gpt-4o #Qwen3-4B-df_en_v3b
        nturns: 6
        fillers:
        prompt_template: prompt_filler_v2 #prompt_filler_v3    ## a key in `prompt_templates_dynamic_filler`
        quick_fillers:
      type_llm_reflection: gpt-4o-2024-11-20-openai
      type_llm_response: gpt-4o-2024-11-20-openai
      len_msg_reflection:
      len_msg_response:
      type_output_reflection: custom1
      reflection_template: template_default
      variable_change_exception: { "exc": "null" }

      pre_reflection_variable:
        init_call_date:
          tool: lib_tools.tools_kompato.init_outbound_call_date
        init_consumer_info:
          tool: lib_tools.tools_kompato.init_outbound_consumer_info
      reflection_variable:
        - variables:
            continue_convo:
              description:
                revoke: if _user does not want to continue the conversation on a recorded line with AI; ; and in the latest turns of the conversation has not confirmed they accept to continue; then assign `revoke`
                agree: if, in the latest turns of the conversation, the _user agree to continue the conversation on a recorded line with AI (e.g. "fine", "ok", "let's keep talking") then assign `agree`
                unknown: |
                  if _user did not mention about continuing the conversation on a recorded line with AI then assign `unknown`
              example: unknown
            exc_cb_consent:
              description:
                "yes": if _user explicitly or implicitly agrees to be called back in 7 days (e.g. 'yes', 'okay', 'please call me back')
                "sooner": if _user explicitly or implicitly agree to be called back but not in 7 days (e.g. 'call me sooner', 'can you call me tommorrow?')
                never: if _user rejects to be called back by human (e.g. "Never call me again", "No I don't want a human to call me back")
                unknown: if _user gives unclear answer
              example: "yes"
            exc_cb_schedule:
              description: only return specific time or date for callback if provided by _user when _user disagrees to being called back within the next 7 days, else return 'unknown'
              example: "tomorrow at 3 PM"
        - variables:
            exc:
              description:
                # complaint: if _user complain about historical calls, system issues, procedure issues, policy issues, response time or process of receiving requested documents.; and in the latest turns of the conversation has not confirmed that the complaint is now resolved or they have chosen to ignore it for now.
                # dispute: if _user just said they want to dispute the debt but not mention clear reasons such as debt amount, or they already paid, or they are a victim of identity theft.; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                # dispute_balance: if _user has dispute about the balance of the debt, the charges (for example 'We agreed to a $500 discount but the portal is still showing the original amount', 'The creditor promised me I would not need to pay late fees', 'This balance is too high because…', 'I was charged for this account, but I never received the item', 'I refunded this charge, but it still showed up on my account'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                # dispute_paid: if _user has dispute that they already paid the debt (for example 'I paid the full amount via bank transfer six months ago. Can you confirm this on your end?', 'I settled this debt last year with a check. Why is it still showing as unpaid?', 'I made a payment directly to the creditor last year. This should be updated in your records.', 'I have already paid off this debt through your online portal. Can you verify the payment?', 'I cleared this balance with a credit card payment last 2 years. Please check and confirm it has been received'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                # dispute_theft: if _user explicitly informs us that they are a victim of identity theft (e.g. "I received a notification about a debt in my name that I never incurred.", "I found out someone used my identity to open an account.", "This debt is not mine; I suspect my identity has been stolen.", "I noticed unfamiliar charges under my name that I never authorized.", "I believe my personal information was used fraudulently to create this debt.").; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                # bankruptcy: if caller tells that they are in bankruptcy
                # cease_comms: if caller requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                # attorney: if the caller or consumer lets you know that they are being represented by an attorney or lawyer (e.g. "I have an attorney" or "Speak to my lawyer" or "My lawyer told me not to talk to you. Please contact them instead")
                human_agent_request: if _user specifically requests speaking to a live agent, human, or representative; and in the latest turns of the conversation has not agreed to continue the conversation
                "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
              example: "null"

          len_msg_reflection: 2
          reflection_template: template_default
      processing_variable:
        cnt_unknown:
          tool: lib_tools.tools_kompato.count_unknown_threshold

      transition_conditions:
        "'{{dict_variable.exc}}' == 'human_agent_request'":
          next_state: exc_human_agent_request
          filler:
          repeat_filler:

        "'{{dict_variable.continue_convo}}' == 'revoke' and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
          next_state: exc_cb
          filler: "We are looking for a human agent to assist you. Please hold for just a moment while I connect your call. Thank you!"
          action_after_transition_func:
            - class: WarmTransferSignal
              params:
                transfer_message: I have located a live agent to further help you.
                metadata: *sm_metadata
                extra_info: *base_warm_transfer_info

        "'{{dict_variable.continue_convo}}' == 'agree'":
          next_state: BACK|EXC
          filler:
          repeat_filler:
        "'{{dict_variable.exc_cb_consent}}' == 'unknown' and {{dict_variable.cnt_unknown}} < 2":
          next_state: exc_revoke_ai_recording
          filler: #I'll have a supervisor call you back within the next 7 days. Is that alright?
          repeat_filler:
        "'{{dict_variable.exc_cb_consent}}' == 'unknown' and {{dict_variable.cnt_unknown}} == 2":
          next_state: end_call
          filler: #I cannot have a human call them back without your consent. Thank you for your time today. Have a great day!<ENDCALL>
          repeat_filler:
        "'{{dict_variable.exc_cb_consent}}' == 'no' and '{{dict_variable.exc_cb_schedule}}' == 'unknown' and {{dict_variable.cnt_unknown}} < 2":
          next_state: exc_revoke_ai_recording
          filler: #I understand. Do you have a preferred time or date for our supervisor to call back?
          repeat_filler:
        "'{{dict_variable.exc_cb_consent}}' == 'no' and '{{dict_variable.exc_cb_schedule}}' == 'unknown' and {{dict_variable.cnt_unknown}} == 2":
          next_state: end_call
          filler: #I cannot have a human call them back without your consent. Thank you for your time today. Have a great day!<ENDCALL>
          repeat_filler:
        "'{{dict_variable.exc_cb_consent}}' == 'no' and '{{dict_variable.exc_cb_schedule}}' != 'unknown'":
          next_state: end_call
          filler:
          repeat_filler:

        "'{{dict_variable.exc_cb_consent}}' == 'never'":
          next_state: end_call
          filler:
          repeat_filler:

        "'{{dict_variable.exc_cb_consent}}' == 'yes' and '{{dict_variable.exc_cb_schedule}}' != 'unknown'":
          next_state: end_call
          filler:
          repeat_filler:

        ### unidentify
        else:
          next_state: exc_revoke_ai_recording
          filler: # Sorry, I didn't get that. How can I help you today?
          repeat_filler:

      repeat_continuously:
        max_repeat: 10
        state_exceed_max_repeat: end_call
        filler_exceed_max_repeat: Sorry it seems I'm unable to assist you today. |partial #Sorry, without your consent, I can not help you proceed the call. Have a great day!<ENDCALL>
        repeat_filler: 1
      max_turn_back:

