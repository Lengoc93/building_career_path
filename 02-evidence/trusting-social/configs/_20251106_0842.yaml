  get_call_back_time:
    type: 2llmcalls
    2llmcalls:
      type_llm_reflection: gpt-4o-2024-11-20-openai
      type_llm_response: gpt-4o-2024-11-20-openai
      len_msg_reflection:
      len_msg_response:
      type_output_reflection: custom1
      reflection_template: template_default

      pre_reflection_variable:
      reflection_variable:
        callback_time:
          description: call back period or time that _user stated (extracted directly from answer of user), if _user haven't provided yet, return "unknown"
          example: tomorow at 9PM
      processing_variable:

      transition_conditions:
        "'{{dict_variable.callback_time}}' == 'unknown'":
