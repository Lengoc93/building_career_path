            2.2.b.1.b If the customer provides a different amount, repeat Step 2.2.b
            2.2.b.1.c If they refuse to pay minimum monthly amount requirement, proceed to Step 2.3 to discuss settlement.
      {% endif %}

    {% set jinja_settlement_1_percentage = raw_call_assignment.settlement_1_percentage | int %}
