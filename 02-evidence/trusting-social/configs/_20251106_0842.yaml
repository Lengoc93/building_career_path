## Templates for dynamic filler
prompt_templates_dynamic_filler:
  
  prompt_filler_v1: |
    ### Context
    You are {{raw_call_assignment.agent_name}} - a virtual assistant from {{raw_call_assignment.company_name}}, you are having a conversation with a consumer (user). It is the assistant's turn to speak next.
    Your task is to respond appropriately based on the state of the user's speech:
    - If the user speaks in a language other than English, respond with a silence marker: `<f><sleep 0></f>`
    - If the user appears to be in the middle of speaking (i.e., their speech seems incomplete), output a silence marker: `<f><sleep 1></f>`
    - If the user is asking a direct, specific question that expects a meaningful response that you do not have the information for, output a silence marker: `<f><sleep 0></f>`
    - If it is appropriate to send a short filler sentence to keep the user engaged, output a concise, relevant, and professional sentence that acknowledges, appreciates, or empathizes with the user. The filler should make the customer feel listened to, acknowledged, and valued.

    Do not:
    - Offer help, information, or next steps.
    - Say anything about being here to help, support, or assist.

    ### Example output
    <f>Thank you.</f>
    ### Conversation
    {conversation}

  prompt_filler_v2: |
    ### Context
    You are {{raw_call_assignment.agent_name}} - a virtual assistant from {{raw_call_assignment.company_name}}, you are having a conversation with a consumer (user). It is the assistant's turn to speak next.
    Your task is to respond appropriately based on the state of the user's speech:
    - If the user speaks in a language other than English, respond with a silence marker: `<f><sleep 0></f>`
    - If the user appears to be in the middle of speaking (i.e., their speech seems incomplete), output a silence marker: `<f><sleep 1></f>`
    - If the user is asking a direct, specific question that expects a meaningful response that you do not have the information for, output a silence marker: `<f><sleep 0></f>`
    - If it is appropriate to send a short filler sentence to keep the user engaged. Output a concise, relevant, and professional sentence that acknowledges, appreciates, or empathizes with the user. 
      {%- set customer_first_name = raw_call_assignment.get('first_name', dict_variable.get('customer_info', {}).get('first_name', '')) %}
      -- DO NOT mention the customer's name {% if customer_first_name != "" %}(which is "{{customer_first_name}}"){% endif %} in filler sentences because repeating their name causes frustration which we MUST avoid.
      -- The filler should make the customer feel listened to, for example, "Got it.", "I understand.", "That must be difficult for you.", "Sure.", and the like.
      -- Vary the fillers to avoid repeating the same sentences which makes the conversation feel robotic. For example, if "Thank you for confirming" has already been used in the conversation, do not use it again, find another sentence with similar meaning instead.

    DO NOT:
    - Offer help, information, or next steps.
    - Say anything about being here to help, support, or assist.
    - Mention the customer's name {% if customer_first_name != "" %}(which is "{{customer_first_name}}"){% endif %}).

    ### Example output
    <f>Thank you.</f>
    
    ### Conversation
    {conversation}
  
  prompt_filler_v2_pre_opening: |
    ### Context
    You are {{raw_call_assignment.agent_name}} - a virtual assistant from {{raw_call_assignment.company_name}},, you are having a conversation with a consumer (user). It is the assistant's turn to speak next.
    Your task is to respond appropriately based on the state of the user's speech:
    - If the user appears to be in the middle of speaking (i.e., their speech seems incomplete), output a silence marker: `<f><sleep 1></f>`
    - If the user is asking a direct, specific question that expects a meaningful response that you do not have the information for, output a silence marker: `<f><sleep 0></f>`
    - If it is appropriate to send a short filler sentence to keep the user engaged, output a concise, relevant, and professional sentence that acknowledges, appreciates, or empathizes with the user. The filler should make the customer feel listened to, acknowledged, and valued.
    - If the user says hello, hi, or hey, or ask who are calling them, output a silence marker: `<f><sleep 0></f>
    Do not:
    - Offer help, information, or next steps.
    - Say anything about being here to help, support, or assist.

    ### Example output
    <f>Thank you.</f>
    ### Conversation
    {conversation}
  
  prompt_filler_random: |
    ### Context
    You are given a conversation between a bank employee (assistant) and a customer (user). It is the assistant's turn to speak next. The assistant wants to say a filler sentence to keep the user engaged.
    You are also provided a list of filler sentences that people often say in real conversations.
    ### Objective
    From the list of filler sentences, select a filler sentence that is most contextually relevant to the ongoing conversation.
    NOTE: ONLY select from the list. Do NOT hallucinate.
    ### List of filler sentences
    {list_fillers}
    ### Conversation
    {conversation}
  
  prompt_filler_v3: |
    ### Context
    You are {{raw_call_assignment.agent_name}} - a virtual assistant from {{raw_call_assignment.company_name}}, you are having a conversation with a consumer (user). It is the assistant's turn to speak next.
    Your task is to respond appropriately based on the state of the user's speech:
    - If the user appears to be in the middle of speaking (i.e., their speech seems incomplete), output a silence marker: `<f><sleep 1></f>`
    - If the user is asking a direct, specific question that expects a meaningful response that you do not have the information for, output a silence marker: `<f><sleep 0></f>`
    - If it is appropriate to send a short filler sentence to keep the user engaged, output a concise, relevant, and professional sentence that acknowledges, appreciates, or empathizes with the user. The filler should make the customer feel listened to, acknowledged, and valued.
    ### Example output
    <f>Thank you.</f>
    ### Conversation
    {conversation}

dict_output_variable_name: dict_variable

init_state:
  "'{{raw_call_assignment.direction}}' == 'inbound'": "inbound_opening"
  "'{{raw_call_assignment.direction}}' == 'outbound'": "pre_opening"
  else: "pre_opening"

init_assistant: >-
  {% if raw_call_assignment.direction == 'inbound' %}
    Hi, Thank you for calling {{raw_call_assignment.company_name}}. This is {{raw_call_assignment.agent_name}} on a recorded line. How can I assist you today?
  {% else %}
  {% endif %}

states:
  pre_end_call:
    type: 2llmcalls
    2llmcalls:
      type_llm_reflection: gpt-4o-2024-11-20-openai
      type_llm_response: gpt-4o-2024-11-20-openai
      len_msg_reflection: 4
      len_msg_response:
      type_output_reflection: custom1
      reflection_template: template_default
      variable_change_exception: { "exc": "null" }

      pre_reflection_variable:
      reflection_variable:
        concern:
          description: return "yes" if customer has other query and return "no" if they don't have any other query, else return 'unknown'.
          example: "yes"
        exc:
          description:
            complaint: if _user complain about historical calls, system issues, procedure issues, policy issues, response time or process of receiving requested documents.; and in the latest turns of the conversation has not confirmed that the complaint is now resolved or they have chosen to ignore it for now.
            dispute: if _user just said they want to dispute the debt but not mention clear reasons such as debt amount, or they already paid, or they are a victim of identity theft.; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
            dispute_balance: if _user has dispute about the balance of the debt, the charges (for example 'We agreed to a $500 discount but the portal is still showing the original amount', 'The creditor promised me I would not need to pay late fees', 'This balance is too high because…', 'I was charged for this account, but I never received the item', 'I refunded this charge, but it still showed up on my account'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
            dispute_paid: if _user has dispute that they already paid the debt (for example 'I paid the full amount via bank transfer six months ago. Can you confirm this on your end?', 'I settled this debt last year with a check. Why is it still showing as unpaid?', 'I made a payment directly to the creditor last year. This should be updated in your records.', 'I have already paid off this debt through your online portal. Can you verify the payment?', 'I cleared this balance with a credit card payment last 2 years. Please check and confirm it has been received'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
            dispute_theft: if _user explicitly informs us that they are a victim of identity theft (e.g. "I received a notification about a debt in my name that I never incurred.", "I found out someone used my identity to open an account.", "This debt is not mine; I suspect my identity has been stolen.", "I noticed unfamiliar charges under my name that I never authorized.", "I believe my personal information was used fraudulently to create this debt.").; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
            bankruptcy: if caller tells that they are in bankruptcy
            cease_comms: if caller want to stop receiving communications from us including email, texting, sms or call; but EXCLUDE when being asked about receiving a payment reminder
            attorney: if the caller or consumer lets you know that they are being represented by an attorney or lawyer (e.g. "I have an attorney" or "Speak to my lawyer" or "My lawyer told me not to talk to you. Please contact them instead")
            callback: if caller have any refusal to speak to virtual AI agent or want to speak to a human, live agent, or a representative (e.g. "Representative", "I want to speak to a human", "Can you transfer me to a live agent?", "I want to talk to a real person"); and in the latest turns of the conversation has not confirmed that they now want to continue with the virtual AI assistant.
            "null": default value, if _user did not mention any above
          example: complaint
      processing_variable:
        # guardrail_response:
        #   tool: lib_tools.guardrails.guardrail_validator

      transition_conditions:
        "'{{dict_variable.concern}}' == 'unknown'":
          next_state: post_exc
          filler: #Do you have any other concerns?
          repeat_filler:

        "'{{dict_variable.concern}}' == 'yes' and '{{dict_variable.exc}}' == 'null'":
          next_state: post_exc
          filler: #May I ask for what your concern is?
          repeat_filler:

        "'{{dict_variable.concern}}' == 'yes' and '{{dict_variable.exc}}' == 'dispute_balance'":
          next_state: exc_dispute_balance
          filler:
          repeat_filler:

        "'{{dict_variable.concern}}' == 'yes' and '{{dict_variable.exc}}' == 'dispute_paid'":
          next_state: exc_dispute_paid
          filler:
          repeat_filler:

        "'{{dict_variable.concern}}' == 'yes' and '{{dict_variable.exc}}' == 'dispute_theft'":
          next_state: exc_dispute_theft
          filler:
          repeat_filler:

        "'{{dict_variable.concern}}' == 'yes' and '{{dict_variable.exc}}' == 'cease_comms'":
          next_state: exc_cease_comms
          filler:
          repeat_filler:

        "'{{dict_variable.concern}}' == 'yes' and '{{dict_variable.exc}}' == 'bankruptcy'":
          next_state: exc_bankruptcy
          filler:
          repeat_filler:

        "'{{dict_variable.concern}}' == 'yes' and '{{dict_variable.exc}}' == 'attorney'":
          next_state: exc_attorney
          filler:
          repeat_filler:

        "'{{dict_variable.concern}}' == 'yes' and '{{dict_variable.exc}}' == 'callback'":
          next_state: exc_human_agent_request
          filler:
          repeat_filler:

        else: #exc_cb=unknown
          next_state: end_call
          filler: #gotcha. |partial # thank you. |partial # for your time today. If you have any more concerns, feel free to reach out anytime through our hotline at {{dict_variable.ssml_company_hotline}}. Have a great day!<ENDCALL>
          repeat_filler:

      repeat_continuously:
        max_repeat: 6
        state_exceed_max_repeat: end_call
        filler_exceed_max_repeat: Sorry it seems I'm unable to help. |partial # If you have any more concerns, feel free to reach out anytime through our hotline at {{dict_variable.ssml_company_hotline}}. Have a great day!<ENDCALL>
        repeat_filler:
      max_turn_back:

  end_call:
    type: 2llmcalls
    2llmcalls:
      type_llm_reflection: gpt-4o-2024-11-20-openai
      type_llm_response: gpt-4o-2024-11-20-openai
      len_msg_reflection: 2
      len_msg_response:
      type_output_reflection: custom1
      reflection_template: template_default
      variable_change_exception: { "receive": "no" }

      pre_reflection_variable:
      reflection_variable:
        info_updated:
          description:
            not_updated: This is the default state, applied when neither the `updated` nor `refused` conditions are met. This includes scenarios where the agent confirmed fewer than two of the three required contact details (phone, email, mailing address) for record-keeping purposes, or when details were provided solely for identity verification without an explicit update.
            refused: This state applies only if the agent explicitly inquired about all three required contact details (phone, email, mailing address) for record-keeping purposes and the user clearly refused to provide or confirm at least one of them. If the agent did not inquire about all three, use `not_updated`.
            updated: "This state applies if the agent successfully obtained confirmation or new information for at least two of the three required contact details: phone, email, and mailing address. Phone is confirmed by successful connection with the intended user. Email requires explicit verbal provision or confirmation for updating the email on file. Mailing address requires explicit verbal provision or confirmation for updating the mailing address on file; however, if requested primarily for identity verification (e.g., early in the call before account-specific discussions), it only counts as an update if the agent explicitly states it is for updating the customer's records."
          overview: Categorizes the outcome of attempts to update or confirm the user's phone, email, and mailing address details for record-keeping purposes, specifically indicating if at least two of these were successfully confirmed or updated during the conversation.
          example: "not_updated"
        receive:
          description: return "yes" when the consumer EXPLICITLY says that they have received a letter or email from {{raw_call_assignment.company_name}} and wish to continue discuss their account. Else, return "no"
          example: "no"
      processing_variable:

      transition_conditions:
        "'{{dict_variable.no_notice}}' == 'yes' and '{{dict_variable.receive}}' == 'yes'":
          next_state: negotiation_from_script
          filler:
          repeat_filler:

        "'{{dict_variable.no_notice}}' == 'no' and '{{dict_variable.info_updated}}' == 'not_updated'":
          next_state: update_info
          filler:
          repeat_filler:

        else:
          next_state: end_call
          filler:
          repeat_filler:

      repeat_continuously:
        max_repeat: 10
        state_exceed_max_repeat: end_call
        filler_exceed_max_repeat: <ENDCALL>
        repeat_filler: 1
      max_turn_back:

  pre_opening:
    type: 2llmcalls
    2llmcalls:
      ## dynamic filler customized for each state
      # dynamic_filler:
      #   model_name: gpt-4o #Qwen3-4B-df_en_v3b
      #   nturns: 6
      #   fillers:
      #   prompt_template: prompt_filler_v2_pre_opening #prompt_filler_v3    ## a key in `prompt_templates_dynamic_filler`
      #   quick_fillers:
      type_llm_reflection: qwen3-kpt-reflection-v2
      type_llm_response: gpt-4o-2024-11-20-openai
      len_msg_reflection:
      len_msg_response:
      type_output_reflection: custom1
      reflection_template: template_default
      variable_change_exception: { "exc": "null" }
      pre_reflection_variable:
      reflection_variable:
        response:
          description:
            voice_mail: if the _user appears to be a voicemail automated answering machine. Common phrases may include "This is a message for...", "Please leave a message after the tone.", "I'm not available right now.", "At the beep...", "You've reached the voicemail of...", "Please call me back at...", "I'll get back to you soon.", "Sorry I missed your call.", "[Name] is currently not available", "This is [Name]..." (often followed by "leaving a message"), "Press [number] for [department/option]", "Enter the extension", "May be recorded and used by a third party" , "Hi, if you record your name and reason for calling, I'll see if this person is available" or other similar phrases.
            hello: if the _user says "hello?", "hello", "hi", similar without stating any name. The _user's response does not appear to be a voice mail machine, and the _user shows the intent to want to continue the current conversation such as "yes, it's me, who is this ?", "Can I help you?", "Okay" or "what do you need ?".
            business: if the _user is from a business. Common phrases including "This is [Name] from [Business/Location]", "[Business], how may I help you?", "Thank you for calling [Business]", "This is [Name] at [Business/Location]"
            matched: if the _user stated their name and the name is {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}
            unmatched: if the _user stated their name and the name does not match with {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}
            unknown: if it is not clear what the _user says or what the _user is trying to talk about
          example: hello
      processing_variable:
        # guardrail_response:
        #   tool: lib_tools.guardrails.guardrail_validator

      transition_conditions:
        "{{not raw_call_assignment.first_name}}":
          next_state: pre_opening
          filler: Hello.
          repeat_filler:

        "'{{dict_variable.response}}' == 'voice_mail' or '{{dict_variable.response}}' == 'business'":
          next_state: pre_opening
          filler:
            if exp_voicemail == "variation_1": <ENDCALL>
            elif exp_voicemail == "variation_2": Hi, this is {{raw_call_assignment.agent_name}}, a virtual agent calling from Kompato AI. Please contact me or any of our live agents at 1--8-8-8--5-6-6--7-2-8-0 . Live agents are available from 9am to 5pm Eastern Monday to Friday, and virtual agents are available 24 hours a day for your convenience. <ENDCALL>
            else: <ENDCALL>
          repeat_filler:

        "'{{dict_variable.response}}' == 'hello'":
          next_state: check_rpc
          filler: Hey, this is {{raw_call_assignment.agent_name}}, a virtual agent on a recorded line. Is this {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}?
          repeat_filler:

        "'{{dict_variable.response}}' == 'matched'":
          next_state: check_rpc
          filler: Hello.
          repeat_filler:

        "'{{dict_variable.response}}' == 'unmatched'":
          next_state: check_rpc
          filler: Hello.
          repeat_filler:

        "'{{dict_variable.response}}' == 'unknown'":
          next_state: check_rpc
          filler: Hello.
          repeat_filler:

        else:
          next_state: check_rpc
          filler: #May I please speak with {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}?
          repeat_filler:

      repeat_continuously:
        max_repeat: 5
        state_exceed_max_repeat: end_call
        filler_exceed_max_repeat: I apologize for the inconvenience. It seems there's an issue on our end, and we'll need to end this call. Thank you for your understanding. <ENDCALL>
        repeat_filler:
      max_turn_back:

  inbound_opening:
    type: 2llmcalls
    2llmcalls:
      dynamic_filler:
        model_name: gpt-4o #Qwen3-4B-df_en_v3b
        nturns: 6
        fillers:
        prompt_template: prompt_filler_v2 #prompt_filler_v3    ## a key in `prompt_templates_dynamic_filler`
        quick_fillers:
      type_llm_reflection: gpt-4o-2024-11-20-openai
      type_llm_response: gpt-4o-2024-11-20-openai
      len_msg_reflection:
      len_msg_response:
      type_output_reflection: custom1
      reflection_template: template_default
      pre_reflection_variable:
        init_call_date:
          tool: lib_tools.tools_kompato.init_outbound_call_date

        account_id: &tool_store_account_id
          tool: lib_tools.tools_kompato.store_account_id_from_rca
          params:
            rca_account_id: self.raw_call_assignment.account_id

      reflection_variable:
        - variables:
            phone_number:
              description: return the phone number that the consumer provides. If _user cannot provide it or unwilling to provide it return "unavailable" else, return "unknown"
              example: "unknown"

            record_consent:
              description: return 'revoke' if _user explicitly says that they do not want to be recorded (e.g. i prefer not recording, ...). Else return 'unknown' as default value.
              example: unknown

        - variables:
            exc:
              description:
                cease_comms: if caller requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                human_agent_request: if _user refuses to speak to the virtual agent and/or requests speaking to a live agent or representative, collection agent, customer service; and in the latest turns of the conversation has not agreed to continue the conversation
                "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
              example: "null"
          len_msg_reflection: 2
          reflection_template: template_default

      processing_variable:
        # check and validate if provided phone number is valid
        processed_phone_number:
          tool: lib_tools.tools_kompato.preprocess_phone_number
          params:
            phone_number: self.dict_variable.phone_number
            length: 10
            country_code: "1"

      transition_conditions:
        "'{{dict_variable.exc}}' == 'cease_comms'":
          next_state: exc_cease_comms
          filler: Got it. My name is {{raw_call_assignment.agent_name}}. I will be your virtual assistant today. |partial


        "'{{dict_variable.record_consent}}' == 'revoke'":
          next_state: exc_revoke_recording
          filler: I will be your virtual assistant today. |partial

        "('{{raw_call_assignment.account_id}}' not in ['', 'None'] or '{{dict_variable.account_id}}' not in ['', 'None']) and '{{dict_variable.exc}}' == 'human_agent_request' ":
          next_state: inbound_verify_full_name
          filler: >-
            Got it. While I check availability for a live agent. I am a fully conversational virtual agent that can assist with most questions or concerns.
            {% if 'first_name' in raw_call_assignment and 'last_name' in raw_call_assignment %}
            Am I speaking to {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}?
            {% else %}
            Am I speaking to {{ dict_variable.get('customer_info', {}).get('first_name', '') }} {{ dict_variable.get('customer_info', {}).get('last_name', '') }}?
            {% endif %}
          action_after_transition_func:
            - class: WarmTransferSignal
              params:
                transfer_message: I have located a live agent to further help you.
                metadata: *sm_metadata
                extra_info: *base_warm_transfer_info

        # from_phone single account
        "'{{raw_call_assignment.account_id}}' not in ['', 'None'] or '{{dict_variable.account_id}}' not in ['', 'None'] ":
          next_state: inbound_verify_full_name
          filler: >-
            {% if 'first_name' in raw_call_assignment and 'last_name' in raw_call_assignment %}
            Got it. My name is {{raw_call_assignment.agent_name}}. I will be your virtual assistant today. It looks like we're trying to get a hold of {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}} at this number. Is this them?
            {% else %}
            Got it. My name is {{raw_call_assignment.agent_name}}. I will be your virtual assistant today. It looks like we're trying to get a hold of {{ dict_variable.get('customer_info', {}).get('first_name', '') }} {{ dict_variable.get('customer_info', {}).get('last_name', '') }} at this number. Is this them?
            {% endif %}

        # provided phone no matched or from_phone multiple accounts --> proceed to verify_dob
        "(('{{dict_variable.processed_phone_number}}' != 'unknown' and '{{ dict_variable.account_status}}' == 'no_matched') or ('{{dict_variable.account_status}}' == 'multiple_accounts') or ('{{dict_variable.phone_number}}' == 'unavailable')) and '{{dict_variable.exc}}' == 'human_agent_request' ":
          next_state: inbound_verify_dob
          filler: While I check availability for a live agent, as your virtual agent, to ensure they can assist you correctly, may I have your day and month of birth?
          action_after_transition_func:
            - class: WarmTransferSignal
              params:
                transfer_message: I have located a live agent to further help you.
                metadata: *sm_metadata
                extra_info: *base_warm_transfer_info

        # provided phone no matched or from_phone multiple accounts --> proceed to verify_dob
        "('{{dict_variable.processed_phone_number}}' != 'unknown' and '{{ dict_variable.account_status}}' != 'single_account') or ('{{dict_variable.account_status}}' == 'multiple_accounts') or ('{{dict_variable.phone_number}}' == 'unavailable')":
          next_state: inbound_verify_dob

        "'{{dict_variable.exc}}' == 'human_agent_request'":
          next_state: inbound_opening
          filler: >-
            I understand you'd like to speak with a live agent. While I check their availability, I'm a virtual assistant and can help with most questions or concerns. Could you let me know the phone number we called you on or the one associated with your account?
          action_after_transition_func:
            - class: WarmTransferSignal
              params:
                transfer_message: I have located a live agent to further help you.
                metadata: *sm_metadata
                extra_info: *base_warm_transfer_info


        ### unidentify
        else:
          next_state: inbound_opening
          filler:

      repeat_continuously:
        max_repeat: 5
        state_exceed_max_repeat: end_call
        filler_exceed_max_repeat: Sorry, since i cannot address your account. I will note down the request and let the human agent to call you back later. What time would work best for you?
      max_turn_back:

  inbound_verify_full_name:
    type: 2llmcalls
    2llmcalls:
      dynamic_filler:
        model_name: gpt-4o #Qwen3-4B-df_en_v3b
        nturns: 6
        fillers:
        prompt_template: prompt_filler_v2 #prompt_filler_v3    ## a key in `prompt_templates_dynamic_filler`
        quick_fillers:
      type_llm_reflection: gpt-4o-2024-11-20-openai
      type_llm_response: gpt-4o-2024-11-20-openai
      len_msg_reflection:
      len_msg_response:
      type_output_reflection: custom1
      variable_change_exception: { "exc": "null" }
      reflection_template: template_default

      pre_reflection_variable:
        account_id: *tool_store_account_id

      reflection_variable:
        - variables:
            rpc:
              overview: Classifies the user's primary role or intent regarding the called party; apply precedence (unknown > not > attorney > cus > wrong_number); higher-priority categories must be clear, unambiguous, and sustained; weigh the totality of evidence.
              description:
                cus: The user clearly identifies themselves as the account holder or customer by explicitly stating their identity (e.g., "This is {{raw_call_assignment.first_name}}", "Speaking", "Yes, that's me", "Yes"), by providing specific verification details when prompted, or by engaging directly in detailed discussions about their account or case. This category applies only if the user does not state or imply they are an attorney, that an attorney is involved, or that they are not the intended recipient for the specific account being discussed, especially if subsequent information or their statements contradict an initial verbal identification. Also include cases where the user says "yes" in response to their name but simultaneously requests not to be contacted again, such as "do not ever text", or situations where the user confirms their identity but expresses distress, reluctance, or complaints about being contacted (e.g. "Yes, but don't call me anymore", "Yes, stop texting me", "Yes, but I don't want to talk to you", or "Yes, but please remove my number").
                attorney: The user explicitly states they are an attorney or lawyer, or that they are calling on behalf of an attorney or lawyer, concerning the customer's account or case. This category takes precedence over 'cus' if the user, even if they are the account holder, indicates that an attorney is handling the matter, is involved in the case, or requests communication to go through their attorney.
                wrong_number: The user states or implies this is a wrong number, that the call has reached the incorrect person for the intended account, or that the number used does not belong to the specific account holder {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}} being targeted by the call. This includes situations where the user, despite any initial verbal identification, provides verification information (e.g., DOB, address, SSN) that does not match the intended account, or clearly expresses confusion and indicates they are not the correct recipient for the specific account or purpose of the call.
                not: The user explicitly states or implies they are not the account holder or customer. This includes cases where they are calling on behalf of the customer (e.g., a family member, a representative from an agency, an authorized third party) but are not the primary customer themselves, or simply deny being the customer without further explanation.
                unknown: The user's role or relationship to the account cannot be determined from the conversation, or there is insufficient information to categorize them as 'cus', 'attorney', 'wrong_number', or 'not'.
              example: "not"
            rpc_contact:
              description:
                "yes": the agent asked the customer if this is a good number to reach {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}; and the customer confirms that this is {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}'s number
                "no": the agent asked the customer if this is a good number to reach {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}; and the customer confirms that this is NOT {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}'s number
                "unknown": the agent HAS ALREADY asked the customer if this is a good number to reach {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}; and the customer has not confirmed or denied
                "not_asked": the agent has NOT asked the customer if this is a good number to reach {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}
              example: "not_asked"
        - variables:
            exc:
              description:
                cease_comms: if caller requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                human_agent_request: if _user refuses to speak to the virtual agent and/or requests speaking to a live agent or representative, collection agent, customer service; and in the latest turns of the conversation has not agreed to continue the conversation
                "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
              example: "null"
          len_msg_reflection: 2
          reflection_template: template_default

      processing_variable:

      transition_conditions:
        "'{{dict_variable.rpc}}' == 'wrong_number'":
          next_state: end_call
          filler: I have this good contact as referring to {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}, I will mark this as a wrong contact number. Thank you. Have a good day. <ENDCALL>

        "'{{dict_variable.exc}}' == 'cease_comms'":
          next_state: exc_cease_comms

        "'{{dict_variable.exc}}' == 'human_agent_request'":
          next_state: exc_human_agent_request

        "'{{dict_variable.rpc}}' == 'attorney'":
          next_state: exc_attorney

        # rpc cus and id verified
        "'{{dict_variable.rpc}}' == 'cus' and '{{dict_variable.id_verified}}' == 'yes'":
          next_state: mini_miranda
          filler: This is an attempt to collect a debt by a debt collector. Any information obtained will be used for that purpose. Could I call you back if we're disconnected?

        # customer and dob available to verify
        "'{{dict_variable.rpc}}' == 'cus' and '{{dict_variable.id_verified}}' != 'yes' and '{{raw_call_assignment.date_of_birth}}' not in ['', 'None']":
          next_state: inbound_verify_dob

        # customer and ssn available to verify
        "'{{dict_variable.rpc}}' == 'cus' and '{{dict_variable.id_verified}}' != 'yes' and '{{raw_call_assignment.last_4_ssn}}' not in ['', 'None']":
          next_state: inbound_verify_ssn

        # customer but neither ssn nor dob available to verify
        "'{{dict_variable.rpc}}' == 'cus' and '{{dict_variable.id_verified}}' != 'yes' and '{{raw_call_assignment.last_4_ssn}}' in ['', 'None'] and '{{raw_call_assignment.date_of_birth}}' in ['', 'None'] and '{{dict_variable.is_working_hours }}' == 'no'":
          next_state: exc_cb

        "'{{dict_variable.rpc}}' == 'cus' and '{{dict_variable.id_verified}}' != 'yes' and '{{raw_call_assignment.last_4_ssn}}' in ['', 'None'] and '{{raw_call_assignment.date_of_birth}}' in ['', 'None'] and '{{dict_variable.is_working_hours }}' == 'yes'":
          next_state: exc_cb
          filler: Thank you. We are looking for a human agent to assist you. Please hold for just a moment while I connect your call. Just in case there is no live agent available, when will be a good time to call you back?
          action_after_transition_func:
            - class: WarmTransferSignal
              params:
                transfer_message: I have located a live agent to further help with the account identification issue.
                metadata: *sm_metadata
                extra_info: *base_warm_transfer_info

        # not customer and confirmed that this is phone number for the customer
        "'{{dict_variable.rpc}}' == 'not' and '{{dict_variable.rpc_contact}}' == 'yes'":
          next_state: end_call
          filler: Thank you, we will try back at another time. <ENDCALL>
          repeat_filler:

        # not customer and confirmed that this is phone number for the customer
        "'{{dict_variable.rpc}}' == 'not' and '{{dict_variable.rpc_contact}}' == 'no'":
          next_state: end_call
          filler: I have this good contact as referring to {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}, I will mark this as a wrong contact number. Thank you. Have a good day. <ENDCALL>
          repeat_filler:

        # not customer and they refuse or not confirm
        "'{{dict_variable.rpc}}' == 'not' and '{{dict_variable.rpc_contact}}' == 'unknown' and '{{dict_variable.is_working_hours }}' == 'no'":
          next_state: end_call

        else: # unknown method and unknown value
          next_state: inbound_verify_full_name

      repeat_continuously:
        max_repeat: 4
        state_exceed_max_repeat: end_call
        filler_exceed_max_repeat: Sorry, since i cannot address your account. I will note down the request and let the human agent to call you back later. What time would work best for you?
        repeat_filler:
      max_turn_back:

  inbound_verify_dob:
    type: 2llmcalls
    2llmcalls:
      dynamic_filler:
        model_name: gpt-4o #Qwen3-4B-df_en_v3b
        nturns: 6
        fillers:
        prompt_template: prompt_filler_v2 #prompt_filler_v3    ## a key in `prompt_templates_dynamic_filler`
        quick_fillers:
      type_llm_reflection: gpt-4o-2024-11-20-openai
      type_llm_response: gpt-4o-2024-11-20-openai
      len_msg_reflection:
      len_msg_response:
      type_output_reflection: custom1
      variable_change_exception: { "exc": "null" }
      reflection_template: template_verify_dob

      pre_reflection_variable:
        # Save account_id from raw_call_assignment to dict_variable
        account_id: *tool_store_account_id

      reflection_variable:
        - variables:
            dob:
              description: |
                _user stated their day of birth (extract directly from _user response). Return as a two-digit number (dd), zero-padded if single digit. When _user provides numerical information following a request for their date of birth, aggressively parse any numerical string for a plausible date pattern, even if the string also represents other information (e.g., an address or other identifier). This parsing should prioritize identifying the first plausible date pattern (e.g., MMDDYY, MDDYY, MMDDYYYY, MMDD) at the beginning of such combined numerical sequences, even if the sequence contains other data. The day is typically the second numerical component when separated by delimiters (e.g., '1-10-82' -> '10'). For continuous numerical sequences, the day is the second segment parsed as a valid day (1-31) following a valid month (1-12). Specifically, for sequences like 'MDD' (e.g., '126'), prioritize parsing as a single-digit month (M=1) followed by a two-digit day (DD=26) if both are valid, over a two-digit month (MM=12) followed by a single-digit day (D=6). Examples for continuous numerical sequences include: from '311' (interpreted as Month=3, Day=11), extract '11'; from '2980' (interpreted as Month=2, Day=9, Year=80), extract '09'; from '2665' (interpreted as Month=2, Day=6, Year=65), extract '06'; from '42490' (interpreted as Month=4, Day=24, Year=90), extract '24'. If an explicit year (e.g., '1962') is provided, anchor the date interpretation to that year. For ambiguous sequences where both MMDD and DDMM interpretations yield a valid day (e.g., from '11020711', where the initial '1102' can be M=11, D=02 or D=11, M=02), prioritize the DDMM interpretation (e.g., from '1102' extract '11'). Assign "refuse" to `dob` if _user explicitly states they cannot or will not provide the information for a stated reason (e.g., 'Why do you need that?', 'I don't want to tell you'). Assign "unknown" to `dob` only if _user provides no numerical information interpretable as a date of birth and does not explicitly refuse it, or provides completely irrelevant non-numerical responses.
              example: "27"

            mob:
              description: |
                Extract the _user's stated month of birth as a two-digit number ('mm' format, e.g., '01' for January, '12' for December). The month should be extracted from any clear statement of a date of birth by the _user. This includes: 1. Explicit month names (e.g., "February 21st, 57", "January 26th, 1962"). 2. Standard numerical date formats (MM/DD/YY, MM-DD-YY, MM DD YY, M/D/YY, etc., e.g., "1-10-82", "03 29 75", "04-16"). 3. Contiguous numerical sequences: When the _user provides a sequence of numbers or spoken digits, identify the most complete and coherent valid date pattern within it. This pattern must consist of 1 or 2 digits forming a valid month (1-12) followed by 1 or 2 digits forming a valid day (1-31), potentially followed by a 2-digit or 4-digit year (e.g., MMDD, MDD, MMDDYY, MDDYY, MMDDYYYY, MDDYYYY). If a year is present, prioritize the month-day pattern immediately preceding it. If multiple valid month-day patterns exist within a longer numerical string, select the one that forms the most common or complete date format. Disregard any leading, trailing, or internal extraneous numbers or words that do not form part of this identified date pattern (e.g., "Six, 05, 26, 1979" should yield 05; "11020711 1962" should yield 07 from "0711 1962"; "52163" should yield 05 from "52163"; "827574375" should yield 08 from "827"). If the _user explicitly refuses to provide their date of birth or month of birth (e.g., "why do you need that?", "I don't want to give it"), assign <mob:refuse>. If the _user does not state their month of birth, or provides information that is ambiguous, incomplete, or does not form a valid month-day pattern (e.g., "wait a minute", "I'll tell you later", "2665", or only a year is stated like "1985"), assign unknown.
              example: "04"

            dob_confirmed:
              description:
                confirmed: _user stated or confirmed BOTH their MONTH and DAY of birth were recorded correctly
                unknown: user haven't confirmed BOTH their MONTH and DAY of birth were recorded correctly or stated that the recored date of birth was not correct
              example: unknown

        - variables:
            exc:
              description:
                cease_comms: if caller requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                human_agent_request: if _user refuses to speak to the virtual agent and/or requests speaking to a live agent or representative, collection agent, customer service; and in the latest turns of the conversation has not agreed to continue the conversation
                "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
              example: "null"
          len_msg_reflection: 2
          reflection_template: template_default

      processing_variable:
        mmddob:
          # new function to format date of birth in  mm/dd format
          # return unknown if dob is invalid
          tool: lib_tools.tools_kompato.get_mmddob
          params:
            dob: self.dict_variable.dob
            mob: self.dict_variable.mob

        mmddob_spoken:
          tool: lib_tools.tools_kompato.get_mmddob_spoken
          params:
            dob: self.dict_variable.dob
            mob: self.dict_variable.mob

        # single account --> verify similar to outbound
        is_dob_matched:
          tool: lib_tools.tools_kompato.verify_dob # new tool to verify dob
          params:
            dob: self.dict_variable.dob
            mob: self.dict_variable.mob
            rca_date_of_birth: self.raw_call_assignment.date_of_birth

        no_match_cnt:
          tool: lib_tools.tools_kompato.count_pattern
          params:
            current_count: self.dict_variable.no_match_cnt
            current_value: self.dict_variable.is_dob_matched
            pattern: "no_matched"

        refuse_cnt:
          tool: lib_tools.tools_kompato.count_pattern
          params:
            current_count: self.dict_variable.refuse_cnt
            current_value: self.dict_variable.dob
            pattern: "refuse"

      transition_conditions:
        "'{{dict_variable.exc}}' == 'cease_comms'":
          next_state: exc_cease_comms

        "'{{dict_variable.exc}}' == 'human_agent_request'":
          next_state: exc_human_agent_request

        # account not matched_unique or refuse to provide twice
        "{{dict_variable.refuse_cnt > 1}} or {{dict_variable.no_match_cnt > 1}}":
          next_state: inbound_verify_ssn

        # RCA updated: refuse or no matched --> continue to ask
        "'{{dict_variable.dob}}' == 'refuse' or '{{dict_variable.is_dob_matched}}' == 'no_matched'":
          next_state: inbound_verify_dob

        # RCA updated --> exact matching or RCA not updated --> verify by concierge query
        "'{{dict_variable.mmddob}}' != 'unknown' and '{{dict_variable.rpc}}' == 'cus' and ('{{dict_variable.is_dob_matched}}' == 'matched_unique' or '{{dict_variable.account_status}}' == 'single_account')":
          next_state: mini_miranda
          filler: This is an attempt to collect a debt by a debt collector. Any information obtained will be used for that purpose. Could I call you back if we're disconnected?

        # haven't confirmed rpc
        "'{{dict_variable.mmddob}}' != 'unknown' and '{{dict_variable.rpc}}' == '' and ('{{dict_variable.is_dob_matched}}' == 'matched_unique' or '{{dict_variable.account_status}}' == 'single_account')":
          next_state: inbound_verify_full_name
          filler: >-
            {% if 'first_name' in raw_call_assignment and 'last_name' in raw_call_assignment %}
            Am I speaking to {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}?
            {% else %}
            Am I speaking to {{ dict_variable.get('customer_info', {}).get('first_name', '') }} {{ dict_variable.get('customer_info', {}).get('last_name', '') }}?
            {% endif %}
          action_after_transition_func:
            - class: UpdateVariableByTransition
              params:
                field_name: "id_verified"
                field_value: "yes"

        # RPC not updated, dob confirmed but no match
        "'{{dict_variable.mmddob}}' != 'unknown' and '{{raw_call_assignment.account_id}}' == '' and '{{dict_variable.account_status}}' == 'multiple_accounts' ":
          next_state: inbound_verify_ssn

        # RPC not updated, dob confirmed but no match
        "'{{dict_variable.mmddob}}' != 'unknown' and '{{raw_call_assignment.account_id}}' == '' and '{{dict_variable.account_status}}' == 'no_matched' and '{{dict_variable.dob_confirmed}}' == 'confirmed' ":
          next_state: inbound_verify_ssn

        else: #unknown
          next_state: inbound_verify_dob

      repeat_continuously:
        max_repeat: 5
        state_exceed_max_repeat: end_call
        filler_exceed_max_repeat: Sorry, since i cannot address your account. I will note down the request and let the human agent to call you back later. What time would work best for you?
        repeat_filler:
      max_turn_back:

  inbound_verify_ssn:
    type: 2llmcalls
    2llmcalls:
      dynamic_filler:
        model_name: gpt-4o #Qwen3-4B-df_en_v3b
        nturns: 6
        fillers:
        prompt_template: prompt_filler_v2 #prompt_filler_v3    ## a key in `prompt_templates_dynamic_filler`
        quick_fillers:
      type_llm_reflection: gpt-4o-2024-11-20-openai
      type_llm_response: gpt-4o-2024-11-20-openai
      len_msg_reflection:
      len_msg_response:
      type_output_reflection: custom1
      variable_change_exception: { "exc": "null" }
      reflection_template: template_default

      pre_reflection_variable:
        account_id: *tool_store_account_id

      reflection_variable:
        - variables:
            ssn:
              description: |
                Extract the four-digit numerical sequence provided by _user that is clearly intended as their Social Security Number's last four digits, in direct response to a request for this information. If the user provides multiple numerical sequences in response to a combined request (e.g., SSN and DOB), prioritize the sequence appearing first or explicitly identified as the SSN. If an initial numerical response for SSN is immediately corrected or clarified by the user, extract the corrected value. Assign 'refuse' if _user explicitly or implicitly refuses to provide SSN or any other personal identifying information (PII) required for identification or verification that would typically precede an SSN request (e.g., 'I'm not comfortable sharing details', 'Why do you need that?', general reluctance, changing the subject after a PII request). Assign 'unavailable' if _user states they forgot their SSN digits or cannot recall them. Assign 'unknown' if _user did not provide a clear SSN as defined, or provided an ambiguous or uncertain numerical response for SSN (e.g., '3292 20 something'), and did not indicate refusal or inability to recall (e.g., ignored the request, conversation moved on without a clear response to the SSN prompt, or expressed confusion about the request itself without refusing).
              example: "unknown"

        - variables:
            exc:
              description:
                cease_comms: if caller requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                human_agent_request: if _user refuses to speak to the virtual agent and/or requests speaking to a live agent or representative, collection agent, customer service; and in the latest turns of the conversation has not agreed to continue the conversation
                "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
              example: "null"
          len_msg_reflection: 2
          reflection_template: template_default

      processing_variable:
        # check and preprocess user 's provided ssn
        processed_ssn:
          tool: lib_tools.tools_kompato.validate_digit_string
          params:
            input_string: self.dict_variable.ssn

        ssn_spelling:
          tool: lib_tools.tools_kompato.reformat_numbers_tts
          params:
            number_sequence: self.dict_variable.processed_ssn
            segment_length: 1

        # validate ssn if rca updated
        is_ssn_matched:
          tool: lib_tools.tools_kompato.verify_last_4_ssn # new tool to verify ssn
          params:
            provided_ssn: self.dict_variable.processed_ssn
            rca_ssn: self.raw_call_assignment.last_4_ssn

        # count if ssn no match
        no_match_cnt:
          tool: lib_tools.tools_kompato.count_pattern
          params:
            current_count: self.dict_variable.no_match_cnt
            current_value: self.dict_variable.is_ssn_matched
            pattern: "no_matched"

        # count if ssn refuse
        refuse_cnt:
          tool: lib_tools.tools_kompato.count_pattern
          params:
            current_count: self.dict_variable.refuse_cnt
            current_value: self.dict_variable.ssn
            pattern: "refuse"

      transition_conditions:
        "'{{dict_variable.exc}}' == 'cease_comms'":
          next_state: exc_cease_comms

        "'{{dict_variable.exc}}' == 'human_agent_request'":
          next_state: exc_human_agent_request

        # rca updated but refuse or provide ssn no matched
        "'{{raw_call_assignment.account_id}}' != '' and ({{dict_variable.no_match_cnt > 1}} or {{dict_variable.refuse_cnt > 1}})":
          next_state: exc_cb

        # raw_call_assignment has account_id in next turn after dict_variable.account_status == "single_account"
        # rca not updated, refuse provide ssn but provided dob
        "'{{raw_call_assignment.account_id}}' == '' and {{dict_variable.refuse_cnt > 1}} and '{{dict_variable.mmddob}}' != 'unknown'":
          next_state: inbound_verify_ref_code

        "'{{dict_variable.ssn}}' == 'refuse' or '{{dict_variable.is_ssn_matched}}' == 'no_matched'":
          next_state: inbound_verify_ssn

        # RCA updated --> exact matching
        "'{{dict_variable.processed_ssn}}' != 'unknown' and '{{dict_variable.rpc}}' == 'cus' and ('{{dict_variable.is_ssn_matched}}' == 'matched_unique' or '{{dict_variable.account_status}}' == 'single_account')":
          next_state: mini_miranda
          filler: Thanks. This is an attempt to collect a debt by a debt collector. Any information obtained will be used for that purpose. If we're disconnected, could I call you back?

        # haven't confirmed rpc
        "'{{dict_variable.processed_ssn}}' != 'unknown' and '{{dict_variable.rpc}}' == '' and ('{{dict_variable.is_ssn_matched}}' == 'matched_unique' or '{{dict_variable.account_status}}' == 'single_account')":
          next_state: inbound_verify_full_name
          filler: >-
            {% if 'first_name' in raw_call_assignment and 'last_name' in raw_call_assignment %}
            Am I speaking to {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}?
            {% else %}
            Am I speaking to {{ dict_variable.get('customer_info', {}).get('first_name', '') }} {{ dict_variable.get('customer_info', {}).get('last_name', '') }}?
            {% endif %}
          action_after_transition_func:
            - class: UpdateVariableByTransition
              params:
                field_name: "id_verified"
                field_value: "yes"

        "'{{dict_variable.processed_ssn}}' != 'unknown' and '{{dict_variable.account_status}}' != 'single_account' ":
          next_state: inbound_verify_ref_code

        else: #unknown
          next_state: inbound_verify_ssn

      repeat_continuously:
        max_repeat: 5
        state_exceed_max_repeat: end_call
        filler_exceed_max_repeat: Sorry, since i cannot address your account. I will note down the request and let the human agent to call you back later. What time would work best for you?
        repeat_filler: 1
      max_turn_back:

  inbound_verify_ref_code:
    type: 2llmcalls
    2llmcalls:
      dynamic_filler:
        model_name: gpt-4o #Qwen3-4B-df_en_v3b
        nturns: 6
        fillers:
        prompt_template: prompt_filler_v2 #prompt_filler_v3    ## a key in `prompt_templates_dynamic_filler`
        quick_fillers:
      type_llm_reflection: gpt-4o-2024-11-20-openai
      type_llm_response: gpt-4o-2024-11-20-openai
      len_msg_reflection:
      len_msg_response:
      type_output_reflection: custom1
      reflection_template: template_default

      pre_reflection_variable:
        account_id: *tool_store_account_id

      reflection_variable:
        - variables:
            ref_code:
              description: |
                _user stated their reference number/ reference code/ account number (extract directly from _user response). It should be in a format of nine digits.
                If _user did not state it (e.g. waith a minute, sorry i didn't get that), assign "unknown".
              example: "unknown"

        - variables:
            exc:
              description:
                cease_comms: if caller requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                human_agent_request: if _user refuses to speak to the virtual agent and/or requests speaking to a live agent or representative, collection agent, customer service; and in the latest turns of the conversation has not agreed to continue the conversation
                "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
              example: "null"
          len_msg_reflection: 4
          reflection_template: template_default

      processing_variable:
        # preprocess ref code for check_rpc query
        processed_ref_code:
          tool: lib_tools.tools_kompato.validate_digit_string
          params:
            input_string: self.dict_variable.ref_code

        ref_code_spelling:
          tool: lib_tools.tools_kompato.format_ssml_ref_code
          params:
            provided_ref_code: self.dict_variable.processed_ref_code

        # validate refcode if rca updated
        # is_refcode_matched:
        #   tool: lib_tools.tools_kompato.verify_refcode # new tool to verify refcode
        #   params:
        #     provided_refcode: self.dict_variable.processed_ref_code
        #     rca_refcode: self.raw_call_assignment.ace_debt_id

        # no_match_cnt: # count if provided ref code not match any account
        #   tool: lib_tools.tools_kompato.count_pattern
        #   params:
        #     current_count: self.dict_variable.no_match_cnt
        #     current_value: self.dict_variable.is_refcode_matched
        #     pattern: "no_matched"

        # refuse_cnt:
        #   tool: lib_tools.tools_kompato.count_pattern
        #   params:
        #     current_count: self.dict_variable.refuse_cnt
        #     current_value: self.dict_variable.ref_code
        #     pattern: "no_matched"

      transition_conditions:
        "'{{dict_variable.exc}}' == 'cease_comms'":
          next_state: exc_cease_comms
          filler:

        "'{{dict_variable.exc}}' == 'human_agent_request'":
          next_state: exc_human_agent_request
          filler:

        # RCA updated, refcode no_matched or unknown --> repeat to ask
        # "'{{dict_variable.is_refcode_matched}}' == 'no_matched' or '{{dict_variable.processed_ref_code}}' == 'unknown'":
        #   next_state: inbound_verify_ref_code
        #   filler:

        # RCA updated --> exact matching
        "'{{dict_variable.processed_ref_code}}' != 'unknown' and '{{dict_variable.rpc}}' == 'cus' and '{{dict_variable.account_status}}' == 'single_account'":
          next_state: mini_miranda
          filler: Thanks. This is an attempt to collect a debt by a debt collector. Any information obtained will be used for that purpose. If we're disconnected, could I call you back?

        # haven't confirmed rpc
        "'{{dict_variable.processed_ref_code}}' != 'unknown' and '{{dict_variable.rpc}}' == '' and '{{dict_variable.account_status}}' == 'single_account'":
          next_state: inbound_verify_full_name
          filler: >-
            {% if 'first_name' in raw_call_assignment and 'last_name' in raw_call_assignment %}
            Am I speaking to {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}?
            {% else %}
            Am I speaking to {{ dict_variable.get('customer_info', {}).get('first_name', '') }} {{ dict_variable.get('customer_info', {}).get('last_name', '') }}?
            {% endif %}
          action_after_transition_func:
            - class: UpdateVariableByTransition
              params:
                field_name: "id_verified"
                field_value: "yes"

        "'{{dict_variable.processed_ref_code}}' != 'unknown' and '{{dict_variable.account_status}}' != 'single_account'":
          next_state: exc_cb
          filler: Thank you. We are looking for a human agent to assist you. Please hold for just a moment while I connect your call. Just in case there is no live agent available, when will be a good time to call you back?
          action_after_transition_func:
            - class: WarmTransferSignal
              params:
                transfer_message: I have located a live agent to further help with the account identification issue.
                metadata: *sm_metadata
                extra_info: *base_warm_transfer_info

        else: #unknown
          next_state: inbound_verify_ref_code
          filler:
          repeat_filler:

      repeat_continuously:
        max_repeat: 4
        state_exceed_max_repeat: end_call
        filler_exceed_max_repeat: Sorry, since i cannot address your account. I will note down your call and let the human agent to call you back later. What time would work best for you?
        repeat_filler: 1
      max_turn_back:

  check_wrong_3rd_party:
    type: 2llmcalls
    2llmcalls:
      type_llm_reflection: gpt-4o-2024-11-20-openai
      type_llm_response: gpt-4o-2024-11-20-openai
      len_msg_reflection:
      len_msg_response:
