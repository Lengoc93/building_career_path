                # bankruptcy: if caller tells that they are in bankruptcy
                # cease_comms: if caller requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                # attorney: if the caller or consumer lets you know that they are being represented by an attorney or lawyer (e.g. "I have an attorney" or "Speak to my lawyer" or "My lawyer told me not to talk to you. Please contact them instead")
                human_agent_request: if _user specifically requests speaking to a live agent, human, or representative; and in the latest turns of the conversation has not agreed to continue the conversation
                "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
              example: "null"

          len_msg_reflection: 2
          reflection_template: template_default

      processing_variable:
        cnt_unknown:
          tool: lib_tools.tools_kompato.count_unknown_threshold

      transition_conditions:
        "'{{dict_variable.exc}}' == 'human_agent_request'":
          next_state: exc_human_agent_request
          filler:
          repeat_filler:

        "'{{dict_variable.exc_attorney_confirmed}}' == 'refuted'":
          next_state: BACK|EXC #ask debt detail
          filler: #Could you please provide the account details of the debt you are disputing?
          repeat_filler:

        ### get attorney's name and phone
        "'{{dict_variable.exc_attorney_name}}' != 'unknown' and '{{dict_variable.exc_attorney_phone}}' != 'unknown'":
          next_state: end_call
          filler:
          repeat_filler:

        ### only get attorney's name
        "'{{dict_variable.exc_attorney_name}}' != 'unknown' and '{{dict_variable.exc_attorney_phone}}' == 'unknown' and '{{dict_variable.exc_attorney_contact}}' == 'unknown' and '{{dict_variable.asked_attorney_contact}}' == 'no' and '{{dict_variable.reasked_attorney_name}}' == 'no'":
          next_state: exc_attorney
          filler:
          repeat_filler:

        "'{{dict_variable.exc_attorney_name}}' != 'unknown' and '{{dict_variable.exc_attorney_phone}}' == 'unknown' and '{{dict_variable.exc_attorney_contact}}' == 'unknown' and '{{dict_variable.asked_attorney_contact}}' == 'yes' and '{{dict_variable.reasked_attorney_name}}' == 'no'":
          next_state: end_call
          filler:
          repeat_filler:

        "'{{dict_variable.exc_attorney_name}}' != 'unknown' and '{{dict_variable.exc_attorney_phone}}' == 'unknown' and '{{dict_variable.exc_attorney_contact}}' != 'unknown' and '{{dict_variable.asked_attorney_contact}}' == 'yes' and '{{dict_variable.reasked_attorney_name}}' == 'no'":
          next_state: end_call
          filler:
          repeat_filler:

        ### only get attorney's phone
        "'{{dict_variable.exc_attorney_name}}' == 'unknown' and '{{dict_variable.exc_attorney_phone}}' != 'unknown' and '{{dict_variable.exc_attorney_contact}}' == 'unknown' and '{{dict_variable.asked_attorney_contact}}' == 'no' and '{{dict_variable.reasked_attorney_name}}' == 'no'":
          next_state: exc_attorney
          filler:
          repeat_filler:

        "'{{dict_variable.exc_attorney_name}}' == 'unknown' and '{{dict_variable.exc_attorney_phone}}' != 'unknown' and '{{dict_variable.exc_attorney_contact}}' == 'unknown' and '{{dict_variable.asked_attorney_contact}}' == 'no' and '{{dict_variable.reasked_attorney_name}}' == 'yes'":
          next_state: exc_attorney
          filler:
          repeat_filler:

        "'{{dict_variable.exc_attorney_name}}' == 'unknown' and '{{dict_variable.exc_attorney_phone}}' != 'unknown' and '{{dict_variable.exc_attorney_contact}}' == 'unknown' and '{{dict_variable.asked_attorney_contact}}' == 'yes' and '{{dict_variable.reasked_attorney_name}}' == 'yes'":
          next_state: end_call
          filler:
          repeat_filler:

        "'{{dict_variable.exc_attorney_name}}' == 'unknown' and '{{dict_variable.exc_attorney_phone}}' != 'unknown' and '{{dict_variable.exc_attorney_contact}}' != 'unknown' and '{{dict_variable.asked_attorney_contact}}' == 'yes' and '{{dict_variable.reasked_attorney_name}}' == 'yes'":
          next_state: end_call
          filler:
          repeat_filler:

        ### get neither attorney's name nor attorney's phone BUT exceed threshold 3 times
        "'{{dict_variable.exc_attorney_name}}' == 'unknown' and '{{dict_variable.exc_attorney_phone}}' == 'unknown' and {{dict_variable.cnt_unknown}}>=3":
          next_state: end_call
          filler:
          repeat_filler:

        else: ### get neither attorney's name nor attorney's phone BUT within threshold 3 times
          next_state: exc_attorney
          filler: #I will be unable to resolve the debt if you do not get the attorney's information. Can you provide their full name and phone number?
          repeat_filler:

      repeat_continuously:
        max_repeat:
        state_exceed_max_repeat: end_call
        filler_exceed_max_repeat: #Thank you. |partial # for your time today. If you have any more concerns, feel free to reach out anytime through our hotline at {{dict_variable.ssml_company_hotline}}. Have a great day!<ENDCALL>
        repeat_filler:
      max_turn_back:

  exc_cb:
    type: 2llmcalls
    2llmcalls:
      ## dynamic filler customized for each state
      dynamic_filler:
        model_name: gpt-4o #Qwen3-4B-df_en_v3b
        nturns: 6
        fillers:
        prompt_template: prompt_filler_v2 #prompt_filler_v3    ## a key in `prompt_templates_dynamic_filler`
        quick_fillers:
      type_llm_reflection: gpt-4o-2024-11-20-openai
      type_llm_response: gpt-4o-2024-11-20-openai
      len_msg_reflection:
      len_msg_response:
      type_output_reflection: custom1
      reflection_template: template_exception
      pre_reflection_variable:
        init_call_date:
          tool: lib_tools.tools_kompato.init_outbound_call_date
        init_consumer_info:
          tool: lib_tools.tools_kompato.init_outbound_consumer_info
      reflection_variable:
        exc_cb_consent:
          description:
            "yes": if _user explicitly or implicitly agrees to be called back (e.g. 'yes', 'okay', 'please call me back')
            "sooner": if _user explicitly or implicitly agree to be called back sooner (e.g. 'call me sooner', 'can you call me tommorrow?')
            never: if _user rejects to be called back by human (e.g. "Never call me again", "No I don't want a human to call me back")
            unknown: if _user gives unclear answer
          example: "yes"
        exc_cb_schedule:
          description: return specific time or date for callback if provided by _user, else return 'unknown'
          example: "tomorrow at 3 PM"
      processing_variable:
        cnt_unknown:
          tool: lib_tools.tools_kompato.count_unknown_threshold
        warm_transfer_elapsed_time_cb:
          tool: lib_tools.tools_kompato.calculate_duration
          params:
            date_input: self.dict_variable.warm_transfer_init_time

      transition_conditions:
        "'{{dict_variable.payment_result}}' == 'success'":
          next_state: update_info
          filler: Thank you for setting up your payment with us. To ensure important account updates reach you timely, could we take a moment to update your contact details?
          repeat_filler:

        "('{{dict_variable.rpc}}' == 'not') and '{{dict_variable.exc_cb_schedule}}' != 'unknown'":
          next_state: end_call
          filler:
          repeat_filler:

        "'{{dict_variable.get('is_working_hours', 'no') }}' == 'yes' and '{{dict_variable.get('warm_transfer_sent', 'no')}}' != 'yes' and '{{dict_variable.get('rpc', 'unknown')}}' != 'not' and '{{dict_variable.exc}}' != 'callback'":
          next_state: exc_cb
          filler:
          action_after_transition_func:
            - class: WarmTransferSignal
              params:
                transfer_message: I have located a live agent to further help you.
                metadata: *sm_metadata
                extra_info: *base_warm_transfer_info

        ### timeout warm transfer; busy signal
        "'{{dict_variable.warm_transfer_sent}}' == 'yes' and '{{dict_variable.transfer_result}}' != 'busy' and ( ({{dict_variable.get('warm_transfer_elapsed_time_cb',0) < 600}} and {{dict_variable.get('mini_miranda', '') != 'yes' }} ) or ({{dict_variable.get('warm_transfer_elapsed_time_cb',0) < 600}} and {{dict_variable.get('mini_miranda', '') == 'yes' }} ) )":
          next_state: exc_cb
          filler: #I'll have a supervisor call you back within the next 7 days. Is that alright?
          repeat_filler:

        "('{{dict_variable.exc_cb_consent}}' != 'unknown') and '{{dict_variable.exc_cb_schedule}}' != 'unknown'":
          next_state: end_call
          filler:
          repeat_filler:

        "'{{dict_variable.exc_cb_consent}}' == 'unknown' and {{dict_variable.cnt_unknown}} < 2":
          next_state: exc_cb
          filler: #I'll have a supervisor call you back within the next 7 days. Is that alright?
          repeat_filler:

        "'{{dict_variable.exc_cb_consent}}' == 'unknown' and {{dict_variable.cnt_unknown}} == 2":
          next_state: end_call
          filler: #I cannot have a human call them back without your consent. Thank you for your time today. Have a great day!<ENDCALL>
          repeat_filler:

        "'{{dict_variable.exc_cb_consent}}' == 'no' and '{{dict_variable.exc_cb_schedule}}' == 'unknown' and {{dict_variable.cnt_unknown}} < 2":
          next_state: exc_cb
          filler:
          repeat_filler:

        "'{{dict_variable.exc_cb_consent}}' == 'no' and '{{dict_variable.exc_cb_schedule}}' == 'unknown' and {{dict_variable.cnt_unknown}} == 2":
          next_state: end_call
          filler: #I cannot have a human call them back without your consent. Thank you for your time today. Have a great day!<ENDCALL>
          repeat_filler:

        "'{{dict_variable.exc_cb_consent}}' == 'yes' and '{{dict_variable.exc_cb_schedule}}' != 'unknown'":
          next_state: end_call
          filler:
          repeat_filler:

        "'{{dict_variable.exc_cb_consent}}' == 'never'":
          next_state: end_call
          filler:
          repeat_filler:

        "'{{dict_variable.transfer_result}}' == 'busy'":
          next_state: end_call
          filler: Sorry we could not find an available agent at the moment. |partial
          repeat_filler:

        "{{dict_variable.get('warm_transfer_elapsed_time_cb',0) > 600 and dict_variable.get('mini_miranda','') != 'yes' }}":
          next_state: end_call
          filler: Sorry we could not find an available agent at the moment. |partial
          repeat_filler:

        "{{dict_variable.get('warm_transfer_elapsed_time_cb',0) > 600 and dict_variable.get('mini_miranda', '') == 'yes' }}":
          next_state: end_call
          filler: Sorry we could not find an available agent at the moment. |partial
          repeat_filler:

        else: # exc_cb_consent = 'yes'
          next_state: exc_cb
          filler:
          repeat_filler:

      repeat_continuously:
        max_repeat: 7
        state_exceed_max_repeat: end_call
        filler_exceed_max_repeat: #Sorry it sems I'm unable to help. |partial #Sorry we couldn't resolve your issue. Thank you for your time today. If you have any more concerns, feel free to reach out anytime through our hotline at {{dict_variable.ssml_company_hotline}}. Have a great day!<ENDCALL>
        repeat_filler:
      max_turn_back:

  post_exc:
    type: 2llmcalls
    2llmcalls:
      ## dynamic filler customized for each state
      dynamic_filler:
        model_name: gpt-4o #Qwen3-4B-df_en_v3b
        nturns: 6
        fillers:
        prompt_template: prompt_filler_v2 #prompt_filler_v3    ## a key in `prompt_templates_dynamic_filler`
        quick_fillers:
      type_llm_reflection: gpt-4o-2024-11-20-openai
      type_llm_response: gpt-4o-2024-11-20-openai
      len_msg_reflection:
      len_msg_response:
      type_output_reflection: custom1
      reflection_template: template_exception

      pre_reflection_variable:
        init_call_date:
          tool: lib_tools.tools_kompato.init_outbound_call_date
        init_consumer_info:
          tool: lib_tools.tools_kompato.init_outbound_consumer_info
      reflection_variable:
        continue_conversation:
          description:
            "yes": the user's concerns or issues have been resulted and they want to resume the conversation with the agent
            "no": user requests callback by a live agent or wishes to stop this call
            "unknown": user response unclear
          example: "unknown"
        exc_cb:
          description: return 'yes' if _user agrees to be called back and 'no' if _user rejects to be called back, else return 'unknown' in the latest turn of the conversation
          example: "no"
      processing_variable:

      transition_conditions:
        "'{{dict_variable.continue_conversation}}' == 'yes' ":
          next_state: BACK|EXC
          filler:
          repeat_filler:
          ignore_back_msg: true

        "'{{dict_variable.exc_cb}}' == 'no'":
          next_state: post_exc #persuade to ask call back
          filler: #Respecting your privacy is crucial to us. Without your consent, our team cannot reach out to assist in resolving this issue. Could you reconsider allowing us to call you back?
          repeat_filler:

        "'{{dict_variable.exc_cb}}' == 'yes' and '{{dict_variable.exc}}' not in ('dispute_theft', 'dispute_txn_fraud', 'bankruptcy')":
          next_state: end_call #BACK|EXC
          filler:
          repeat_filler:
          # ignore_back_msg: true

        "'{{dict_variable.exc_cb}}' == 'yes' and '{{dict_variable.exc}}' in ('dispute_theft', 'dispute_txn_fraud', 'bankruptcy')":
          next_state: end_call
          filler: #Do you have any concerns?
          repeat_filler:

        else: #exc_cb=unknown
          next_state: post_exc
          filler: # We will escalate this dispute to a supervisor. May we have your permission for a supervisor to contact you and help resolve your issue?
          repeat_filler:

      repeat_continuously:
        max_repeat: 10
        state_exceed_max_repeat: end_call
        filler_exceed_max_repeat: #Sorry we couldn't resolve your issue. Thank you for your time today. If you have any more concerns, feel free to reach out anytime through our hotline at {{dict_variable.ssml_company_hotline}}. Have a great day!<ENDCALL>
        repeat_filler:
      max_turn_back:

  exc_human_agent_request:
