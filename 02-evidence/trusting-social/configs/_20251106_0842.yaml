        state_exceed_max_repeat: pre_end_call
        filler_exceed_max_repeat:
        repeat_filler:
      max_turn_back:

  check_rpc:
    type: 2llmcalls
    2llmcalls:
      ## dynamic filler customized for each state
      dynamic_filler:
        model_name: gpt-4o #Qwen3-4B-df_en_v3b
        nturns: 6
        fillers:
        prompt_template: prompt_filler_v2 #prompt_filler_v3    ## a key in `prompt_templates_dynamic_filler`
        quick_fillers:
      type_llm_reflection: gpt-4o-2024-11-20-openai
      type_llm_response: gpt-4o-2024-11-20-openai
      len_msg_reflection:
      len_msg_response: 4
      type_output_reflection: custom1
      reflection_template: template_default
      variable_change_exception: { "exc": "null" }
      pre_reflection_variable:
        init_call_date:
          tool: lib_tools.tools_kompato.init_outbound_call_date
        init_consumer_info:
          tool: lib_tools.tools_kompato.init_outbound_consumer_info
        myob_on_file:
          tool: lib_tools.tools_kompato.get_myob_on_file

      reflection_variable:
        # reflection to detect intent
        - variables:
            rpc:
              description:
                cus: _user confirmed that they were the customer (e.g. "speaking", "okay", "yes", etc) in response to us speaking out their name
                attorney: _user wanted to assign to their attorney or lawyer
                wrong_number: _user said that you were calling wrong number, or that you have the wrong number, or that this number does not belong to {{raw_call_assignment.first_name}}{{raw_call_assignment.last_name}}
                not: _user said or implied that they were not customer
                unknown: if your are not sure
              example: "not"
            voice_mail:
              description: return "yes" if _user appears to be a voicemail automated answering machine. Common phrases including "This is a message for...", "Please leave a message after the tone.", "I'm not available right now.", "At the beep...", "You've reached the voicemail of...", "Please call me back at...", "I'll get back to you soon.", "Sorry I missed your call.", "[Name] is currently not available", "This is [Name]..." (often followed by "leaving a message"), "Press [number] for [department/option]", "Enter the extension", "May be recorded and used by a third party", "This is [Name] at [Business/Location]", "Hi, if you record your name and reason for calling, I'll see if this person is available". Else, return "no"
              example: "no"
            confirm_callback:
              description:
                "done": if _user is NOT {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}} AND _assistant has clarified the callback time with _user (e.g., "what is the best time for us to call back?")
                "not": if one of the following cases holds true (1) _user is {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}, (2) _user is NOT {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}} AND _assistant has NOT clarified the callback time
              example: "done"

          type_llm_reflection:
            gpt-4o-2024-11-20-openai

            # consent_id_verify:
            #   description:
            #     "yes": if the _user proceeds with ID verification after being asked to do so the second time
            #     "no": if the _user keeps talking about their issues, complaints, or disputes without confirming their identity after being asked to do so the second time
            #     "unknown": if it is unclear whether the _user proceeds with ID verification before revisiting their issues, complaints, or disputes
            #   example: "yes"

        # reflection to detect exception
        - variables:
            exc:
              description:
                revoke_record_consent: if _user explicitly says that they do not want to be RECORDED (e.g. why you need RECORDING?, i prefer not RECORDING, ...); and in the latest turns of the conversation has not confirmed that they accept to be recorded
                inconvenient_time: if _user implicitly or explicitly says that they are busy (e.g. the consumer is busy; don't have the time to talk; this is not a good time to talk; ask to call back at a different time; is not at home ...); and in the latest turns of the conversation has not confirmed that they are now available
                cease_comms: if caller requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                non_english: if _user says they does not speak English; and in the latest turns of the conversation has not decided that they will continue in English
                prison: if _user says that the consumer is in prison
                military_service: if _user says that the consumer is actively serving in the military
                human_agent_request: if _user refuses to speak to, verify their identity with, discuss matters, or provide information and/or requests speaking to a live agent; and in the latest turns of the conversation has not agreed to continue the conversation
                revoke_record_ai_consent: ONLY if _user specified that they don't want to be RECORDED by an AI virtual agent; and in the latest turns of the conversation has not confirmed that they accept to be recorded by AI
                death: if _user explicitly says that the consumer is deceased (e.g. the consumer has passed away; no longer living; no longer with us; with god; in heaven; dead)
                "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
                # question_without_answer: if the _user asks a question that requires information that is not available in the conversation context, and in the latest turns of the conversation has not explicitly abandoned the question.
              example: "null"
          len_msg_reflection: 4
          reflection_template: template_default

      processing_variable:
        # guardrail_response:
        #   tool: lib_tools.guardrails.guardrail_validator

      transition_conditions:
        "'{{dict_variable.voice_mail}}' == 'yes'":
          next_state: pre_opening
          filler:
            if exp_voicemail == "variation_1": <ENDCALL>
            elif exp_voicemail == "variation_2": Hi, this is {{raw_call_assignment.agent_name}}, a virtual agent calling from Kompato AI. Please contact me or any of our live agents at 1--8-8-8--5-6-6--7-2-8-0 . Live agents are available from 9am to 5pm Eastern Monday to Friday, and virtual agents are available 24 hours a day for your convenience. <ENDCALL>
            else: pre_opening
          repeat_filler:

        "'{{dict_variable.exc}}' == 'death'":
          next_state: exc_deceased
          filler: #I see. |partial #When would be a good time for us to call you back?
          repeat_filler:

        "'{{dict_variable.exc}}' == 'non_english'":
          next_state: exc_language
          filler:
          repeat_filler:

        "'{{dict_variable.exc}}' == 'cease_comms'":
          next_state: exc_cease_comms
          filler:
          repeat_filler:

        "'{{dict_variable.exc}}' == 'prison'":
          next_state: exc_prison
          filler:
          repeat_filler:

        "'{{dict_variable.exc}}' == 'military_service'":
          next_state: exc_military_service
          filler:
          repeat_filler:

        "'{{dict_variable.exc}}' == 'human_agent_request'":
          next_state: exc_human_agent_request
          filler:
          repeat_filler:

        "'{{dict_variable.exc}}' == 'revoke_record_ai_consent'":
          next_state: exc_revoke_ai_recording
          filler:
          repeat_filler:

        "'{{dict_variable.exc}}' == 'inconvenient_time'":
          next_state: exc_inconvenient_time
          filler:
          repeat_filler:

        "'{{dict_variable.exc}}' == 'revoke_record_consent'":
          next_state: exc_revoke_recording
          filler:
          repeat_filler:

        "'{{dict_variable.cus}}' == 'attorney'":
          next_state: exc_attorney
          filler:
          repeat_filler:

        "'{{dict_variable.rpc}}' == 'cus' and '{{dict_variable.exc}}' == 'null' and '{{raw_call_assignment.date_of_birth}}' != ''":
          next_state: verify_dob
          filler: |
            I'm calling from {{raw_call_assignment.company_name}} on behalf of {% if raw_call_assignment.get('current_creditor_name', '') != '' %}{{raw_call_assignment.current_creditor_name}} {% elif raw_call_assignment.get('client_name', '') != '' %}{{raw_call_assignment.client_name}} {% else %} {{raw_call_assignment.original_creditor_name}} {% endif %}. {% if dict_variable.get('meaningful', '') == 'yes' and dict_variable.get('adapt_opening', 'none') != 'none' %}{{dict_variable.adapt_opening}}{% endif %} {% if raw_call_assignment.get('vendor_id', '0') | int in [6, 8] %}For verification purposes,{% else %}To protect your privacy and proceed with the call,{% endif %} I have {{dict_variable.ssml_date_of_birth}} as your birthdate on file. Is that correct?
          repeat_filler:

        "'{{dict_variable.rpc}}' == 'cus' and '{{dict_variable.exc}}' == 'null' and '{{raw_call_assignment.last_4_ssn}}' != '' and '{{raw_call_assignment.date_of_birth}}' == ''":
          next_state: verify_ssn
          filler: |
            I'm calling from {{raw_call_assignment.company_name}} on behalf of {% if raw_call_assignment.get('current_creditor_name', '') != '' %}{{raw_call_assignment.current_creditor_name}} {% elif raw_call_assignment.get('client_name', '') != '' %}{{raw_call_assignment.client_name}} {% else %} {{raw_call_assignment.original_creditor_name}} {% endif %}. {% if dict_variable.get('meaningful', '') == 'yes' and dict_variable.get('adapt_opening', 'none') != 'none' %}{{dict_variable.adapt_opening}}{% endif %} {% if raw_call_assignment.get('vendor_id', '0') | int in [6, 8] %}For verification purposes,{% else %}To protect your privacy and proceed with the call,{% endif %} could you please confirm the last four digits of your Social Security Number?
          repeat_filler:

        "'{{dict_variable.rpc}}' == 'cus' and '{{dict_variable.exc}}' == 'null' and '{{raw_call_assignment.zip}}' != '' and '{{raw_call_assignment.last_4_ssn}}' == '' and '{{raw_call_assignment.date_of_birth}}' == ''":
