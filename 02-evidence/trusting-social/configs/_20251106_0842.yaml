              description:
                call: if _user asks to stop receiving calls (e.g. "Take me off of your calling list", "Stop calling me" or "Never call me again" or "Please don't call me again" or "Do not phone me").
                email: if _user asks to stop receiving emails (e.g. "Stop sending me emails" or "Do not send me emails").
                sms: if _user asks to stop receiving SMS or textings (e.g. "Stop sending me messages" or "Do not text me").
                unknown: if consumer's intention is not clear
                cease_all: if _user explicitly states to stop receiving ANY and ALL forms of communication about the debt ("Stop communicating with me.", "Don't contact me ever again" or "Never reach out to me again.").
              example: call
            contact_confirmed:
              description: return "yes" if _user confirm their phone number or email is correct or that they want to stop calling this number, return "no" if incorrect. default value is "unknown".
              example: "yes"
            exc_comms_contact:
              description: return specific phone number (e.g. "0282346867") or email (e.g. "kompato@gmail.com") that _user stated to not receive communication. If the customer suggests to stop calling them, infer that it is this phone number and return "filed". Else return 'unknown'
              example: "0123456789"

        - variables:
            exc:
              description:
                # complaint: if _user complain about historical calls, system issues, procedure issues, policy issues, response time or process of receiving requested documents.; and in the latest turns of the conversation has not confirmed that the complaint is now resolved or they have chosen to ignore it for now.
                # dispute: if _user just said they want to dispute the debt but not mention clear reasons such as debt amount, or they already paid, or they are a victim of identity theft.; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
