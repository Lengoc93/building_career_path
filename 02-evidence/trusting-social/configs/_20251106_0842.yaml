          repeat_filler:

        # one-time payment other day
        "'{{dict_variable.method}}' in ('online') and '{{dict_variable.instructed}}' == 'yes' and '{{dict_variable.months}}' == '1' and '{{dict_variable.first_date}}' != '{{raw_call_assignment.today}}'":
          next_state: update_info
          filler: #I've just sent the link to your mobile number. Please let me know when you receive it. # |partial # Before we end the call, I want to confirm your contact information. I have {{dict_variable.ssml_phone}} as your contact number in my records. Is this still the best way to reach you?
          repeat_filler:

        # recurring payment
        "'{{dict_variable.method}}' in ('online') and '{{dict_variable.instructed}}' == 'yes' and '{{dict_variable.months}}' != '1'":
          next_state: update_info
          filler: To ensure important account updates reach you timely, could we take a moment to update your contact details? # |partial # Before we end the call, I want to confirm your contact information. I have {{dict_variable.ssml_phone}} as your contact number in my records. Is this still the best way to reach you?
          repeat_filler:

        "'{{dict_variable.method}}' == 'mail' and '{{dict_variable.instructed}}' == 'yes'":
          next_state: update_info
          filler: To ensure important account updates reach you timely, could we take a moment to update your contact details? #|partial #Before we end the call, I want to confirm your contact information. I have {{dict_variable.ssml_phone}} as your contact number in my records. Is this still the best way to reach you?
          repeat_filler:

        "'{{dict_variable.method}}' == 'other'":
          next_state: payment_method
          filler: #We apologize for any inconvenience, but we currently support online payment or mail check; could you please let us know which payment method you prefer?
          repeat_filler:

        "'{{dict_variable.method}}' == 'reject'":
          next_state: payment_method
          filler: #We understand that our current payment methods may not meet everyone's needs, and we apologize for any inconvenience this may cause. Unfortunately, these are the only payment options we currently offer. Could you please let us know which method you prefer?>
          repeat_filler:
        ### END handle main flow

        else: #method=unknown
          next_state: payment_method
          filler: #Which method do you prefer, Online payment or payment via Mail?
          repeat_filler:

      repeat_continuously:
        max_repeat: 10
        state_exceed_max_repeat: end_call
        filler_exceed_max_repeat: I'm sorry it seems I'm having difficulty in assisting you with the payment. |partial #I haven't received your preferred payment method. Thank you for your time today. If you have any more concerns, feel free to reach out anytime through our hotline at {{raw_call_assignment.company_hotline}}. Have a great day!<ENDCALL>
