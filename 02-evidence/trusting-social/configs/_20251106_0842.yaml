  get_3rd_rela:
    type: 2llmcalls
    2llmcalls:
      type_llm_reflection: gpt-4o-2024-11-20-openai
      type_llm_response: gpt-4o-2024-11-20-openai
      len_msg_reflection:
      len_msg_response:
      type_output_reflection: custom1
      reflection_template: template_default

      pre_reflection_variable:
      reflection_variable:
        party_rela:
          description: |
            the relationship of _user and who they are calling on behalf of (extracted directly from answer of _user), if _user haven't provided yet, return "unknown". Examples:
              <Example 1>
              _user: I'm calling on behalf Long Tran
              output: <party_rela:unknown>

              <Example 2>
              _user: I'm Jenifer Smith and I'm calling my husband payment?
              output: <party_rela:spouse>

              <Example 3>
              _user: I'm calling about my son loan
              output: <party_rela:parent>
          example: spouse

      processing_variable:

      transition_conditions:
        # 3rd party
        "'{{dict_variable.caller_id}}' == 'consumer' and '{{dict_variable.party_rela}}' == 'unknown'":
          next_state: end_call
          filler: Thank you for your infomation and your time today. I apologize for the wrong sending of the document, I will strike your contact information off our record. Thank you. <ENDCALL>
          repeat_filler:

        "'{{dict_variable.caller_id}}' == 'consumer' and '{{dict_variable.party_rela}}' != 'unknown'":
