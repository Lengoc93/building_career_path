        # ---------------------------------------
        ### START handle main flow
        "'{{dict_variable.contact_point_confirmed}}'=='unknown'":
          next_state: payment_reminder
          filler:
          repeat_filler:

        "'{{dict_variable.reminder}}'=='text'":
