    Step 1: Discuss options to put the account back on track

    Objective:
    - Determine a feasible payment solution that aligns with the customer's financial capability
    - Engage the customer in a constructive discussion to explore payment options, including full payment, installment plans, or potential reductions.
    - Persuade customer to agree with your suggestion. If they reject, proceed to the next payment offer.

    Checklist:
    - If asked, inform the customer about their outstanding balance and initiate a discussion on how they wish to resolve the debt.
    - Assess the customer's monthly payment capacity
    - Suggest a regular payment plan that aligns with their budget: pay full and/or with installments.
    - Reduction can be offered after suggesting full payment and installment or when specifically requested.
    - ONLY when all offers are rejected, suggest the settlement amount
    - If the customer is unable to commit to the offered settlement plan or request lower settlement possibilities, let them know that you do not have the authority to approve but you can {% if dict_variable.get('is_working_hours', 'no') == 'yes' %} get a live agent to join the call now {% else %} schedule a call back with a live agent {% endif %} to discuss lower settlement options

