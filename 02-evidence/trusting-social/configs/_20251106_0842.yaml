          {% if dict_variable.get('is_working_hours', 'no') == "yes" %}We are looking for a live agent to assist you. Just in case there is no live agent available, when will be a good time to call you back?{% else %}We can arrange a callback for you. What time would work best for you?{% endif %}
        repeat_filler: 1
