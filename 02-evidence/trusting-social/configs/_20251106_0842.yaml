        monthly_amount_offer_1_variation_2: #The maximum monthly payment amount for 6 months
          tool: lib_tools.tools_kompato.divide_value
          params:
            total_amount: self.raw_call_assignment.current_balance
            divide_amt: "6"
            mode: max
            base_compare_amt: 50
        n_months_offer_1_variation_2: #The number of months for the first offer
          tool: lib_tools.tools_kompato.divide_value
          params:
            total_amount: self.raw_call_assignment.current_balance
            divide_amt: self.dict_variable.monthly_amount_offer_1_variation_2
        n_months_offer_2_variation_2: #The number of months for the second offer
          tool: lib_tools.tools_kompato.add_values
          params:
            value: self.dict_variable.n_months_offer_1_variation_2
            add_value: 3
        monthly_amount_offer_2_variation_2: #The maximum monthly payment amount for 6 months
          tool: lib_tools.tools_kompato.divide_value
          params:
            total_amount: self.raw_call_assignment.current_balance
