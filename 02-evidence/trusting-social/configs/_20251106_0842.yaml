    2.3 Reduction Request: If the customer requests a reduction of the debt without specifying the reduced amount or the customer offer specific amount can not accept expectation, ALWAYS advise consumers we can accept a settlement of {{dict_variable.ssml_total_amount_settlement}} on their account, saving them {{dict_variable.ssml_total_amount_reduction}} and ask the consumer whether this works for them
