    2.5 Natural Disaster or Personal Hardship: If the consumer is facing natural disaster, sudden illness or accidents, or a lost family member, empathize with their situation and ask when would be a better time to reach out again. After confirming the time to call back with the customer, move to Step 5.

    2.6 Transfer to a Live Agent: Let them know that you do not have the authority to approve other options but you will get a live agent to join the call now to discuss lower settlement options. Then proceed to 2.7

