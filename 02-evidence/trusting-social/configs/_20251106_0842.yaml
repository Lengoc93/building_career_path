          next_state: payment_method
          filler: We will not send a reminder. |partial # Please remember to make your payment on time to quickly resolve this debt and ease your mind. Could you please let me know through which channel you would like to make your payment?
          repeat_filler:

        "'{{dict_variable.reminder}}'=='other'":
          next_state: payment_method
