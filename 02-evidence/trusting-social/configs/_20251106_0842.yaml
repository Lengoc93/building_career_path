          {% else %}
          2.2.b.1 IMPORTANT: When responding to requests for a payment plan, ALWAYS tell the customer that approval for a payment plan that long {{dict_variable.n_months_user}} months is unlikely. DO NOT comment about the monthly payment amount being too low. Your response MUST focus on the long repayment period as the reason for recommending a different plan. Recommend a shorter payment plan instead, use words to effect:
          - "It is hard to get approved for a payment plan that spans {{dict_variable.n_months_user}} months. Would you consider to pay {{dict_variable.monthly_max_installments}} dollars with {{raw_call_assignment.payment_max_duration_in_months}} months instead?" 
