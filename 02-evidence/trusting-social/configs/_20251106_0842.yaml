  verify_dob:
    type: 2llmcalls
    2llmcalls:
      ## dynamic filler customized for each state
      dynamic_filler:
        model_name: gpt-4o #Qwen3-4B-df_en_v3b
        nturns: 6
        fillers:
        prompt_template: prompt_filler_v2 #prompt_filler_v3    ## a key in `prompt_templates_dynamic_filler`
        quick_fillers:
      type_llm_reflection: gpt-4o-2024-11-20-openai
      type_llm_response: gpt-4o-2024-11-20-openai
      len_msg_reflection: 4
      len_msg_response: 4
      type_output_reflection: custom1
      reflection_template: template_verify_dob
      variable_change_exception: { "exc": "null" }

      pre_reflection_variable:

      reflection_variable:
        - type_llm_reflection: gpt-4o-2024-11-20-openai
          variables:
            # dob:
            #   description: |
            #     Extract the user's stated day of birth directly from their response, which may be provided in spoken language format (e.g., "twenty-seventh"), and return it as a two-digit number in the format `dd`. Or if the agent says the day of birth on file and the user confirms it, return this as a two-digit number in the format `dd`
            #     - If the user refuses to provide their day of birth or questions the need for this information (e.g., "Why do I need to tell you that information?"), assign `refuse` to `dob`.
            #     - If the user does not state their day of birth or provides an irrelevant response (e.g., "Wait a minute," "Sorry, I didn't get that"), assign `unknown` to `dob`.
            #   example: "27"

            # mob:
            #   description: |
            #     Extract the user's stated month of birth directly from their response, which may be provided in spoken language format (e.g., "April"), and return it as a two-digit number in the format `mm`. Or if the agent says the month of birth on file and the user confirms it, return this as a two-digit number in the format `mm`
            #     - If the user refuses to provide their month of birth or questions the need for this information (e.g., "Why do I need to tell you that information?"), assign `refuse` to `mob`.
            #     - If the user does not state their month of birth or provides an irrelevant response (e.g., "Wait a minute," "Sorry, I didn't get that"), assign `unknown` to `mob`.
            #   example: "04"

            dob:
              description: |
                Return the day of birth ONLY when _user confirms what _assistant states is correct. Or extract a new day that _user explicitly says. The day may be provided in spoken language format (e.g., "twenty-seventh"), and return it as a two-digit number in the format `dd`.
                - If _user refuses to provide or confirm their day of birth (e.g., "Why do I need to tell you that information?"), assign `refuse`.
                - If it's unclear, return `unknown`.
              example: "27"

            mob:
              description: |
                Return the month of birth ONLY when _user confirms what _assistant states is correct. Or extract a new month that _user explicitly says. The month may be provided in spoken language format (e.g., "April"), and return it as a two-digit number in the format `mm`.
                - If _user refuses to provide or confirm their month of birth (e.g., "Why do I need to tell you that information?"), assign `refuse`
                - If it's unclear, return `unknown`.
              example: "04"

            dob_confirmed:
              description:
                confirmed: |-
                  _user explicitly confirmed their recorded date of birth. Example or similar phrases are accepted: "Yes", "Correct", "That is me", "That is correct", "Of course", "That is right", "Yeah.", "Yep.", "Yeah. Yeah.", "Uh-huh.", "That's correct.", "Sure.", or "It's correct."
                unknown: |-
                  _user hasn't confirmed BOTH their date of birth was recorded correctly or stated that the recored date of birth was not correct.
                  Any other response, including neutral acknowledgements such as "Okay" or "Mhmm" or off-topic phrases like "Oh my god" are considered as unknown.
              example: unknown

            # consent_id_verify:
            #   description:
            #     "yes": if the _user proceeds with ID verification after being asked to do so the second time
            #     "no": if the _user keeps talking about their issues, complaints, or disputes without confirming their identity after being asked to do so the second time
            #     "unknown": if it is unclear whether the _user proceeds with ID verification before revisiting their issues, complaints, or disputes
            #   example: "yes"

        # relection to detect exceptions
        - variables:
            exc:
              description:
                inconvenient_time: if _user implicitly or explicitly says that they are busy (e.g. the consumer is busy; don't have the time to talk; this is not a good time to talk; ask to call back at a different time, ...); and in the latest turns of the conversation has not confirmed that they are now available
                cease_comms: if caller requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                deceased: if _user explicitly says that the consumer is deceased (e.g. the consumer passed away; no longer living; no longer with us; with god; in heaven; dead)
                non_english: if _user says they does not speak English; and in the latest turns of the conversation has not decided that they will continue in English
                prison: if _user says that the consumer is in prison
                military_service: if _user says that the consumer is actively serving in the military
                human_agent_request: if _user specifically requests speaking to a live agent, human, or representative; and in the latest turns of the conversation has not agreed to continue the conversation
                revoke_record_ai_consent: ONLY if _user specified that they don't want to be RECORDED by an AI virtual agent; and in the latest turns of the conversation has not confirmed that they accept to be recorded by AI
                # question_without_answer: if the _user asks a question that requires information that is not available in the conversation context, and in the latest turns of the conversation has not explicitly abandoned the question.
                revoke_record_consent: ONLY if _user explicitly says that they do not want to be RECORDED (e.g. why you need RECORDING?, i prefer not RECORDING, ...); and in the latest turns of the conversation has not confirmed that they accept to be recorded
                "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
              example: "null"
          len_msg_reflection: 4
          reflection_template: template_default

      processing_variable:
        mmddob: # depreciating tools, will remove in future
          tool: lib_tools.tools_kompato.format_dob
        is_dob_matched:
          tool: lib_tools.tools_kompato.outbound_verify_dob
        no_match_cnt:
          tool: lib_tools.tools_kompato.count_no_match
        refuse_cnt:
          tool: lib_tools.tools_kompato.count_refuse
        unknown_cnt:
          tool: lib_tools.tools_kompato.count_unknown
        # guardrail_response:
        #   tool: lib_tools.guardrails.guardrail_validator

      transition_conditions:
        "'{{dict_variable.exc}}' == 'deceased'":
          next_state: exc_deceased
          filler:
          repeat_filler:

        "'{{dict_variable.exc}}' == 'non_english'":
          next_state: exc_language
          filler:
          repeat_filler:

        "'{{dict_variable.exc}}' == 'prison'":
          next_state: exc_prison
          filler:
          repeat_filler:

        "'{{dict_variable.exc}}' == 'military_service'":
          next_state: exc_military_service
          filler:
          repeat_filler:

        "'{{dict_variable.exc}}' == 'human_agent_request'":
          next_state: exc_human_agent_request
          filler:
          repeat_filler:

        "'{{dict_variable.exc}}' == 'revoke_record_ai_consent'":
          next_state: exc_revoke_ai_recording
          filler:
          repeat_filler:

        "'{{dict_variable.exc}}' == 'inconvenient_time'":
          next_state: exc_inconvenient_time
          filler:
          repeat_filler:

        "'{{dict_variable.exc}}' == 'cease_comms'":
          next_state: exc_cease_comms
          filler:
          repeat_filler:

        "'{{dict_variable.exc}}' == 'revoke_record_consent'":
          next_state: exc_revoke_recording
          filler:
          repeat_filler:

        "'{{dict_variable.dob_confirmed}}' == 'confirmed' and '{{dict_variable.is_dob_matched}}' != 'matched_unique' and '{{raw_call_assignment.last_4_ssn}}' == '' and '{{raw_call_assignment.zip}}' == '' and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
          next_state: exc_cb
          filler: Thank you for your patience. We are looking for a human agent to assist you. Please hold for just a moment while I connect your call. Thank you!
          action_after_transition_func:
            - class: WarmTransferSignal
              params:
                transfer_message: I have located a live agent to further help with the account identification issue.
                metadata: *sm_metadata
                extra_info: *base_warm_transfer_info

        "'{{dict_variable.is_dob_matched}}' == 'matched_unique' and '{{dict_variable.dob_confirmed}}' == 'confirmed'":
          next_state: mini_miranda
          filler: I must advise that this is an attempt to collect a debt by a debt collector. Any information obtained will be used for that purpose. Could I call you back if we're disconnected?
          repeat_filler:

        "({{dict_variable.refuse_cnt}} + {{dict_variable.unknown_cnt}}) > 2 and '{{raw_call_assignment.last_4_ssn}}' != ''":
          next_state: verify_ssn
          filler: I understand your concern, {{raw_call_assignment.first_name}}, but confirming your identity is essential to protect your privacy. Could you please provide the last four digits of your social security number instead?
          repeat_filler:

        "({{dict_variable.refuse_cnt}} + {{dict_variable.unknown_cnt}}) > 2 and '{{raw_call_assignment.zip}}' != '' and '{{raw_call_assignment.last_4_ssn}}' == ''":
          next_state: verify_zip_code
          filler: I understand your concern, {{raw_call_assignment.first_name}}, but confirming your identity is essential to protect your privacy. Could you please provide your zip code instead?
          repeat_filler:

        # consumer confirmed an incorrect dob
        "'{{dict_variable.dob_confirmed}}' == 'confirmed' and '{{dict_variable.is_dob_matched}}' != 'matched_unique' and '{{raw_call_assignment.last_4_ssn}}' != ''":
          next_state: verify_ssn
          filler:
          repeat_filler:

        "'{{dict_variable.dob_confirmed}}' == 'confirmed' and '{{dict_variable.is_dob_matched}}' != 'matched_unique' and '{{raw_call_assignment.last_4_ssn}}' == '' and '{{raw_call_assignment.zip}}' != ''":
          next_state: verify_zip_code
          filler:
          repeat_filler:

        "'{{dict_variable.dob_confirmed}}' == 'confirmed' and '{{dict_variable.is_dob_matched}}' != 'matched_unique' and '{{raw_call_assignment.last_4_ssn}}' == '' and '{{raw_call_assignment.zip}}' == '' and '{{dict_variable.is_working_hours }}' == 'no'":
          next_state: exc_cb
          filler:
          repeat_filler:

        # consumer refuses to provide dob
        # "'{{dict_variable.is_name_matched}}' == 'true' and {{dict_variable.refuse_cnt}} > 0": attempt twice
        # "{{dict_variable.refuse_cnt}} == 1 or {{dict_variable.unknown_cnt}} > 2": # attempt one
        #   next_state: verify_dob
        #   filler: I'm {{raw_call_assignment.agent_name}}, a virtual assistant from {{raw_call_assignment.company_name}}. To protect your privacy and proceed with the call I must confirm I have the correct {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}. The Date of birth I have on file is {{dict_variable.ssml_date_of_birth}} , is this correct?
        #   repeat_filler:

        # # add unknown transition filler to prevent hallucination
        # "'{{dict_variable.consent_id_verify}}' == 'no'":
        #   next_state: end_call
        #   filler: I'm sorry I'm unable to locate your account at this time. I cannot proceed with the call further. Thank you for your time and have a good day! <ENDCALL> #|partial # Thank you for your understanding. If you have any additional concerns, please don't hesitate to contact us through our hotline at {{dict_variable.ssml_company_hotline}}. Have a great day!<ENDCALL>
        #   repeat_filler:

        # "'{{dict_variable.exc}}' == 'question_without_answer'":
        #   next_state: post_exc
        #   filler: # I'm sorry. |partial #When would be a good time for us to call you back?
        #   repeat_filler:

        # consumer provided an incorrect dob
        "'{{dict_variable.is_dob_matched}}' == 'no_matched' and '{{raw_call_assignment.last_4_ssn}}' != ''":
          next_state: verify_ssn
          filler:
          repeat_filler:

        "'{{dict_variable.is_dob_matched}}' == 'no_matched' and '{{raw_call_assignment.last_4_ssn}}' == '' and '{{raw_call_assignment.zip}}' != ''":
          next_state: verify_zip_code
          filler:
          repeat_filler:

        "'{{dict_variable.dob_confirmed}}' == 'unknown'":
          next_state: verify_dob
          filler:
          repeat_filler:

        else: #unknown
          next_state: verify_dob
          filler:
          repeat_filler:

      repeat_continuously:
        max_repeat: 5
        state_exceed_max_repeat: verify_ssn
        filler_exceed_max_repeat: #Well. |partial #Can you confirm the last four digits of your social security number?
        repeat_filler:
      max_turn_back:

  verify_ssn:
    type: 2llmcalls
    2llmcalls:
      ## dynamic filler customized for each state
      dynamic_filler:
        model_name: gpt-4o #Qwen3-4B-df_en_v3b
        nturns: 6
        fillers:
        prompt_template: prompt_filler_v2 #prompt_filler_v3    ## a key in `prompt_templates_dynamic_filler`
